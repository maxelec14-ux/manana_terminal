<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinnacle Global Sharp | Pre-Match Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body { background: #0F172A; font-family: 'JetBrains Mono', monospace; color: #F1F5F9; }
        .match-row { background: #1E293B; border: 1px solid #334155; transition: 0.2s; border-radius: 16px; margin-bottom: 12px; }
        .market-card { background: #0F172A; border-radius: 12px; padding: 12px; border: 1px solid #334155; }
        .label-u { font-size: 9px; color: #64748B; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .odds-val { font-size: 16px; font-weight: 800; color: #F1F5F9; }
        .point-val { font-size: 11px; color: #3B82F6; font-weight: 800; background: rgba(59, 130, 246, 0.1); padding: 2px 6px; border-radius: 4px; }
        .delta-down { color: #22C55E; } .delta-up { color: #EF4444; }
        
        /* Анимация для свежих изменений (за последние 5 минут) */
        .flash-move { animation: pulse-alert 1s infinite; color: #4ADE80; font-weight: 900; }
        @keyframes pulse-alert { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.05); } }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0F172A; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-end mb-8 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-blue-500 uppercase">PINNACLE<span class="text-white">GLOBAL</span></h1>
                <p class="text-xs font-bold text-slate-500 uppercase mt-1 tracking-widest">Pre-Match Only • All Leagues • 5m Refresh</p>
            </div>
            <div class="flex gap-8 items-center">
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Next Sync</p>
                    <p id="timer" class="text-xl font-black text-blue-400">05:00</p>
                </div>
                <button onclick="scanPinnacle()" id="scan-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-lg text-xs font-black uppercase tracking-widest transition-all cursor-pointer">Scan Now ⚡</button>
            </div>
        </header>

        <div id="scanner-feed" class="space-y-4">
            <div class="p-20 text-center text-slate-500 animate-pulse font-bold uppercase tracking-widest">
                Connecting to Pinnacle Global API...
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'f3478125e1684304dae1ac720ced58fe';
        // Используем 'upcoming', чтобы захватить максимум лиг, а не только 'soccer'
        const ODDS_URL = `https://api.the-odds-api.com/v4/sports/upcoming/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h,spreads,totals&bookmakers=pinnacle&oddsFormat=decimal`;
        
        let oddsHistory = JSON.parse(localStorage.getItem('pin_global_v1')) || {};

        async function scanPinnacle() {
            const btn = document.getElementById('scan-btn');
            const feed = document.getElementById('scanner-feed');
            btn.disabled = true;
            
            try {
                const response = await fetch(ODDS_URL);
                const data = await response.json();
                
                if (!Array.isArray(data)) throw new Error(data.message || "API Data Error");

                const now = new Date();
                // Фильтруем: только ФУТБОЛ и только БУДУЩИЕ матчи
                const filtered = data
                    .filter(m => m.sport_key.includes('soccer') && new Date(m.commence_time) > now)
                    .sort((a, b) => new Date(a.commence_time) - new Date(b.commence_time));

                renderScanner(filtered);
                resetTimer();
            } catch (e) {
                feed.innerHTML = `<div class="p-20 text-center text-red-500 font-bold uppercase border border-red-900/30 rounded-2xl">Error: ${e.message}</div>`;
            } finally { btn.disabled = false; }
        }

        function trackOdds(matchId, marketKey, currentPrice) {
            if (!currentPrice) return { val: '—', info: '', fresh: false };
            
            const key = `${matchId}_${marketKey}`;
            const history = oddsHistory[key] || { start: currentPrice, last: currentPrice };
            
            const totalDiff = (currentPrice - history.start).toFixed(2);
            // fresh = изменилось ли значение по сравнению с ПРЕДЫДУЩИМ сканом (5 мин назад)
            const isFresh = (currentPrice !== history.last); 
            
            oddsHistory[key] = { start: history.start, last: currentPrice };
            localStorage.setItem('pin_global_v1', JSON.stringify(oddsHistory));

            let color = 'text-slate-500';
            let arrow = '';
            if (currentPrice < history.start) { color = 'delta-down'; arrow = '↓'; }
            else if (currentPrice > history.start) { color = 'delta-up'; arrow = '↑'; }

            return {
                val: currentPrice.toFixed(2),
                info: `<span class="text-[10px] ${color} font-bold">${arrow} ${Math.abs(totalDiff)}</span>`,
                fresh: isFresh
            };
        }

        function renderScanner(matches) {
            const container = document.getElementById('scanner-feed');
            
            const html = matches.map(m => {
                const pin = m.bookmakers.find(b => b.key === 'pinnacle');
                if (!pin) return '';

                let h2h = {h:null, d:null, a:null}, spr = {h:null, a:null, p:null}, tot = {o:null, u:null, p:null};

                pin.markets.forEach(mk => {
                    if (mk.key === 'h2h') {
                        h2h.h = mk.outcomes.find(o => o.name === m.home_team)?.price;
                        h2h.a = mk.outcomes.find(o => o.name === m.away_team)?.price;
                        h2h.d = mk.outcomes.find(o => o.name === 'Draw')?.price;
                    }
                    if (mk.key === 'spreads') {
                        const ho = mk.outcomes.find(o => o.name === m.home_team);
                        spr.h = ho?.price;
                        spr.a = mk.outcomes.find(o => o.name === m.away_team)?.price;
                        spr.p = ho?.point;
                    }
                    if (mk.key === 'totals') {
                        const oo = mk.outcomes.find(o => o.name === 'Over');
                        tot.o = oo?.price;
                        tot.u = mk.outcomes.find(o => o.name === 'Under')?.price;
                        tot.p = oo?.point;
                    }
                });

                const o1 = trackOdds(m.id, '1', h2h.h);
                const oX = trackOdds(m.id, 'X', h2h.d);
                const o2 = trackOdds(m.id, '2', h2h.a);
                const sh = trackOdds(m.id, 'sh', spr.h);
                const sa = trackOdds(m.id, 'sa', spr.a);
                const to = trackOdds(m.id, 'to', tot.o);
                const tu = trackOdds(m.id, 'tu', tot.u);

                return `
                <div class="match-row p-6">
                    <div class="grid grid-cols-12 gap-6 items-center">
                        <div class="col-span-12 lg:col-span-3 border-r border-slate-700/50 pr-4">
                            <span class="text-[9px] text-blue-400 font-bold uppercase tracking-widest block mb-1">${m.sport_title}</span>
                            <h3 class="text-lg font-black uppercase truncate">${m.home_team}</h3>
                            <h3 class="text-lg font-black text-slate-500 uppercase truncate">${m.away_team}</h3>
                            <p class="text-[10px] text-slate-400 mt-2 font-bold">${new Date(m.commence_time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} • ${new Date(m.commence_time).toLocaleDateString()}</p>
                        </div>

                        <div class="col-span-12 lg:col-span-3 grid grid-cols-3 gap-2">
                            <div class="market-card"><span class="label-u">Home</span><span class="odds-val ${o1.fresh?'flash-move':''}">${o1.val}</span>${o1.info}</div>
                            <div class="market-card"><span class="label-u">Draw</span><span class="odds-val ${oX.fresh?'flash-move':''}">${oX.val}</span>${oX.info}</div>
                            <div class="market-card"><span class="label-u">Away</span><span class="odds-val ${o2.fresh?'flash-move':''}">${o2.val}</span>${o2.info}</div>
                        </div>

                        <div class="col-span-12 lg:col-span-3">
                            <div class="market-card h-full">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="label-u">Handicap</span>
                                    <span class="point-val">${spr.p !== null ? (spr.p > 0 ? '+'+spr.p : spr.p) : '—'}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <div class="text-center w-full"><span class="text-[9px] text-slate-500 font-bold block">H</span><span class="odds-val ${sh.fresh?'flash-move':''}">${sh.val}</span> ${sh.info}</div>
                                    <div class="border-l border-slate-800 h-8 mx-2"></div>
                                    <div class="text-center w-full"><span class="text-[9px] text-slate-500 font-bold block">A</span><span class="odds-val ${sa.fresh?'flash-move':''}">${sa.val}</span> ${sa.info}</div>
                                </div>
                            </div>
                        </div>

                        <div class="col-span-12 lg:col-span-3">
                            <div class="market-card h-full">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="label-u">Total Goals</span>
                                    <span class="point-val">${tot.p || '—'}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <div class="text-center w-full"><span class="text-[9px] text-slate-500 font-bold block">Over</span><span class="odds-val ${to.fresh?'flash-move':''}">${to.val}</span> ${to.info}</div>
                                    <div class="border-l border-slate-800 h-8 mx-2"></div>
                                    <div class="text-center w-full"><span class="text-[9px] text-slate-500 font-bold block">Under</span><span class="odds-val ${tu.fresh?'flash-move':''}">${tu.val}</span> ${tu.info}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            container.innerHTML = html || '<div class="p-20 text-center text-slate-600 font-bold uppercase tracking-widest">No matching Pinnacle events found. Try again in 5 minutes.</div>';
        }

        let timeLeft = 300;
        function resetTimer() {
            timeLeft = 300;
            clearInterval(window.refreshTimer);
            window.refreshTimer = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                document.getElementById('timer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                if (timeLeft <= 0) scanPinnacle();
            }, 1000);
        }

        scanPinnacle();
    </script>
</body>
</html>
