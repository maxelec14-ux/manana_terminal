<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MananaAI | Pinnacle Sharp-Line Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background: #F8FAFC; font-family: 'Inter', sans-serif; color: #1E293B; margin: 0; }
        .match-card { background: white; border: 1px solid #E2E8F0; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .c-red { color: #EF4444; } .bg-red { background: #EF4444; }
        .c-yellow { color: #D97706; } .bg-yellow { background: #D97706; }
        .c-blue { color: #2563EB; } .bg-blue { background: #2563EB; }
        .c-green { color: #059669; } .bg-green { background: #059669; }

        .progress-container { width: 100%; height: 6px; background: #F1F5F9; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.8s ease-out; }
        .stat-value { font-size: 1.8rem; font-weight: 900; line-height: 1; }

        .market-badge { background: #F8FAFC; border: 1px solid #E2E8F0; padding: 10px; border-radius: 16px; text-align: center; min-width: 100px; }
        .label-xs { font-size: 8px; font-weight: 800; color: #94A3B8; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .odds-now { font-size: 16px; font-weight: 900; display: block; color: #1E293B; }
        .odds-start { font-size: 10px; color: #94A3B8; font-weight: 600; }
        .delta { font-size: 10px; font-weight: 900; margin-top: 2px; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-[900] italic tracking-tighter text-blue-600 uppercase">PINNACLE<span class="text-slate-800">SCAN</span></h1>
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Sharp Money Line Movements (Pinnacle)</p>
            </div>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Next Sync</p>
                    <p id="timer" class="text-lg font-black text-blue-600">15:00</p>
                </div>
                <button onclick="updateAllData()" id="update-btn" class="bg-slate-900 text-white px-8 py-4 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-blue-600 transition duration-300 cursor-pointer">Scan Now ⚡</button>
            </div>
        </header>

        <div id="feed" class="space-y-8">
            <div class="text-center py-20 border-2 border-dashed border-slate-200 rounded-[40px] text-slate-400 font-bold uppercase text-xs tracking-widest">
                Waiting for scan...
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'f3478125e1684304dae1ac720ced58fe';
        const SPORT = 'soccer'; // Все футбольные матчи
        const ODDS_URL = `https://api.the-odds-api.com/v4/sports/${SPORT}/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h,totals&bookmakers=pinnacle`;
        
        let oddsHistory = JSON.parse(localStorage.getItem('pinnacle_opening_odds')) || {};

        async function updateAllData() {
            const btn = document.getElementById('update-btn');
            const feed = document.getElementById('feed');
            btn.disabled = true;
            feed.innerHTML = '<div class="text-center py-20 animate-pulse text-blue-600 font-black uppercase text-xs tracking-widest">Fetching Data from API...</div>';

            try {
                // 1. Запрос к Odds API
                const oddsRes = await fetch(ODDS_URL);
                const oddsData = await oddsRes.json();

                // Проверка на ошибку API (ключ или лимиты)
                if (!Array.isArray(oddsData)) {
                    throw new Error(oddsData.message || "Invalid API response format");
                }

                // 2. Запрос к твоему Football API (статистика)
                const statsRes = await fetch('/api/matches');
                const statsData = await statsRes.json();

                if (!statsData || !statsData.matches) {
                    throw new Error("Stats API returned no matches");
                }

                renderUI(statsData, oddsData);
                startCountdown();
            } catch (e) {
                console.error(e);
                feed.innerHTML = `<div class="text-red-500 text-center py-20 font-bold uppercase">Error: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function getOddsDisplay(matchId, marketKey, currentVal) {
            if (!currentVal) return '<span class="odds-now text-slate-300">—</span><span class="odds-start">N/A</span>';
            
            const historyKey = `${matchId}_${marketKey}`;
            const openingVal = oddsHistory[historyKey];

            // Если коэффициента еще нет в истории - сохраняем его
            if (!openingVal) {
                oddsHistory[historyKey] = currentVal;
                localStorage.setItem('pinnacle_opening_odds', JSON.stringify(oddsHistory));
                return `<span class="odds-now">${currentVal.toFixed(2)}</span><span class="odds-start text-blue-500">NEW</span>`;
            }

            const diff = (currentVal - openingVal).toFixed(2);
            let colorClass = 'text-slate-400';
            let icon = '';

            if (currentVal < openingVal) { colorClass = 'c-green'; icon = '↓'; }
            else if (currentVal > openingVal) { colorClass = 'c-red'; icon = '↑'; }

            return `
                <span class="odds-now">${currentVal.toFixed(2)}</span>
                <span class="odds-start">Start: ${openingVal.toFixed(2)}</span>
                <div class="delta ${colorClass} font-black">${icon} ${Math.abs(diff)}</div>
            `;
        }

        const createMetric = (label, val, type) => {
            const num = parseFloat(val) || 0;
            const color = (num >= 2.0 || (type === 'conceded' && num <= 0.8)) ? 'bg-green' : (num >= 1.5 ? 'bg-blue' : 'bg-red');
            const percentage = Math.min(100, (num / 3) * 100);
            return `<div class="flex-1">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">${label}</p>
                <p class="stat-value ${color.replace('bg-', 'c-')}">${num.toFixed(2)}</p>
                <div class="progress-container"><div class="progress-fill ${color}" style="width: ${percentage}%"></div></div>
            </div>`;
        };

        function renderUI(stats, odds) {
            const feed = document.getElementById('feed');
            
            const html = stats.matches.map(m => {
                const hT = stats.standings[m.homeTeam.id];
                const aT = stats.standings[m.awayTeam.id];
                if (!hT || !aT) return '';

                // Сопоставление команд (фуззи-поиск по названию)
                const matchOdds = odds.find(o => 
                    o.home_team.toLowerCase().includes(m.homeTeam.shortName.toLowerCase()) || 
                    m.homeTeam.shortName.toLowerCase().includes(o.home_team.toLowerCase())
                );

                let o1 = null, oX = null, o2 = null, oOver = null;

                if (matchOdds && matchOdds.bookmakers && matchOdds.bookmakers[0]) {
                    const markets = matchOdds.bookmakers[0].markets;
                    const h2h = markets.find(mk => mk.key === 'h2h');
                    if (h2h) {
                        o1 = h2h.outcomes.find(oc => oc.name === matchOdds.home_team)?.price;
                        o2 = h2h.outcomes.find(oc => oc.name === matchOdds.away_team)?.price;
                        oX = h2h.outcomes.find(oc => oc.name === 'Draw')?.price;
                    }
                    const totals = markets.find(mk => mk.key === 'totals');
                    if (totals) {
                        // Берем Over 2.5 если он есть, иначе первый попавшийся Over
                        const overOutcome = totals.outcomes.find(oc => oc.name === 'Over' && oc.point === 2.5) || totals.outcomes.find(oc => oc.name === 'Over');
                        oOver = overOutcome?.price;
                    }
                }

                return `
                <div class="match-card p-10">
                    <div class="flex justify-between items-start mb-10">
                        <span class="text-[11px] font-black text-blue-600 bg-blue-50 px-4 py-1.5 rounded-xl uppercase tracking-wider">${m.competition.name}</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${new Date(m.utcDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} | Pinnacle Live</span>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
                        <div class="space-y-8">
                            <div class="space-y-4">
                                <h3 class="text-3xl font-[900] tracking-tighter uppercase">${m.homeTeam.shortName}</h3>
                                <div class="flex gap-4">
                                    ${createMetric('PPM', (hT.points/hT.playedGames), 'ppm')}
                                    ${createMetric('Scored', (hT.goalsFor/hT.playedGames), 'scored')}
                                </div>
                            </div>
                            <div class="space-y-4">
                                <h3 class="text-3xl font-[900] tracking-tighter uppercase text-slate-400">${m.awayTeam.shortName}</h3>
                                <div class="flex gap-4">
                                    ${createMetric('PPM', (aT.points/aT.playedGames), 'ppm')}
                                    ${createMetric('Scored', (aT.goalsFor/aT.playedGames), 'scored')}
                                </div>
                            </div>
                        </div>

                        <div class="bg-slate-50 p-6 rounded-[32px] grid grid-cols-2 sm:grid-cols-4 gap-4 items-center">
                            <div class="market-badge"><span class="label-xs">Home (1)</span>${getOddsDisplay(m.id, '1', o1)}</div>
                            <div class="market-badge"><span class="label-xs">Draw (X)</span>${getOddsDisplay(m.id, 'X', oX)}</div>
                            <div class="market-badge"><span class="label-xs">Away (2)</span>${getOddsDisplay(m.id, '2', o2)}</div>
                            <div class="market-badge"><span class="label-xs">Total Over</span>${getOddsDisplay(m.id, 'O25', oOver)}</div>
                        </div>
                    </div>
                </div>`;
            }).join('');
            
            feed.innerHTML = html || '<div class="text-center py-20 text-slate-400 font-bold uppercase">No matching events found on Pinnacle.</div>';
        }

        let timer;
        function startCountdown() {
            if (timer) clearInterval(timer);
            let seconds = 900; // 15 минут
            timer = setInterval(() => {
                seconds--;
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (seconds <= 0) {
                    clearInterval(timer);
                    updateAllData();
                }
            }, 1000);
        }

        // Автозапуск при загрузке
        updateAllData();
    </script>
</body>
</html>
