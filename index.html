<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Stable Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0F172A; font-family: 'Inter', sans-serif; color: #E2E8F0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .stat-badge { background: rgba(16, 185, 129, 0.1); color: #10B981; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; }
        input, select { background: #1E293B; border: 1px solid #334155; border-radius: 12px; padding: 8px; color: white; font-size: 12px; outline: none; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-[900] italic tracking-tighter text-white">MANANA<span class="text-emerald-500">AI</span></h1>
                <p id="debug-info" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mt-1">Status: Ready</p>
            </div>
            <button onclick="runUpdate()" id="update-btn" class="bg-emerald-500 hover:bg-emerald-400 text-white px-8 py-4 rounded-2xl font-black text-xs transition shadow-lg active:scale-95">
                UPDATE DATA ⚡
            </button>
        </header>

        <div class="glass-card p-6 mb-8 grid grid-cols-2 md:grid-cols-5 gap-4">
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-bold text-slate-500 uppercase">League</label>
                <select id="f-league" onchange="applyFilters()"><option value="all">Все лиги</option></select>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-bold text-slate-500 uppercase">Min PPM Diff</label>
                <input type="number" id="f-ppm" step="0.1" value="0" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-bold text-slate-500 uppercase">Min Total</label>
                <input type="number" id="f-total" step="0.1" value="0" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-bold text-slate-500 uppercase">Handicap >=</label>
                <input type="number" id="f-handi" step="0.5" value="0" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-bold text-slate-500 uppercase">Date</label>
                <input type="date" id="f-date" onchange="applyFilters()">
            </div>
        </div>

        <div id="loader" class="hidden mb-8 text-center p-4 text-emerald-500 font-bold text-xs animate-pulse italic">Connecting to European Satellite Data...</div>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20 border-2 border-dashed border-slate-800 rounded-[40px]">
                <p class="text-slate-600 font-bold uppercase text-[10px] tracking-[0.3em]">Нажмите Update Data для начала парсинга</p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '1996fa1ffdf0410195fd5b86af739300';
        const LEAGUES = ['PL', 'PD', 'BL1', 'SA', 'FL1', 'DED', 'PPL', 'ELC', 'CL'];
        // Новый быстрый прокси
        const PROXY = "https://corsproxy.io/?";
        let ALL_DATA = [];

        async function runUpdate() {
            const btn = document.getElementById('update-btn');
            const loader = document.getElementById('loader');
            const debug = document.getElementById('debug-info');
            
            btn.disabled = true;
            loader.classList.remove('hidden');
            ALL_DATA = [];

            for (const code of LEAGUES) {
                try {
                    debug.innerText = `Scanning: ${code}...`;
                    
                    // 1. Standings
                    const sUrl = `${PROXY}${encodeURIComponent('https://api.football-data.org/v4/competitions/' + code + '/standings')}`;
                    const sRes = await fetch(sUrl, { headers: { 'X-Auth-Token': API_KEY } });
                    const sData = await sRes.json();

                    if (!sData.standings?.[0]) continue;

                    const table = {};
                    sData.standings[0].table.forEach(t => {
                        table[t.team.id] = {
                            ppm: (t.points / t.playedGames || 0).toFixed(2),
                            gf: (t.goalsFor / t.playedGames || 0).toFixed(2),
                            ga: (t.goalsAgainst / t.playedGames || 0).toFixed(2),
                            name: t.team.shortName
                        };
                    });

                    // 2. Matches
                    const mUrl = `${PROXY}${encodeURIComponent('https://api.football-data.org/v4/competitions/' + code + '/matches?status=SCHEDULED')}`;
                    const mRes = await fetch(mUrl, { headers: { 'X-Auth-Token': API_KEY } });
                    const mData = await mRes.json();

                    if (mData.matches) {
                        mData.matches.forEach(m => {
                            const h = table[m.homeTeam.id];
                            const a = table[m.awayTeam.id];
                            if (h && a) {
                                const expT = ((parseFloat(h.gf) + parseFloat(a.ga)) / 2 + (parseFloat(a.gf) + parseFloat(h.ga)) / 2).toFixed(2);
                                const ppmDiff = (h.ppm - a.ppm).toFixed(2);
                                
                                ALL_DATA.push({
                                    league: sData.competition.name,
                                    date: m.utcDate.split('T')[0],
                                    home: m.homeTeam.shortName,
                                    away: m.awayTeam.shortName,
                                    ppmH: h.ppm, ppmA: a.ppm,
                                    gfH: h.gf, gaH: h.ga,
                                    gfA: a.gf, gaA: a.ga,
                                    expTotal: expT,
                                    ppmDiff: Math.abs(ppmDiff),
                                    handicap: (ppmDiff * 0.75).toFixed(2)
                                });
                            }
                        });
                    }
                    // Пауза чтобы не ловить 429
                    await new Promise(r => setTimeout(r, 1000));
                } catch (e) { 
                    console.error("League error:", code, e);
                    debug.innerText = `Error in ${code}. Continuing...`;
                }
            }

            debug.innerText = `Total matches found: ${ALL_DATA.length}`;
            updateDropdown();
            render(ALL_DATA);
            btn.disabled = false;
            loader.classList.add('hidden');
        }

        function render(data) {
            const feed = document.getElementById('feed');
            if (data.length === 0) {
                feed.innerHTML = '<div class="text-center py-20 text-rose-500 font-bold uppercase italic tracking-widest text-sm">Ошибка получения данных. Возможно, API ключ исчерпал лимит. Подождите 60 сек.</div>';
                return;
            }

            feed.innerHTML = data.map(m => `
                <div class="glass-card p-6 flex flex-col md:flex-row justify-between items-center gap-6 shadow-2xl">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="stat-badge italic uppercase">${m.league}</span>
                            <span class="text-[10px] font-bold text-slate-500">${m.date}</span>
                        </div>
                        <h2 class="text-2xl font-black text-white italic tracking-tighter">${m.home} <span class="text-slate-700 mx-1">v</span> ${m.away}</h2>
                        
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mt-4">
                            <div class="bg-slate-800/40 p-2 rounded-xl border border-white/5">
                                <p class="text-[8px] font-bold text-slate-500 uppercase">PPM (H/A)</p>
                                <p class="text-xs font-black text-white">${m.ppmH} vs ${m.ppmA}</p>
                            </div>
                            <div class="bg-slate-800/40 p-2 rounded-xl border border-white/5">
                                <p class="text-[8px] font-bold text-slate-500 uppercase">GF (Avg)</p>
                                <p class="text-xs font-black text-emerald-400">${m.gfH} : ${m.gfA}</p>
                            </div>
                            <div class="bg-slate-800/40 p-2 rounded-xl border border-white/5">
                                <p class="text-[8px] font-bold text-slate-500 uppercase">GA (Avg)</p>
                                <p class="text-xs font-black text-rose-400">${m.gaH} : ${m.gaA}</p>
                            </div>
                            <div class="bg-slate-800/40 p-2 rounded-xl border border-white/5">
                                <p class="text-[8px] font-bold text-slate-500 uppercase">PPM Diff</p>
                                <p class="text-xs font-black text-blue-400">${m.ppmDiff}</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-8 border-l border-slate-800 pl-8 min-w-[320px] justify-between">
                        <div class="text-center">
                            <p class="text-[9px] font-black text-slate-500 uppercase mb-1 tracking-tighter">Exp. Total</p>
                            <p class="text-4xl font-[900] italic text-white">${m.expTotal}</p>
                            <span class="text-[9px] font-black ${m.expTotal > 2.5 ? 'text-emerald-500' : 'text-amber-500'}">O/U 2.5</span>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] font-black text-slate-500 uppercase mb-1 tracking-tighter">Handicap</p>
                            <p class="text-4xl font-[900] italic text-white">${m.handicap > 0 ? '-' : '+'}${Math.abs(m.handicap)}</p>
                            <span class="text-[9px] font-black text-white bg-slate-700 px-2 py-0.5 rounded italic uppercase">AI Line</span>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] font-black text-slate-500 uppercase mb-1 tracking-tighter">Exp. Odds</p>
                            <div class="text-[10px] font-black text-emerald-500 mt-2">H: ${(1/(0.34 + m.ppmDiff*0.2)).toFixed(2)}</div>
                            <div class="text-[10px] font-black text-emerald-500">A: ${(1/(0.34 - m.ppmDiff*0.2)).toFixed(2)}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function applyFilters() {
            const l = document.getElementById('f-league').value;
            const p = parseFloat(document.getElementById('f-ppm').value) || 0;
            const t = parseFloat(document.getElementById('f-total').value) || 0;
            const h = parseFloat(document.getElementById('f-handi').value) || 0;
            const d = document.getElementById('f-date').value;

            const filtered = ALL_DATA.filter(m => {
                return (l === 'all' || m.league === l) &&
                       (parseFloat(m.ppmDiff) >= p) &&
                       (parseFloat(m.expTotal) >= t) &&
                       (Math.abs(m.handicap) >= h) &&
                       (!d || m.date === d);
            });
            render(filtered);
        }

        function updateDropdown() {
            const s = document.getElementById('f-league');
            const unique = [...new Set(ALL_DATA.map(m => m.league))];
            s.innerHTML = '<option value="all">Все лиги</option>' + unique.map(l => `<option value="${l}">${l}</option>`).join('');
        }
    </script>
</body>
</html>
