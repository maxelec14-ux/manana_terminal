<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinnacle Elite | Smart Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        
        body { background: #F8FAFC; font-family: 'Inter', sans-serif; color: #1E293B; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .match-card { 
            background: white; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            border: 1px solid #E2E8F0;
            transition: all 0.3s ease;
        }
        .match-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        
        .market-box { background: #F1F5F9; border-radius: 10px; padding: 10px; border: 1px solid #E2E8F0; }
        .label-u { font-size: 10px; color: #64748B; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .odds-up { background-color: #FEE2E2; color: #EF4444; border-radius: 4px; padding: 0 4px; }
        .odds-down { background-color: #DCFCE7; color: #10B981; border-radius: 4px; padding: 0 4px; }
        
        @keyframes flash-green { 0% { background: #BBF7D0; } 100% { background: transparent; } }
        @keyframes flash-red { 0% { background: #FECACA; } 100% { background: transparent; } }
        .changed-down { animation: flash-green 2s forwards; }
        .changed-up { animation: flash-red 2s forwards; }

        .update-badge { font-size: 9px; padding: 2px 8px; border-radius: 20px; font-weight: 700; }
        .badge-waiting { background: #E2E8F0; color: #64748B; }
        .badge-active { background: #DBEAFE; color: #2563EB; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-[1400px] mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-slate-900">PINNACLE<span class="text-blue-600">ELITE</span></h1>
                <p id="global-status" class="text-xs font-semibold text-slate-400 uppercase tracking-widest mt-1">Smart Scheduling Active</p>
            </div>
            <div class="flex gap-4">
                <div class="text-right mr-4">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">System Status</p>
                    <p id="api-usage" class="text-sm font-black text-slate-700 italic">Ready</p>
                </div>
                <button onclick="bruteForceScan()" id="scan-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold text-xs uppercase tracking-wider transition-all shadow-lg shadow-blue-200">
                    Full Deep Sync ⚡
                </button>
            </div>
        </header>

        <div id="scanner-feed" class="grid grid-cols-1 gap-4">
            </div>
    </div>

    <script>
        const API_KEY = 'f3478125e1684304dae1ac720ced58fe';
        let db = JSON.parse(localStorage.getItem('pin_elite_db')) || {};

        // 1. Определение интервала обновления
        function getUpdateInterval(commenceTime) {
            const now = new Date();
            const start = new Date(commenceTime);
            const hoursToStart = (start - now) / (1000 * 60 * 60);

            if (hoursToStart <= 1) return 5;       // 1 час до матча -> 5 мин
            if (hoursToStart <= 2) return 15;      // 2 часа до матча -> 15 мин
            if (hoursToStart <= 6) return 30;      // 6 часов до матча -> 30 мин
            if (hoursToStart <= 12) return 60;     // 12 часов до матча -> 1 час
            return 240;                            // Более 12 часов -> 4 часа (редко)
        }

        async function bruteForceScan() {
            const btn = document.getElementById('scan-btn');
            const apiStatus = document.getElementById('api-usage');
            btn.disabled = true;
            
            try {
                apiStatus.innerText = "Fetching Leagues...";
                const sportsRes = await fetch(`https://api.the-odds-api.com/v4/sports/?apiKey=${API_KEY}`);
                const sports = await sportsRes.json();
                const soccerLeagues = sports.filter(s => s.group === 'Soccer' && s.active === true);

                for (let i = 0; i < soccerLeagues.length; i++) {
                    const league = soccerLeagues[i];
                    
                    // Проверяем, нужно ли обновлять эту лигу
                    // (Для упрощения проверяем время последнего обновления лиги в целом)
                    const lastUpdate = db[`last_upd_${league.key}`] || 0;
                    const now = Date.now();
                    
                    // Если прошло меньше 5 минут с любого обновления — скипаем (базовая защита)
                    if (now - lastUpdate < 300000) continue; 

                    apiStatus.innerText = `Syncing: ${league.title}...`;
                    const res = await fetch(`https://api.the-odds-api.com/v4/sports/${league.key}/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h,spreads,totals&bookmakers=pinnacle`);
                    const matches = await res.json();

                    if (Array.isArray(matches)) {
                        matches.forEach(m => {
                            const oldData = db[m.id];
                            db[m.id] = { ...m, last_seen: now };
                            if (oldData) db[m.id].history = oldData.history || oldData.bookmakers;
                        });
                        db[`last_upd_${league.key}`] = now;
                    }
                    localStorage.setItem('pin_elite_db', JSON.stringify(db));
                    render();
                    await new Promise(r => setTimeout(r, 200)); 
                }
                apiStatus.innerText = "All Leagues Synced";
            } catch (e) {
                apiStatus.innerText = "Error!";
            } finally { btn.disabled = false; }
        }

        function getOddsDisplay(matchId, marketKey, currentPrice, outcomeName) {
            if (!currentPrice) return `<span class="text-slate-300">—</span>`;
            
            const storageKey = `hist_${matchId}_${marketKey}_${outcomeName}`;
            const startPrice = localStorage.getItem(storageKey + '_start') || currentPrice;
            const lastPrice = localStorage.getItem(storageKey + '_last') || currentPrice;
            
            if (!localStorage.getItem(storageKey + '_start')) {
                localStorage.setItem(storageKey + '_start', currentPrice);
            }

            const diff = (currentPrice - startPrice).toFixed(2);
            let trendClass = "";
            let flashClass = "";

            if (currentPrice < lastPrice) flashClass = "changed-down";
            if (currentPrice > lastPrice) flashClass = "changed-up";
            
            if (currentPrice < startPrice) trendClass = "odds-down";
            if (currentPrice > startPrice) trendClass = "odds-up";

            localStorage.setItem(storageKey + '_last', currentPrice);

            return `
                <div class="p-1 ${flashClass} rounded transition-all duration-1000">
                    <span class="mono text-lg font-bold">${currentPrice.toFixed(2)}</span>
                    <div class="text-[10px] font-bold mt-1">
                        <span class="${trendClass}">${diff > 0 ? '↑' : ''}${diff != 0 ? diff : ''}</span>
                    </div>
                </div>
            `;
        }

        function render() {
            const feed = document.getElementById('scanner-feed');
            const now = Date.now();
            
            // Фильтруем и сортируем матчи из БД
            const matches = Object.values(db)
                .filter(m => m.id && new Date(m.commence_time) > now)
                .sort((a, b) => new Date(a.commence_time) - new Date(b.commence_time));

            feed.innerHTML = matches.map(m => {
                const pin = m.bookmakers.find(b => b.key === 'pinnacle');
                if (!pin) return '';

                let h2h = {}, spr = {p:''}, tot = {p:''};
                pin.markets.forEach(mk => {
                    if (mk.key === 'h2h') mk.outcomes.forEach(o => h2h[o.name] = o.price);
                    if (mk.key === 'spreads') { spr.p = mk.outcomes[0]?.point; mk.outcomes.forEach(o => spr[o.name] = o.price); }
                    if (mk.key === 'totals') { tot.p = mk.outcomes.find(o => o.name === 'Over')?.point; mk.outcomes.forEach(o => tot[o.name] = o.price); }
                });

                const interval = getUpdateInterval(m.commence_time);

                return `
                <div class="match-card p-6 grid grid-cols-12 gap-6 items-center">
                    <div class="col-span-12 md:col-span-3 border-r border-slate-100">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="update-badge badge-active italic">Every ${interval}m</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase">${m.sport_title}</span>
                        </div>
                        <h3 class="text-base font-extrabold text-slate-900 leading-tight uppercase">${m.home_team}</h3>
                        <h3 class="text-base font-extrabold text-slate-400 leading-tight uppercase mb-2">${m.away_team}</h3>
                        <div class="text-[11px] font-semibold text-slate-500 bg-slate-100 inline-block px-2 py-1 rounded">
                            ${new Date(m.commence_time).toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'})}
                        </div>
                    </div>

                    <div class="col-span-12 md:col-span-3 grid grid-cols-3 gap-2">
                        <div class="market-box text-center"><span class="label-u text-blue-600">Home</span>${getOddsDisplay(m.id, 'h2h', h2h[m.home_team], '1')}</div>
                        <div class="market-box text-center"><span class="label-u">Draw</span>${getOddsDisplay(m.id, 'h2h', h2h['Draw'], 'X')}</div>
                        <div class="market-box text-center"><span class="label-u text-red-400">Away</span>${getOddsDisplay(m.id, 'h2h', h2h[m.away_team], '2')}</div>
                    </div>

                    <div class="col-span-12 md:col-span-3 market-box">
                        <div class="flex justify-between items-center mb-2 px-2">
                            <span class="label-u">Handicap</span>
                            <span class="mono text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded">${spr.p || 0}</span>
                        </div>
                        <div class="flex justify-around items-center">
                            <div class="text-center w-full">${getOddsDisplay(m.id, 'spread', spr[m.home_team], 'H')}</div>
                            <div class="w-px h-8 bg-slate-200"></div>
                            <div class="text-center w-full">${getOddsDisplay(m.id, 'spread', spr[m.away_team], 'A')}</div>
                        </div>
                    </div>

                    <div class="col-span-12 md:col-span-3 market-box">
                        <div class="flex justify-between items-center mb-2 px-2">
                            <span class="label-u">Total Goals</span>
                            <span class="mono text-xs font-bold text-orange-600 bg-orange-50 px-2 py-0.5 rounded">${tot.p || 0}</span>
                        </div>
                        <div class="flex justify-around items-center">
                            <div class="text-center w-full">${getOddsDisplay(m.id, 'total', tot['Over'], 'O')}</div>
                            <div class="w-px h-8 bg-slate-200"></div>
                            <div class="text-center w-full">${getOddsDisplay(m.id, 'total', tot['Under'], 'U')}</div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        // Автозапуск отрисовки из кэша
        render();

        // Фоновый планировщик
        setInterval(() => {
            console.log("Checking for smart updates...");
            // Здесь можно добавить логику автоматического вызова bruteForceScan() 
            // для конкретных лиг на основе их getUpdateInterval
        }, 60000);
    </script>
</body>
</html>
