<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Auto-Sync Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: 'Inter', sans-serif; }
        .card { transition: 0.3s; border-radius: 28px; background: white; border: 1px solid #eef2f6; margin-bottom: 12px; }
        .active-league { background: #00C076 !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="max-w-5xl mx-auto mb-10 flex justify-between items-center">
        <h1 class="text-2xl font-black italic tracking-tighter">MANANA<span class="text-green-600">AI</span></h1>
        <div id="league-selector" class="flex gap-2">
            <button onclick="runAnalysis(39)" id="L-39" class="px-4 py-2 bg-white border border-slate-200 rounded-xl font-bold text-xs hover:bg-slate-50 transition">🏴󠁧󠁢󠁥󠁮󠁧󠁿 EPL</button>
            <button onclick="runAnalysis(140)" id="L-140" class="px-4 py-2 bg-white border border-slate-200 rounded-xl font-bold text-xs hover:bg-slate-50 transition">🇪🇸 La Liga</button>
        </div>
    </nav>

    <div class="max-w-5xl mx-auto">
        <div id="status-bar" class="mb-6 hidden p-4 bg-blue-600 text-white rounded-2xl font-bold text-xs uppercase tracking-widest animate-pulse">
            Синхронизация с API...
        </div>

        <div id="debug-zone" class="mb-8 hidden bg-white rounded-[32px] border border-slate-100 shadow-sm overflow-hidden">
            <table class="w-full text-left text-[11px]">
                <thead class="bg-slate-50 text-slate-400 font-black uppercase">
                    <tr><th class="p-4">Команда</th><th class="p-4 text-center">Игр</th><th class="p-4 text-center">Очки</th><th class="p-4 text-right">PPM</th></tr>
                </thead>
                <tbody id="standings-body"></tbody>
            </table>
        </div>

        <div id="feed" class="space-y-4 text-center py-20 text-slate-300 font-black uppercase italic">
            Нажмите на лигу выше для старта
        </div>
    </div>

    <script>
        const API_KEY = "c54fa8c0a8699f6a039bbc5555669479";
        const HEADERS = { "x-apisports-key": API_KEY };

        async function runAnalysis(leagueId) {
            const feed = document.getElementById('feed');
            const status = document.getElementById('status-bar');
            const debugZone = document.getElementById('debug-zone');
            
            status.classList.remove('hidden');
            status.innerText = `Поиск активного сезона для ID:${leagueId}...`;
            
            try {
                // 1. АВТО-ДЕТЕКТ СЕЗОНА
                const leagueRes = await fetch(`https://v3.football.api-sports.io/leagues?id=${leagueId}`, { headers: HEADERS });
                const leagueData = await leagueRes.json();
                const currentSeason = leagueData.response[0].seasons.find(s => s.current).year;
                
                status.innerText = `Сезон ${currentSeason} подтвержден. Загрузка данных...`;

                // 2. ЗАГРУЗКА ТАБЛИЦЫ
                const tableRes = await fetch(`https://v3.football.api-sports.io/standings?league=${leagueId}&season=${currentSeason}`, { headers: HEADERS });
                const tableData = await tableRes.json();
                const standings = tableData.response[0].league.standings[0];

                // Рендер таблицы (Debug)
                document.getElementById('standings-body').innerHTML = standings.slice(0, 5).map(s => `
                    <tr class="border-t border-slate-50">
                        <td class="p-4 font-bold"><img src="${s.team.logo}" class="inline w-4 mr-2"> ${s.team.name}</td>
                        <td class="p-4 text-center">${s.all.played}</td>
                        <td class="p-4 text-center font-black">${s.points}</td>
                        <td class="p-4 text-right text-blue-600 font-bold">${(s.points / s.all.played).toFixed(2)}</td>
                    </tr>
                `).join('') + `<tr><td colspan="4" class="p-2 text-center text-[9px] text-slate-300 font-bold">Показаны топ-5 для проверки данных</td></tr>`;
                debugZone.classList.remove('hidden');

                // 3. ЗАГРУЗКА МАТЧЕЙ И МАТЕМАТИКА
                const matchRes = await fetch(`https://v3.football.api-sports.io/fixtures?league=${leagueId}&next=10`, { headers: HEADERS });
                const matchData = await matchRes.json();
                const fixtures = matchData.response || [];

                if (fixtures.length === 0) {
                    feed.innerHTML = "В API нет ближайших матчей для этой лиги.";
                } else {
                    feed.innerHTML = fixtures.map(fix => {
                        const home = standings.find(s => s.team.id === fix.teams.home.id);
                        const away = standings.find(s => s.team.id === fix.teams.away.id);
                        
                        if (!home || !away) return '';

                        const hPPM = (home.points / home.all.played).toFixed(2);
                        const aPPM = (away.points / away.all.played).toFixed(2);
                        const exp = ((home.all.goals.for / home.all.played + away.all.goals.against / away.all.played + away.all.goals.for / away.all.played + home.all.goals.against / home.all.played) / 2).toFixed(2);

                        return `
                        <div class="card p-6 flex justify-between items-center">
                            <div class="text-left">
                                <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">${fix.league.name}</span>
                                <h2 class="text-xl font-black text-slate-900">${fix.teams.home.name} v ${fix.teams.away.name}</h2>
                                <div class="flex gap-2 mt-2 font-bold text-[10px] text-slate-400 uppercase">
                                    <span>PPM H: ${hPPM}</span> • <span>PPM A: ${aPPM}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-black text-slate-400 uppercase">Exp. Goals</p>
                                <p class="text-3xl font-black italic text-slate-900">${exp}</p>
                                <p class="text-[10px] font-black ${exp > 2.5 ? 'text-green-500' : 'text-amber-500'} uppercase">Pick: ${exp > 2.5 ? 'Over 2.5' : 'Under 2.5'}</p>
                            </div>
                        </div>`;
                    }).join('');
                }

                status.classList.add('hidden');

            } catch (err) {
                status.innerText = "ОШИБКА: " + err.message;
                status.style.background = "#ef4444";
            }
        }
    </script>
</body>
</html>
