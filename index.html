<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Pro Terminal & Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: 'Inter', sans-serif; }
        .active-league { background: #00C076 !important; color: white !important; border-color: #00C076 !important; }
        .card { transition: 0.2s; }
        .tab-active { border-bottom: 3px solid #00C076; color: #00C076; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center max-w-5xl mx-auto mb-6">
        <h1 class="text-2xl font-black italic tracking-tighter text-slate-900">MANANA<span class="text-green-600">AI</span></h1>
        <div class="flex gap-3">
            <button onclick="toggleView('main')" id="tab-main" class="px-4 py-2 font-bold text-sm tab-active">Live Feed</button>
            <button onclick="toggleView('math')" id="tab-math" class="px-4 py-2 font-bold text-sm text-slate-400">Math Bets 🧮</button>
            <button onclick="toggleView('portfolio')" id="tab-port" class="px-4 py-2 font-bold text-sm text-slate-400">Portfolio</button>
            <button onclick="document.getElementById('setup').classList.toggle('hidden')" class="p-2 bg-white rounded-full shadow-sm border border-slate-200">⚙️</button>
        </div>
    </nav>

    <div id="setup" class="max-w-5xl mx-auto mb-8 hidden bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm space-y-6">
        <div id="league-categories" class="space-y-6 text-left"></div>
    </div>

    <div id="view-math" class="max-w-5xl mx-auto hidden space-y-4">
        <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
            <div>
                <h2 class="text-xl font-black text-slate-900">Statistical Engine</h2>
                <p id="math-status" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Smart Fetch: Next & Recent</p>
            </div>
            <button onclick="scanMathBets()" id="math-scan-btn" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition">Smart Scan 🚀</button>
        </div>
        <div id="math-feed" class="grid gap-4">
            <div class="text-center py-20 text-slate-400 font-bold">Нажмите Smart Scan для анализа</div>
        </div>
    </div>

    <div id="view-main" class="max-w-5xl mx-auto"></div>

    <script>
        const API_KEY = "3"; 
        const LEAGUES = {
            'soccer_epl': {id: '4328', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League'}, 
            'soccer_england_league1': {id: '4396', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 League One'},
            'soccer_england_championship': {id: '4329', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Championship'},
            'soccer_germany_bundesliga': {id: '4331', name: '🇩🇪 Bundesliga'}
        };

        let selectedLeagues = ['soccer_epl', 'soccer_england_league1'];

        async function scanMathBets() {
            const btn = document.getElementById('math-scan-btn');
            const feed = document.getElementById('math-feed');
            const statusLabel = document.getElementById('math-status');
            
            btn.innerText = "Analyzing... ⏳";
            feed.innerHTML = `<div class="p-10 text-center animate-pulse font-black text-blue-600 text-sm">ПОИСК ДОСТУПНЫХ ДАННЫХ...</div>`;
            
            let mathSignals = [];
            const activeIds = selectedLeagues.map(key => LEAGUES[key].id);

            try {
                for (let id of activeIds) {
                    statusLabel.innerText = `Лига ${id}: Сбор данных...`;
                    
                    // 1. Загрузка таблицы (Season Fallback)
                    let table = null;
                    for (let s of ["2025-2026", "2024-2025"]) {
                        let resT = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/lookuptable.php?l=${id}&s=${s}`);
                        let tData = await resT.json();
                        if (tData.table) { table = tData.table; break; }
                    }
                    if (!table) continue;

                    // 2. Сбор матчей: Сначала Будущие, если пусто — Прошедшие (для теста)
                    let matches = [];
                    let resNext = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/eventsnextleague.php?id=${id}`);
                    let dataNext = await resNext.json();
                    
                    if (dataNext.events) {
                        matches = dataNext.events;
                    } else {
                        // Fallback: берем последние 5 игр, чтобы показать работу движка
                        let resPast = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/eventspastleague.php?id=${id}`);
                        let dataPast = await resPast.json();
                        if (dataPast.events) matches = dataPast.events.slice(0, 5);
                    }

                    matches.forEach(ev => {
                        const home = table.find(t => t.idTeam === ev.idHomeTeam || t.strTeam === ev.strHomeTeam);
                        const away = table.find(t => t.idTeam === ev.idAwayTeam || t.strTeam === ev.strAwayTeam);

                        if (home && away) {
                            const hP = Math.max(parseInt(home.intPlayed || 1), 1);
                            const aP = Math.max(parseInt(away.intPlayed || 1), 1);
                            const hGF = (parseFloat(home.intGoalsFor || 0) / hP);
                            const aGF = (parseFloat(away.intGoalsFor || 0) / aP);
                            const expT = (hGF + aGF).toFixed(2);

                            mathSignals.push({
                                match: `${ev.strHomeTeam} v ${ev.strAwayTeam}`,
                                league: ev.strLeague,
                                hPPM: (parseFloat(home.intPoints || 0) / hP).toFixed(2),
                                aPPM: (parseFloat(away.intPoints || 0) / aP).toFixed(2),
                                expTotal: expT,
                                recommendation: expT > 2.5 ? "OVER 2.5" : "UNDER 2.5",
                                status: ev.strStatus || 'Scheduled'
                            });
                        }
                    });
                }

                if (mathSignals.length === 0) {
                    feed.innerHTML = `<div class="p-10 border-2 border-dashed rounded-[40px] text-slate-400">API не отдает матчи для выбранных лиг. Попробуйте сменить лиги.</div>`;
                } else {
                    feed.innerHTML = mathSignals.map(sig => `
                        <div class="card bg-white p-6 rounded-[32px] border border-slate-100 flex justify-between items-center shadow-sm">
                            <div class="text-left">
                                <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">${sig.league} | ${sig.status}</span>
                                <h2 class="text-xl font-black text-slate-900 leading-tight">${sig.match}</h2>
                                <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase">PPM: H ${sig.hPPM} / A ${sig.aPPM}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-black text-slate-400 uppercase leading-none mb-1">Exp. Goals</p>
                                <p class="text-2xl font-black italic text-blue-600">${sig.expTotal}</p>
                                <p class="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 rounded inline-block uppercase mt-1">${sig.recommendation}</p>
                            </div>
                        </div>`).join('');
                }
                statusLabel.innerText = `Найдено записей: ${mathSignals.length}`;
            } catch (e) {
                feed.innerHTML = `<div class="p-10 text-red-500">Ошибка: ${e.message}</div>`;
            } finally {
                btn.innerText = "Smart Scan 🚀";
            }
        }

        function renderLeagueSelection() {
            const container = document.getElementById('league-categories');
            container.innerHTML = `
                <div class="grid grid-cols-2 gap-2">
                    ${Object.entries(LEAGUES).map(([key, data]) => `
                        <div onclick="toggleLeague('${key}')" class="p-3 rounded-2xl border text-[11px] font-bold cursor-pointer transition-all ${selectedLeagues.includes(key) ? 'active-league' : 'bg-slate-50 text-slate-500'}">
                            ${data.name}
                        </div>
                    `).join('')}
                </div>`;
        }

        function toggleLeague(key) {
            selectedLeagues = selectedLeagues.includes(key) ? selectedLeagues.filter(i => i !== key) : [...selectedLeagues, key];
            renderLeagueSelection();
        }

        function toggleView(view) {
            document.getElementById('view-math').classList.toggle('hidden', view !== 'math');
        }

        renderLeagueSelection();
    </script>
</body>
</html>
