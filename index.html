<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinnacle Elite | Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        body { background: #F1F5F9; font-family: 'Inter', sans-serif; color: #1E293B; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .match-card { background: white; border-radius: 16px; border: 1px solid #E2E8F0; transition: all 0.2s ease; }
        .match-card.is-fav { border-left: 4px solid #F59E0B; }
        .market-box { background: #F8FAFC; border-radius: 10px; padding: 10px; border: 1px solid #E2E8F0; }
        .label-u { font-size: 9px; color: #64748B; font-weight: 800; text-transform: uppercase; }
        .changed-down { animation: flash-green 2s forwards; }
        .changed-up { animation: flash-red 2s forwards; }
        @keyframes flash-green { 0% { background: #DCFCE7; } 100% { background: transparent; } }
        @keyframes flash-red { 0% { background: #FEE2E2; } 100% { background: transparent; } }
        .btn-active { background: #2563EB !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto">
        <header class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                <div>
                    <h1 class="text-2xl font-black tracking-tighter">PINNACLE<span class="text-blue-600">ELITE</span></h1>
                    <div id="api-status" class="text-[10px] font-bold text-slate-400 uppercase mt-1 italic">Ready</div>
                </div>
                <div class="flex gap-2">
                    <button onclick="bruteForceScan()" id="scan-btn" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold text-xs uppercase hover:bg-slate-800 transition-all">Deep Brute Sync ⚡</button>
                    <button onclick="toggleFavMode()" id="fav-toggle" class="bg-white border border-slate-200 px-6 py-2.5 rounded-xl font-bold text-xs uppercase hover:bg-amber-50">Favorites ⭐</button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-6 gap-4 border-t pt-6">
                <input type="text" id="search" oninput="render()" placeholder="Search team or league..." class="bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                
                <select id="date-filter" onchange="render()" class="bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm outline-none">
                    <option value="all">All Dates</option>
                    <option value="today">Today</option>
                    <option value="tomorrow">Tomorrow</option>
                </select>

                <select id="sort-filter" onchange="render()" class="bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm outline-none">
                    <option value="time">Sort by Time</option>
                    <option value="total-desc">Total (High-Low)</option>
                    <option value="spread-desc">Handicap (High-Low)</option>
                </select>

                <button onclick="toggleLowOddsFilter()" id="low-odds-btn" class="bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm font-bold text-slate-600 hover:bg-slate-100 uppercase">Odds < 1.90</button>
            </div>
        </header>

        <div id="scanner-feed" class="space-y-4"></div>
    </div>

    <script>
        const API_KEY = 'f3478125e1684304dae1ac720ced58fe';
        let db = JSON.parse(localStorage.getItem('pin_pro_db')) || {};
        let favorites = JSON.parse(localStorage.getItem('pin_favs')) || [];
        let favMode = false;
        let lowOddsFilter = false;

        // Таймеры обновлений (последнее обновление для каждого матча)
        let lastUpdateTimes = JSON.parse(localStorage.getItem('pin_updates')) || {};

        function getUpdateInterval(commenceTime) {
            const hours = (new Date(commenceTime) - new Date()) / (1000 * 60 * 60);
            if (hours <= 1) return 5;
            if (hours <= 2) return 15;
            if (hours <= 6) return 30;
            if (hours <= 12) return 60;
            return 240;
        }

        function toggleFav(id) {
            if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('pin_favs', JSON.stringify(favorites));
            render();
        }

        function toggleFavMode() {
            favMode = !favMode;
            document.getElementById('fav-toggle').classList.toggle('btn-active', favMode);
            render();
        }

        function toggleLowOddsFilter() {
            lowOddsFilter = !lowOddsFilter;
            document.getElementById('low-odds-btn').classList.toggle('btn-active', lowOddsFilter);
            render();
        }

        async function bruteForceScan() {
            const btn = document.getElementById('scan-btn');
            const status = document.getElementById('api-status');
            btn.disabled = true;

            try {
                const sportsRes = await fetch(`https://api.the-odds-api.com/v4/sports/?apiKey=${API_KEY}`);
                const sports = await sportsRes.json();
                const soccer = sports.filter(s => s.group === 'Soccer' && s.active);

                for (let league of soccer) {
                    status.innerText = `Scanning ${league.title}...`;
                    const res = await fetch(`https://api.the-odds-api.com/v4/sports/${league.key}/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h,spreads,totals&bookmakers=pinnacle`);
                    const matches = await res.json();
                    
                    if (Array.isArray(matches)) {
                        matches.forEach(m => {
                            db[m.id] = m;
                            lastUpdateTimes[m.id] = Date.now();
                        });
                        localStorage.setItem('pin_pro_db', JSON.stringify(db));
                        localStorage.setItem('pin_updates', JSON.stringify(lastUpdateTimes));
                        render();
                    }
                    await new Promise(r => setTimeout(r, 150));
                }
                status.innerText = "Full Sync Complete";
            } catch (e) { status.innerText = "Error: " + e.message; }
            finally { btn.disabled = false; }
        }

        function getOddsUI(matchId, market, price, name) {
            if (!price) return `<span class="text-slate-300">—</span>`;
            const key = `h_${matchId}_${market}_${name}`;
            const prev = parseFloat(localStorage.getItem(key)) || price;
            const start = parseFloat(localStorage.getItem(key+'_s')) || price;
            if (!localStorage.getItem(key+'_s')) localStorage.setItem(key+'_s', price);
            
            let flash = "";
            if (price < prev) flash = "changed-down";
            if (price > prev) flash = "changed-up";
            localStorage.setItem(key, price);

            const diff = (price - start).toFixed(2);
            const trend = diff > 0 ? 'text-red-500' : diff < 0 ? 'text-green-500' : 'text-slate-400';

            return `<div class="${flash} p-1 rounded transition-all">
                <div class="mono text-lg font-bold">${price.toFixed(2)}</div>
                <div class="text-[9px] font-bold ${trend}">${diff != 0 ? (diff > 0 ? '↑' : '↓') + Math.abs(diff) : '0.00'}</div>
            </div>`;
        }

        function render() {
            const feed = document.getElementById('scanner-feed');
            const search = document.getElementById('search').value.toLowerCase();
            const dateVal = document.getElementById('date-filter').value;
            const sortVal = document.getElementById('sort-filter').value;
            const now = new Date();

            let list = Object.values(db).filter(m => {
                const mDate = new Date(m.commence_time);
                if (mDate < now) return false;

                // Избранное
                if (favMode && !favorites.includes(m.id)) return false;

                // Поиск
                const matchName = (m.home_team + m.away_team + m.sport_title).toLowerCase();
                if (search && !matchName.includes(search)) return false;

                // Дата
                if (dateVal === 'today' && mDate.getDate() !== now.getDate()) return false;
                if (dateVal === 'tomorrow') {
                    const tom = new Date(); tom.setDate(tom.getDate() + 1);
                    if (mDate.getDate() !== tom.getDate()) return false;
                }

                // Фильтр < 1.90
                if (lowOddsFilter) {
                    const pin = m.bookmakers.find(b => b.key === 'pinnacle');
                    const hasLow = pin?.markets.some(mk => mk.outcomes.some(o => o.price < 1.90));
                    if (!hasLow) return false;
                }

                return true;
            });

            // Сортировка
            list.sort((a, b) => {
                const pinA = a.bookmakers.find(bk => bk.key === 'pinnacle');
                const pinB = b.bookmakers.find(bk => bk.key === 'pinnacle');
                
                if (sortVal === 'total-desc') {
                    const tA = pinA?.markets.find(m => m.key === 'totals')?.outcomes[0]?.point || 0;
                    const tB = pinB?.markets.find(m => m.key === 'totals')?.outcomes[0]?.point || 0;
                    return tB - tA;
                }
                if (sortVal === 'spread-desc') {
                    const sA = Math.abs(pinA?.markets.find(m => m.key === 'spreads')?.outcomes[0]?.point || 0);
                    const sB = Math.abs(pinB?.markets.find(m => m.key === 'spreads')?.outcomes[0]?.point || 0);
                    return sB - sA;
                }
                return new Date(a.commence_time) - new Date(b.commence_time);
            });

            feed.innerHTML = list.map(m => {
                const pin = m.bookmakers.find(b => b.key === 'pinnacle');
                if (!pin) return '';

                let h2h = {}, spr = {p:0}, tot = {p:0};
                pin.markets.forEach(mk => {
                    if (mk.key === 'h2h') mk.outcomes.forEach(o => h2h[o.name] = o.price);
                    if (mk.key === 'spreads') { spr.p = mk.outcomes[0]?.point; mk.outcomes.forEach(o => spr[o.name] = o.price); }
                    if (mk.key === 'totals') { tot.p = mk.outcomes.find(o => o.name === 'Over')?.point; mk.outcomes.forEach(o => tot[o.name] = o.price); }
                });

                const isFav = favorites.includes(m.id);
                const nextUpd = lastUpdateTimes[m.id] ? (getUpdateInterval(m.commence_time) * 60) - Math.floor((Date.now() - lastUpdateTimes[m.id]) / 1000) : 0;

                return `
                <div class="match-card p-5 grid grid-cols-12 gap-4 items-center ${isFav ? 'is-fav' : ''}">
                    <div class="col-span-3">
                        <div class="flex items-center gap-2 mb-1">
                            <button onclick="toggleFav('${m.id}')" class="text-lg">${isFav ? '⭐' : '☆'}</button>
                            <span class="text-[9px] font-black text-blue-600 uppercase truncate">${m.sport_title}</span>
                        </div>
                        <div class="font-extrabold text-sm uppercase">${m.home_team}</div>
                        <div class="font-extrabold text-sm uppercase text-slate-400">${m.away_team}</div>
                        <div class="mt-2 flex items-center gap-2">
                            <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded font-bold">${new Date(m.commence_time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                            <span class="text-[10px] text-blue-500 font-bold mono">🔄 ${nextUpd > 0 ? Math.floor(nextUpd/60)+':'+(nextUpd%60).toString().padStart(2,'0') : 'Next Scan'}</span>
                        </div>
                    </div>
                    
                    <div class="col-span-3 grid grid-cols-3 gap-1">
                        <div class="market-box text-center"><span class="label-u">1</span>${getOddsUI(m.id, 'h2h', h2h[m.home_team], '1')}</div>
                        <div class="market-box text-center"><span class="label-u">X</span>${getOddsUI(m.id, 'h2h', h2h['Draw'], 'X')}</div>
                        <div class="market-box text-center"><span class="label-u">2</span>${getOddsUI(m.id, 'h2h', h2h[m.away_team], '2')}</div>
                    </div>

                    <div class="col-span-3 market-box">
                        <div class="flex justify-between items-center mb-1"><span class="label-u">Handicap</span><span class="text-xs font-bold text-blue-600">${spr.p}</span></div>
                        <div class="flex justify-around">${getOddsUI(m.id, 'spr', spr[m.home_team], 'H')} ${getOddsUI(m.id, 'spr', spr[m.away_team], 'A')}</div>
                    </div>

                    <div class="col-span-3 market-box">
                        <div class="flex justify-between items-center mb-1"><span class="label-u">Total</span><span class="text-xs font-bold text-orange-600">${tot.p}</span></div>
                        <div class="flex justify-around">${getOddsUI(m.id, 'tot', tot['Over'], 'O')} ${getOddsUI(m.id, 'tot', tot['Under'], 'U')}</div>
                    </div>
                </div>`;
            }).join('');
        }

        // Живой таймер для всех матчей
        setInterval(() => {
            render(); 
        }, 1000);

        render();
    </script>
</body>
</html>
