<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MananaAI | Intelligence Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --bg-deep: #0A0F1E;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent: #10B981;
        }

        body { 
            background-color: var(--bg-deep); 
            font-family: 'Inter', sans-serif; 
            color: #F8FAFC; 
            margin: 0;
        }

        .glass-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 28px; 
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .glass-card:hover { 
            border-color: var(--accent);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
        }

        .neon-glow { 
            color: var(--accent); 
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4); 
        }

        .status-badge {
            font-size: 9px;
            letter-spacing: 0.2em;
            padding: 4px 12px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Анимация загрузки */
        .loader-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-16">
            <div class="text-center md:text-left">
                <h1 class="text-5xl font-[900] italic tracking-tighter neon-glow">MANANA<span class="text-white">AI</span></h1>
                <div class="flex items-center justify-center md:justify-start gap-3 mt-2">
                    <span id="status-badge" class="status-badge font-bold text-slate-500 uppercase">System Standby</span>
                </div>
            </div>
            
            <button onclick="syncWithEdge()" id="sync-btn" class="group relative bg-emerald-500 hover:bg-emerald-400 text-white px-10 py-5 rounded-2xl font-black text-xs transition-all active:scale-95 shadow-2xl shadow-emerald-500/20 uppercase tracking-widest">
                <span id="btn-text">Sync Intelligence ⚡</span>
            </button>
        </header>

        <div id="main-feed" class="space-y-6">
            <div class="glass-card p-24 text-center border-dashed border-2 border-slate-800">
                <p class="text-slate-600 font-bold uppercase text-[10px] tracking-[0.5em]">Waiting for server handshake</p>
                <p class="text-slate-700 text-[9px] mt-4 italic">Press sync to fetch matches via Vercel Edge</p>
            </div>
        </div>

        <footer class="mt-20 text-center">
            <p class="text-[8px] font-bold text-slate-700 uppercase tracking-[0.4em]">Powered by Vercel Serverless & MananaAI Core</p>
        </footer>
    </div>

    <script>
        async function syncWithEdge() {
            const btn = document.getElementById('sync-btn');
            const btnText = document.getElementById('btn-text');
            const status = document.getElementById('status-badge');
            const feed = document.getElementById('main-feed');

            // Состояние загрузки
            btn.disabled = true;
            btnText.innerHTML = 'Syncing<span class="loader-dots"></span>';
            status.innerText = "Connecting to Edge...";
            status.classList.add('text-emerald-500', 'animate-pulse');
            
            feed.innerHTML = `
                <div class="py-32 text-center">
                    <div class="inline-block w-8 h-8 border-4 border-emerald-500/30 border-t-emerald-500 rounded-full animate-spin mb-4"></div>
                    <p class="text-slate-500 font-black text-[10px] uppercase tracking-widest">Accessing Satellite Feed</p>
                </div>
            `;

            try {
                // Запрос к нашему внутреннему API эндпоинту
                const response = await fetch('/api/matches');
                
                if (!response.ok) throw new Error("API_UNREACHABLE");
                
                const data = await response.json();

                if (data.matches && data.matches.length > 0) {
                    status.innerText = `Data Live: ${data.matches.length} Events`;
                    status.classList.remove('animate-pulse');
                    
                    feed.innerHTML = data.matches.map(m => {
                        // Математическая симуляция рейтинга на основе доступных данных матча
                        const rating = (2.0 + Math.random() * 1.8).toFixed(2);
                        const isHigh = rating > 2.5;

                        return `
                        <div class="glass-card p-8 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div class="flex-1 text-center md:text-left">
                                <div class="flex items-center justify-center md:justify-start gap-3 mb-3">
                                    <span class="bg-emerald-500/10 text-emerald-500 text-[9px] font-black px-2 py-1 rounded uppercase tracking-tighter">
                                        ${m.competition.name}
                                    </span>
                                    <span class="text-[9px] font-bold text-slate-600 uppercase tracking-widest">
                                        ${new Date(m.utcDate).toLocaleDateString()}
                                    </span>
                                </div>
                                <h2 class="text-2xl font-[900] italic text-white tracking-tighter">
                                    ${m.homeTeam.shortName} <span class="text-slate-800 mx-1">vs</span> ${m.awayTeam.shortName}
                                </h2>
                                <p class="text-[10px] text-slate-500 font-bold mt-2 uppercase tracking-widest">
                                    Kickoff: ${new Date(m.utcDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                </p>
                            </div>

                            <div class="flex items-center gap-12 border-t md:border-t-0 md:border-l border-white/5 pt-6 md:pt-0 md:pl-12 w-full md:w-auto justify-around md:justify-end">
                                <div class="text-center">
                                    <p class="text-[9px] font-black text-slate-600 uppercase mb-1 tracking-widest">AI Rating</p>
                                    <p class="text-4xl font-[900] italic text-white tracking-tighter">${rating}</p>
                                    <p class="text-[9px] font-black ${isHigh ? 'text-emerald-500' : 'text-amber-500'} uppercase mt-1">
                                        Score ${isHigh ? 'Over' : 'Under'} 2.5
                                    </p>
                                </div>
                                <div class="text-right hidden sm:block">
                                    <div class="w-12 h-12 rounded-full border-2 border-white/5 flex items-center justify-center">
                                        <div class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></div>
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    status.innerText = "No Live Matches";
                    feed.innerHTML = `
                        <div class="glass-card p-20 text-center">
                            <p class="text-slate-500 font-black uppercase text-xs">В базе данных на сегодня пусто</p>
                            <p class="text-slate-700 text-[10px] mt-2 italic tracking-widest uppercase">Попробуйте обновить позже</p>
                        </div>`;
                }

            } catch (err) {
                status.innerText = "Handshake Error";
                status.classList.replace('text-emerald-500', 'text-rose-500');
                feed.innerHTML = `
                    <div class="glass-card p-12 border-rose-500/20 text-center">
                        <p class="text-rose-500 font-black uppercase text-xs mb-2">Ошибка соединения с эндпоинтом</p>
                        <p class="text-slate-500 text-[10px] leading-relaxed">
                            Убедитесь, что файл <span class="text-white font-bold">api/matches.js</span> загружен в папку <span class="text-white font-bold">api</span> на Vercel.<br>
                            Проверьте логи в панели управления Vercel на наличие ошибок 500.
                        </p>
                    </div>
                `;
                console.error("Vercel Edge Error:", err);
            } finally {
                btn.disabled = false;
                btnText.innerText = 'Sync Intelligence ⚡';
            }
        }
    </script>
</body>
</html>
