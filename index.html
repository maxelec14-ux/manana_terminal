<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MananaAI | White Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            background: #F4F7FA; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #1E293B; 
        }

        .main-card {
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #E2E8F0;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .main-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .form-dot {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 800;
            color: white;
            text-transform: uppercase;
        }

        .dot-w { background: #10B981; } /* Win */
        .dot-d { background: #94A3B8; } /* Draw */
        .dot-l { background: #F43F5E; } /* Loss */

        .stat-label {
            font-size: 9px;
            font-weight: 700;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-league {
            background: #F1F5F9;
            color: #475569;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
        }

        input, select {
            background: white;
            border: 1px solid #CBD5E1;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 13px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus, select:focus {
            border-color: #6366F1;
            ring: 2px ring #6366F1;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-slate-900">MANANA<span class="text-indigo-600">AI</span></h1>
                <p class="text-sm text-slate-500 font-medium mt-1">Professional Football Analytics Suite</p>
            </div>
            <button onclick="updateData()" id="update-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-2xl font-bold text-sm transition shadow-lg shadow-indigo-200 active:scale-95 flex items-center gap-2">
                <span>UPDATE ANALYTICS</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </header>

        <div class="main-card p-6 mb-8 grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
            <div class="flex flex-col gap-1">
                <label class="stat-label">League</label>
                <select id="f-league" onchange="applyFilters()"><option value="all">All Competitions</option></select>
            </div>
            <div class="flex flex-col gap-1">
                <label class="stat-label">Min PPM Diff</label>
                <input type="number" id="f-ppm" step="0.1" value="0" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="stat-label">Min Exp. Total</label>
                <input type="number" id="f-total" step="0.1" value="0" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="stat-label">Event Date</label>
                <input type="date" id="f-date" onchange="applyFilters()">
            </div>
            <div class="text-right pb-3">
                <span id="match-count" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-full">0 Matches</span>
            </div>
        </div>

        <div id="feed" class="space-y-6">
            <div class="text-center py-24 opacity-40">
                <p class="font-bold uppercase tracking-[0.2em] text-sm">System ready for synchronization</p>
            </div>
        </div>
    </div>

    <script>
        let RAW_DATA = [];

        async function updateData() {
            const btn = document.getElementById('update-btn');
            const feed = document.getElementById('feed');
            btn.disabled = true;
            feed.innerHTML = '<div class="text-center py-20 font-bold text-slate-400 animate-pulse">Syncing satellite data...</div>';

            try {
                const res = await fetch('/api/matches');
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);

                RAW_DATA = data.matches.map(m => {
                    const leagueTable = data.standings[m.competition.code] || [];
                    const hTeam = leagueTable.find(t => t.team.id === m.homeTeam.id);
                    const aTeam = leagueTable.find(t => t.team.id === m.awayTeam.id);

                    if (!hTeam || !aTeam) return null;

                    const hPPM = (hTeam.points / hTeam.playedGames).toFixed(2);
                    const aPPM = (aTeam.points / aTeam.playedGames).toFixed(2);
                    const hGF = (hTeam.goalsFor / hTeam.playedGames).toFixed(2);
                    const hGA = (hTeam.goalsAgainst / hTeam.playedGames).toFixed(2);
                    const aGF = (aTeam.goalsFor / aTeam.playedGames).toFixed(2);
                    const aGA = (aTeam.goalsAgainst / aTeam.playedGames).toFixed(2);

                    const expTotal = (parseFloat(hGF) + parseFloat(aGA) + parseFloat(aGF) + parseFloat(hGA)) / 2;
                    const ppmDiff = (hPPM - aPPM).toFixed(2);

                    return {
                        league: m.competition.name,
                        code: m.competition.code,
                        date: m.utcDate.split('T')[0],
                        time: new Date(m.utcDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                        home: m.homeTeam.shortName,
                        away: m.awayTeam.shortName,
                        hForm: hTeam.form ? hTeam.form.split(',') : [],
                        aForm: aTeam.form ? aTeam.form.split(',') : [],
                        hPPM, aPPM, hGF, hGA, aGF, aGA,
                        ppmDiff: Math.abs(ppmDiff),
                        expTotal: expTotal.toFixed(2),
                        handicap: (ppmDiff * 0.8).toFixed(2),
                        oddsH: (1 / (0.32 + (ppmDiff * 0.21))).toFixed(2),
                        oddsA: (1 / (0.32 - (ppmDiff * 0.21))).toFixed(2)
                    };
                }).filter(i => i !== null);

                updateLeagueDropdown();
                applyFilters();

            } catch (err) {
                feed.innerHTML = `<div class="p-10 text-center text-red-500 font-bold">Error: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function createFormDots(formArray) {
            if (!formArray || formArray.length === 0) return '<span class="text-[10px] text-slate-300">N/A</span>';
            return formArray.slice(0, 5).map(f => {
                const char = f.trim().charAt(0);
                const cls = char === 'W' ? 'dot-w' : (char === 'D' ? 'dot-d' : 'dot-l');
                return `<div class="form-dot ${cls}">${char}</div>`;
            }).join('');
        }

        function applyFilters() {
            const league = document.getElementById('f-league').value;
            const date = document.getElementById('f-date').value;
            const ppm = parseFloat(document.getElementById('f-ppm').value) || 0;
            const total = parseFloat(document.getElementById('f-total').value) || 0;

            const filtered = RAW_DATA.filter(m => {
                return (league === 'all' || m.code === league) &&
                       (!date || m.date === date) &&
                       (m.ppmDiff >= ppm) &&
                       (parseFloat(m.expTotal) >= total);
            });

            document.getElementById('match-count').innerText = `${filtered.length} Matches`;
            render(filtered);
        }

        function render(matches) {
            const feed = document.getElementById('feed');
            if (matches.length === 0) {
                feed.innerHTML = '<div class="text-center py-20 text-slate-400 font-bold">No data found for selected filters</div>';
                return;
            }

            feed.innerHTML = matches.map(m => `
                <div class="main-card p-6 md:p-8">
                    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-8">
                        
                        <div class="flex-1 w-full">
                            <div class="flex items-center gap-3 mb-4">
                                <span class="badge-league">${m.league}</span>
                                <span class="text-xs font-bold text-slate-400">${m.date} • ${m.time}</span>
                            </div>
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div>
                                    <div class="text-xl font-extrabold text-slate-900 mb-2">${m.home}</div>
                                    <div class="flex gap-1.5 mb-3">${createFormDots(m.hForm)}</div>
                                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                                        PPM: ${m.hPPM} | GF: ${m.hGF} | GA: ${m.hGA}
                                    </div>
                                </div>
                                <div>
                                    <div class="text-xl font-extrabold text-slate-900 mb-2">${m.away}</div>
                                    <div class="flex gap-1.5 mb-3">${createFormDots(m.aForm)}</div>
                                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">
                                        PPM: ${m.aPPM} | GF: ${m.aGF} | GA: ${m.aGA}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="flex flex-row md:flex-row lg:flex-col gap-6 w-full lg:w-48 lg:border-l border-slate-100 lg:pl-10 justify-between">
                            <div>
                                <p class="stat-label mb-1">Exp. Total</p>
                                <p class="text-3xl font-extrabold text-indigo-600 tracking-tight">${m.expTotal}</p>
                            </div>
                            <div>
                                <p class="stat-label mb-1">AI Handicap</p>
                                <p class="text-2xl font-extrabold text-slate-900 tracking-tight">${m.handicap > 0 ? '-' : '+'}${Math.abs(m.handicap)}</p>
                            </div>
                        </div>

                        <div class="flex flex-row md:flex-row lg:flex-col gap-6 w-full lg:w-32 lg:border-l border-slate-100 lg:pl-10 justify-between">
                            <div>
                                <p class="stat-label mb-1">Prob. H</p>
                                <p class="text-lg font-bold text-slate-900">@${m.oddsH}</p>
                            </div>
                            <div>
                                <p class="stat-label mb-1">Prob. A</p>
                                <p class="text-lg font-bold text-slate-900">@${m.oddsA}</p>
                            </div>
                        </div>

                    </div>
                </div>
            `).join('');
        }

        function updateLeagueDropdown() {
            const select = document.getElementById('f-league');
            const unique = [];
            const map = new Map();
            for (const item of RAW_DATA) {
                if(!map.has(item.code)){
                    map.set(item.code, true);
                    unique.push({code: item.code, name: item.league});
                }
            }
            select.innerHTML = '<option value="all">All Competitions</option>' + 
                unique.map(l => `<option value="${l.code}">${l.name}</option>`).join('');
        }
    </script>
</body>
</html>
