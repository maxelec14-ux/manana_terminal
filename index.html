<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinnacle Sharp | Pro Market Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body { background: #0F172A; font-family: 'JetBrains Mono', monospace; color: #F1F5F9; }
        .match-row { background: #1E293B; border: 1px solid #334155; transition: 0.2s; border-radius: 16px; margin-bottom: 12px; }
        .market-card { background: #0F172A; border-radius: 12px; padding: 12px; border: 1px solid #334155; }
        .label-u { font-size: 9px; color: #64748B; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .odds-val { font-size: 16px; font-weight: 800; color: #F1F5F9; }
        .point-val { font-size: 11px; color: #3B82F6; font-weight: 800; background: rgba(59, 130, 246, 0.1); padding: 2px 6px; border-radius: 4px; }
        .delta-down { color: #22C55E; } .delta-up { color: #EF4444; }
        .flash-move { animation: pulse-green 1s infinite; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-end mb-8 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-blue-500 uppercase">PINNACLE<span class="text-white">SHARP</span></h1>
                <p class="text-xs font-bold text-slate-500 uppercase mt-1">Full Market Scanner: 1X2 • Handicap • Totals</p>
            </div>
            <div class="flex gap-8 items-center">
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Refresh in</p>
                    <p id="timer" class="text-xl font-black text-blue-400">15:00</p>
                </div>
                <button onclick="scanPinnacle()" id="scan-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-lg text-xs font-black uppercase tracking-widest transition-all">Force Scan ⚡</button>
            </div>
        </header>

        <div id="scanner-feed" class="space-y-4">
            </div>
    </div>

    <script>
        const API_KEY = 'f3478125e1684304dae1ac720ced58fe';
        const ODDS_URL = `https://api.the-odds-api.com/v4/sports/soccer/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h,spreads,totals&bookmakers=pinnacle&oddsFormat=decimal`;
        
        let oddsHistory = JSON.parse(localStorage.getItem('pin_pro_v1')) || {};

        async function scanPinnacle() {
            const btn = document.getElementById('scan-btn');
            btn.disabled = true;
            try {
                const response = await fetch(ODDS_URL);
                const data = await response.json();
                if (!Array.isArray(data)) throw new Error("API Limit or Key Error");
                renderScanner(data);
                resetTimer();
            } catch (e) {
                document.getElementById('scanner-feed').innerHTML = `<div class="p-20 text-center text-red-500 font-bold">${e.message}</div>`;
            } finally { btn.disabled = false; }
        }

        function trackOdds(matchId, marketKey, currentPrice) {
            if (!currentPrice) return { val: '—', delta: '', fresh: false };
            const key = `${matchId}_${marketKey}`;
            const history = oddsHistory[key] || { start: currentPrice, last: currentPrice };
            const totalDiff = (currentPrice - history.start).toFixed(2);
            const isFresh = currentPrice < history.last;
            
            oddsHistory[key] = { start: history.start, last: currentPrice };
            localStorage.setItem('pin_pro_v1', JSON.stringify(oddsHistory));

            let color = 'text-slate-500';
            let arrow = '';
            if (currentPrice < history.start) { color = 'delta-down'; arrow = '↓'; }
            else if (currentPrice > history.start) { color = 'delta-up'; arrow = '↑'; }

            return {
                val: currentPrice.toFixed(2),
                info: `<span class="text-[10px] ${color} font-bold">${arrow} ${Math.abs(totalDiff)}</span>`,
                fresh: isFresh
            };
        }

        function renderScanner(matches) {
            const container = document.getElementById('scanner-feed');
            container.innerHTML = matches.map(m => {
                const pin = m.bookmakers.find(b => b.key === 'pinnacle');
                if (!pin) return '';

                let h2h = {h:null, d:null, a:null}, spread = {h:null, a:null, p:null}, total = {o:null, u:null, p:null};

                // Parse Markets
                pin.markets.forEach(mk => {
                    if (mk.key === 'h2h') {
                        h2h.h = mk.outcomes.find(o => o.name === m.home_team)?.price;
                        h2h.a = mk.outcomes.find(o => o.name === m.away_team)?.price;
                        h2h.d = mk.outcomes.find(o => o.name === 'Draw')?.price;
                    }
                    if (mk.key === 'spreads') {
                        const homeSide = mk.outcomes.find(o => o.name === m.home_team);
                        const awaySide = mk.outcomes.find(o => o.name === m.away_team);
                        spread.h = homeSide?.price;
                        spread.a = awaySide?.price;
                        spread.p = homeSide?.point; // Номинал форы
                    }
                    if (mk.key === 'totals') {
                        const overSide = mk.outcomes.find(o => o.name === 'Over');
                        const underSide = mk.outcomes.find(o => o.name === 'Under');
                        total.o = overSide?.price;
                        total.u = underSide?.price;
                        total.p = overSide?.point; // Номинал тотала
                    }
                });

                const o1 = trackOdds(m.id, '1', h2h.h);
                const oX = trackOdds(m.id, 'X', h2h.d);
                const o2 = trackOdds(m.id, '2', h2h.a);
                const sph = trackOdds(m.id, 'sph', spread.h);
                const spa = trackOdds(m.id, 'spa', spread.a);
                const tO = trackOdds(m.id, 'tO', total.o);
                const tU = trackOdds(m.id, 'tU', total.u);

                return `
                <div class="match-row p-6">
                    <div class="grid grid-cols-12 gap-6 items-center">
                        <div class="col-span-12 lg:col-span-3">
                            <span class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">${m.sport_title}</span>
                            <h3 class="text-lg font-black mt-1 uppercase">${m.home_team}</h3>
                            <h3 class="text-lg font-black text-slate-500 uppercase">${m.away_team}</h3>
                            <p class="text-[10px] text-slate-600 mt-2 font-bold">${new Date(m.commence_time).toLocaleString()}</p>
                        </div>

                        <div class="col-span-12 lg:col-span-3 grid grid-cols-3 gap-2">
                            <div class="market-card"><span class="label-u">Home</span><span class="odds-val ${o1.fresh?'flash-move':''}">${o1.val}</span>${o1.info}</div>
                            <div class="market-card"><span class="label-u">Draw</span><span class="odds-val ${oX.fresh?'flash-move':''}">${oX.val}</span>${oX.info}</div>
                            <div class="market-card"><span class="label-u">Away</span><span class="odds-val ${o2.fresh?'flash-move':''}">${o2.val}</span>${o2.info}</div>
                        </div>

                        <div class="col-span-12 lg:col-span-3">
                            <div class="market-card h-full">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="label-u">Handicap</span>
                                    <span class="point-val">${spread.p !== null ? (spread.p > 0 ? '+'+spread.p : spread.p) : 'N/A'}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <div><span class="text-[10px] text-slate-500 font-bold mr-2">H</span><span class="odds-val">${sph.val}</span> ${sph.info}</div>
                                    <div class="border-l border-slate-800 h-8 mx-4"></div>
                                    <div><span class="text-[10px] text-slate-500 font-bold mr-2">A</span><span class="odds-val">${spa.val}</span> ${spa.info}</div>
                                </div>
                            </div>
                        </div>

                        <div class="col-span-12 lg:col-span-3">
                            <div class="market-card h-full">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="label-u">Total Goals</span>
                                    <span class="point-val">${total.p || 'N/A'}</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <div><span class="text-[10px] text-slate-500 font-bold mr-2">Over</span><span class="odds-val">${tO.val}</span> ${tO.info}</div>
                                    <div class="border-l border-slate-800 h-8 mx-4"></div>
                                    <div><span class="text-[10px] text-slate-500 font-bold mr-2">Under</span><span class="odds-val">${tU.val}</span> ${tU.info}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        let timeLeft = 900;
        function resetTimer() {
            timeLeft = 900;
            clearInterval(window.t);
            window.t = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').innerText = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}`;
                if (timeLeft <= 0) scanPinnacle();
            }, 1000);
        }

        scanPinnacle();
    </script>
</body>
</html>
