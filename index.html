<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MananaAI | Pro Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0B0F1A; font-family: 'Inter', sans-serif; color: #E2E8F0; }
        .glass-card { background: rgba(17, 24, 39, 0.8); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 20px; }
        
        /* Цвета */
        .c-red { color: #EF4444; } .bg-red { background: #EF4444; }
        .c-yellow { color: #F59E0B; } .bg-yellow { background: #F59E0B; }
        .c-blue { color: #3B82F6; } .bg-blue { background: #3B82F6; }
        .c-green { color: #10B981; } .bg-green { background: #10B981; }

        .stat-bar { height: 4px; border-radius: 2px; margin-top: 4px; transition: 0.3s; opacity: 0.6; }
        
        .league-btn { background: #1E293B; padding: 8px 16px; border-radius: 12px; font-size: 11px; font-weight: 700; transition: 0.2s; border: 1px solid transparent; }
        .league-btn.active { background: #3B82F6; border-color: #60A5FA; }

        input { background: #1E293B; border: 1px solid #334155; color: white; border-radius: 12px; padding: 12px; outline: none; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-black italic tracking-tighter text-blue-500">MANANA<span class="text-white">AI</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">No-Form Intelligence Engine</p>
        </header>

        <div class="mb-6"><input type="text" id="f-search" placeholder="Search by team or league..." oninput="applyFilters()"></div>
        
        <div id="league-container" class="flex flex-wrap gap-2 mb-8">
            <button class="league-btn active" onclick="filterLeague('all', this)">🌍 All</button>
        </div>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20 animate-pulse text-slate-600 uppercase text-xs font-bold">Waiting for Sync...</div>
        </div>
    </div>

    <script>
        let RAW_DATA = [];
        let currentLeague = 'all';

        const flags = { 'England': '🇬🇧', 'Spain': '🇪🇸', 'Germany': '🇩🇪', 'Italy': '🇮🇹', 'France': '🇫🇷', 'Netherlands': '🇳🇱', 'Portugal': '🇵🇹', 'Brazil': '🇧🇷', 'Europe': '🇪🇺' };

        const getParamStyle = (type, val) => {
            val = parseFloat(val);
            if (type === 'ppm') {
                if (val <= 1.0) return 'red';
                if (val <= 1.5) return 'yellow';
                if (val <= 2.0) return 'blue';
                return 'green';
            }
            if (type === 'scored') {
                if (val <= 0.6) return 'red';
                if (val <= 1.3) return 'yellow';
                if (val <= 2.0) return 'blue';
                return 'green';
            }
            if (type === 'conceded') {
                if (val <= 0.6) return 'green';
                if (val <= 1.3) return 'blue';
                if (val <= 2.0) return 'yellow';
                return 'red';
            }
        };

        async function updateData() {
            try {
                const res = await fetch('/api/matches');
                const data = await res.json();
                
                RAW_DATA = data.matches.map(m => {
                    const hT = data.standings[m.homeTeam.id];
                    const aT = data.standings[m.awayTeam.id];
                    if (!hT || !aT) return null;

                    const hPPM = (hT.points / hT.playedGames).toFixed(2);
                    const aPPM = (aT.points / aT.playedGames).toFixed(2);
                    const hS = (hT.goalsFor / hT.playedGames).toFixed(2);
                    const hC = (hT.goalsAgainst / hT.playedGames).toFixed(2);
                    const aS = (aT.goalsFor / aT.playedGames).toFixed(2);
                    const aC = (aT.goalsAgainst / aT.playedGames).toFixed(2);

                    // Прогноз счета (очень упрощенно: Scored + Conceded Opponent / 2)
                    const expH = ((parseFloat(hS) + parseFloat(aC)) / 2).toFixed(0);
                    const expA = ((parseFloat(aS) + parseFloat(hC)) / 2).toFixed(0);

                    return {
                        id: m.id, league: m.competition.name, code: m.competition.code, country: hT.country,
                        home: m.homeTeam.shortName, away: m.awayTeam.shortName,
                        hPPM, aPPM, hS, hC, aS, aC,
                        score: `${expH}:${expA}`,
                        handicap: (hPPM - aPPM).toFixed(2),
                        oddsH: (1.1 + (2 / hPPM)).toFixed(2),
                        oddsA: (1.1 + (2 / aPPM)).toFixed(2)
                    };
                }).filter(i => i !== null);

                renderLeagues();
                applyFilters();
            } catch (e) { console.error(e); }
        }

        function renderLeagues() {
            const container = document.getElementById('league-container');
            const unique = [...new Set(RAW_DATA.map(m => JSON.stringify({code: m.code, name: m.league, country: m.country})))].map(s => JSON.parse(s));
            container.innerHTML = `<button class="league-btn active" onclick="filterLeague('all', this)">🌍 All</button>` + 
                unique.map(l => `<button class="league-btn" onclick="filterLeague('${l.code}', this)">${flags[l.country] || '⚽'} ${l.name}</button>`).join('');
        }

        function filterLeague(code, btn) {
            currentLeague = code;
            document.querySelectorAll('.league-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('f-search').value.toLowerCase();
            const filtered = RAW_DATA.filter(m => {
                const matchesSearch = m.home.toLowerCase().includes(search) || m.away.toLowerCase().includes(search) || m.league.toLowerCase().includes(search);
                const matchesLeague = currentLeague === 'all' || m.code === currentLeague;
                return matchesSearch && matchesLeague;
            });
            render(filtered);
        }

        const createStat = (label, val, type) => {
            const color = getParamStyle(type, val);
            const width = Math.min((val / 3) * 100, 100);
            return `
                <div class="flex-1">
                    <div class="flex justify-between text-[9px] font-bold uppercase mb-1">
                        <span class="text-slate-500">${label}</span>
                        <span class="c-${color}">${val}</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-1">
                        <div class="bg-${color} h-1 rounded-full" style="width: ${width}%"></div>
                    </div>
                </div>`;
        };

        function render(matches) {
            const feed = document.getElementById('feed');
            feed.innerHTML = matches.map(m => `
                <div class="glass-card p-5 md:p-6">
                    <div class="flex justify-between items-center mb-6">
                        <span class="text-[10px] font-black text-blue-400 uppercase tracking-tighter">${m.league}</span>
                        <div class="flex gap-4 text-[10px] font-bold">
                            <span class="text-slate-500">Odds: <span class="text-white">${m.oddsH}</span> / <span class="text-white">${m.oddsA}</span></span>
                            <span class="text-blue-500">Exp: ${m.score}</span>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div>
                            <h3 class="text-xl font-black uppercase mb-4 tracking-tighter">${m.home}</h3>
                            <div class="flex gap-4">
                                ${createStat('PPM', m.hPPM, 'ppm')}
                                ${createStat('Scored', m.hS, 'scored')}
                                ${createStat('Conceded', m.hC, 'conceded')}
                            </div>
                        </div>
                        <div>
                            <h3 class="text-xl font-black uppercase mb-4 tracking-tighter">${m.away}</h3>
                            <div class="flex gap-4">
                                ${createStat('PPM', m.aPPM, 'ppm')}
                                ${createStat('Scored', m.aS, 'scored')}
                                ${createStat('Conceded', m.aC, 'conceded')}
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6 pt-4 border-t border-white/5 flex justify-between items-center">
                        <span class="text-[9px] font-bold text-slate-600 uppercase">AI Handicap: ${m.handicap > 0 ? '-' : '+'}${Math.abs(m.handicap)}</span>
                        <span class="text-[9px] font-bold text-blue-500/50 uppercase italic">Manana Sat-Sync Active</span>
                    </div>
                </div>
            `).join('');
        }

        updateData();
    </script>
</body>
</html>
