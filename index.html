<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Final Recovery Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #F4F7F5; font-family: 'Inter', sans-serif; }
        .match-card { border-radius: 24px; background: white; border: 1px solid #E5E7EB; transition: 0.2s; }
        .match-card:hover { border-color: #10B981; transform: scale(1.01); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-3xl font-[900] italic text-slate-900 tracking-tighter">MANANA<span class="text-emerald-500">AI</span></h1>
                <p id="debug-log" class="text-[10px] font-bold text-rose-500 uppercase tracking-widest mt-1">System Standby</p>
            </div>
            <button onclick="hardResetUpdate()" id="btn-sync" class="bg-emerald-500 text-white px-8 py-4 rounded-2xl font-black text-xs shadow-lg active:scale-95 transition-all">
                FORCE UPDATE ⚡
            </button>
        </header>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20 bg-white rounded-[40px] border-2 border-dashed border-slate-200">
                <p class="text-slate-400 font-bold uppercase text-sm tracking-widest">Нажмите Force Update для глубокого сканирования</p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '1996fa1ffdf0410195fd5b86af739300';
        const LEAGUES = ['PL', 'PD', 'BL1', 'SA', 'FL1', 'CL']; // Самые стабильные лиги
        let STORE = [];

        async function hardResetUpdate() {
            const log = document.getElementById('debug-log');
            const feed = document.getElementById('feed');
            const btn = document.getElementById('btn-sync');

            btn.disabled = true;
            log.className = "text-[10px] font-bold text-emerald-500 uppercase tracking-widest mt-1";
            feed.innerHTML = '<div class="text-center py-20 animate-bounce font-black text-slate-400">CONNECTING...</div>';
            STORE = [];

            for (const code of LEAGUES) {
                log.innerText = `Scanning League: ${code}...`;
                try {
                    // Запрос 1: Таблица (для PPM и голов)
                    const sRes = await fetch(`https://api.football-data.org/v4/competitions/${code}/standings`, { headers: {'X-Auth-Token': API_KEY}});
                    if (sRes.status === 403) { log.innerText = `Error: ${code} no access (403)`; continue; }
                    const sData = await sRes.json();
                    
                    const table = {};
                    if (sData.standings?.[0]) {
                        sData.standings[0].table.forEach(t => {
                            table[t.team.id] = {
                                ppm: (t.points / t.playedGames || 0).toFixed(2),
                                gf: (t.goalsFor / t.playedGames || 0).toFixed(2),
                                ga: (t.goalsAgainst / t.playedGames || 0).toFixed(2)
                            };
                        });
                    }

                    // Запрос 2: Ближайшие матчи (без фильтра по дате, просто 10 следующих)
                    const mRes = await fetch(`https://api.football-data.org/v4/competitions/${code}/matches?status=SCHEDULED`, { headers: {'X-Auth-Token': API_KEY}});
                    const mData = await mRes.json();

                    if (mData.matches?.length > 0) {
                        mData.matches.slice(0, 10).forEach(m => {
                            const h = table[m.homeTeam.id] || { ppm: 0, gf: 0, ga: 0 };
                            const a = table[m.awayTeam.id] || { ppm: 0, gf: 0, ga: 0 };
                            
                            const expT = (parseFloat(h.gf) + parseFloat(a.ga) + parseFloat(a.gf) + parseFloat(h.ga)) / 2;
                            
                            STORE.push({
                                league: sData.competition.name,
                                date: new Date(m.utcDate).toLocaleDateString(),
                                teams: `${m.homeTeam.shortName} vs ${m.awayTeam.shortName}`,
                                hStats: h, aStats: a,
                                expTotal: expT.toFixed(2),
                                diff: (h.ppm - a.ppm).toFixed(2)
                            });
                        });
                        log.innerText = `Success: Found ${mData.matches.length} matches in ${code}`;
                    }
                    
                    await new Promise(r => setTimeout(r, 6500)); // Ждем 6.5 сек для соблюдения лимита

                } catch (e) {
                    log.innerText = `Limit reached. Skipping ${code}...`;
                }
            }

            log.innerText = `Scan Complete. Total: ${STORE.length}`;
            render();
            btn.disabled = false;
        }

        function render() {
            const feed = document.getElementById('feed');
            if (STORE.length === 0) {
                feed.innerHTML = '<div class="p-20 text-center font-black text-rose-400 uppercase">API вернул 0 матчей. Проверьте ключ или лимиты лиг.</div>';
                return;
            }

            feed.innerHTML = STORE.map(m => `
                <div class="match-card p-6 flex justify-between items-center shadow-sm">
                    <div>
                        <span class="text-[9px] font-black bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase">${m.league}</span>
                        <h2 class="text-xl font-black text-slate-900 mt-2">${m.teams}</h2>
                        <p class="text-[10px] font-bold text-slate-400 mt-1 italic">${m.date}</p>
                    </div>
                    <div class="flex gap-10 items-center">
                        <div class="text-center">
                            <p class="text-[8px] font-black text-slate-400 uppercase">PPM Diff</p>
                            <p class="text-lg font-black ${m.diff > 0 ? 'text-emerald-500' : 'text-rose-500'}">${m.diff}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[8px] font-black text-slate-400 uppercase">Exp. Total</p>
                            <p class="text-3xl font-[900] italic text-slate-900">${m.expTotal}</p>
                            <p class="text-[9px] font-black ${m.expTotal > 2.5 ? 'text-emerald-500' : 'text-orange-400'} uppercase">
                                ${m.expTotal > 2.5 ? 'Pick: Over 2.5' : 'Pick: Under 2.5'}
                            </p>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
