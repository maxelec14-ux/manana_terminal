<!DOCTYPE html>
<html>
<body>
    <button onclick="checkAPI()" style="padding: 20px; background: black; color: white; font-weight: bold;">УЗНАТЬ РЕАЛЬНЫЙ СЕЗОН 🔍</button>
    <pre id="output" style="background: #eee; padding: 20px; margin-top: 20px;"></pre>

    <script>
        async function checkAPI() {
            const out = document.getElementById('output');
            const key = "c54fa8c0a8699f6a039bbc5555669479";
            const leagueId = 39; // EPL

            out.innerText = "Запрос к API...";

            try {
                // ПРОВЕРЯЕМ: Какие сезоны вообще есть для этой лиги в API?
                const res = await fetch(`https://v3.football.api-sports.io/leagues?id=${leagueId}`, {
                    headers: { "x-apisports-key": key }
                });
                const data = await res.json();
                
                if (data.response && data.response.length > 0) {
                    const seasons = data.response[0].seasons;
                    const lastSeason = seasons[seasons.length - 1];
                    const currentSeason = seasons.find(s => s.current) || lastSeason;

                    out.innerText = "РЕЗУЛЬТАТ ПРОВЕРКИ:\n" + 
                                  "====================\n" +
                                  "Лига: " + data.response[0].league.name + "\n" +
                                  "Последний доступный год в API: " + lastSeason.year + "\n" +
                                  "Текущий активный сезон (current: true): " + currentSeason.year + "\n" +
                                  "Матчи в этом сезоне доступны: " + (currentSeason.coverage.fixtures.events ? "ДА" : "НЕТ") + "\n\n" +
                                  "ИНСТРУКЦИЯ:\n" +
                                  "Используй в коде season = " + currentSeason.year;
                } else {
                    out.innerText = "Ошибка: API не вернул данные по лиге. Проверь ключ.";
                }
            } catch (e) {
                out.innerText = "Ошибка сети: " + e.message;
            }
        }
    </script>
</body>
</html>
