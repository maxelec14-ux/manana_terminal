<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinnacle Pro Scanner | Live Line Movement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body { background: #0F172A; font-family: 'JetBrains Mono', monospace; color: #F1F5F9; }
        .match-row { background: #1E293B; border-bottom: 1px solid #334155; transition: 0.2s; }
        .match-row:hover { background: #262F45; }
        .delta-up { color: #EF4444; }
        .delta-down { color: #22C55E; }
        .market-cell { background: #0F172A; border: 1px solid #334155; padding: 10px; border-radius: 8px; text-align: center; }
        .label-u { font-size: 9px; color: #64748B; font-weight: 800; text-transform: uppercase; }
        .val-main { font-size: 18px; font-weight: 800; display: block; }
        .val-start { font-size: 11px; color: #475569; }
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .flash-move { animation: pulse-green 1s infinite; color: #4ADE80; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1400px] mx-auto">
        <header class="flex justify-between items-end mb-8 border-b border-slate-700 pb-6">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-blue-500 uppercase">PINNACLE<span class="text-white">SHARP</span></h1>
                <p class="text-xs font-bold text-slate-500 uppercase mt-1">Global Soccer Market Monitor • f3478125...</p>
            </div>
            <div class="flex gap-8 items-center">
                <div class="text-right">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Auto-Refresh</p>
                    <p id="timer" class="text-xl font-black text-blue-400">15:00</p>
                </div>
                <button onclick="scanPinnacle()" id="scan-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-lg text-xs font-black uppercase tracking-widest transition-all">Force Scan ⚡</button>
            </div>
        </header>

        <div class="grid grid-cols-12 gap-4 mb-4 px-4 text-[10px] font-black text-slate-500 uppercase tracking-widest">
            <div class="col-span-4">Event / League</div>
            <div class="col-span-2 text-center">Home (1)</div>
            <div class="col-span-2 text-center">Draw (X)</div>
            <div class="col-span-2 text-center">Away (2)</div>
            <div class="col-span-2 text-center">Total Over</div>
        </div>

        <div id="scanner-feed" class="space-y-2">
            </div>
    </div>

    <script>
        const API_KEY = 'f3478125e1684304dae1ac720ced58fe';
        const ODDS_URL = `https://api.the-odds-api.com/v4/sports/soccer/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h,totals&bookmakers=pinnacle`;
        
        let oddsHistory = JSON.parse(localStorage.getItem('pin_v3_history')) || {};

        async function scanPinnacle() {
            const btn = document.getElementById('scan-btn');
            btn.disabled = true;
            
            try {
                const response = await fetch(ODDS_URL);
                const data = await response.json();
                
                if (!Array.isArray(data)) throw new Error("API Limit reached or key error");
                
                renderScanner(data);
                resetTimer();
            } catch (e) {
                document.getElementById('scanner-feed').innerHTML = `<div class="p-20 text-center text-red-500 font-bold">${e.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function getOddsInfo(matchId, marketKey, currentPrice) {
            if (!currentPrice) return `<span class="val-main text-slate-800">—</span>`;
            
            const key = `${matchId}_${marketKey}`;
            const history = oddsHistory[key] || { start: currentPrice, last: currentPrice };

            // Движение относительно открытия
            const totalDiff = (currentPrice - history.start).toFixed(2);
            // Движение за последние 15 минут
            const isFreshMove = currentPrice < history.last;

            // Обновляем историю
            oddsHistory[key] = { start: history.start, last: currentPrice };
            localStorage.setItem('pin_v3_history', JSON.stringify(oddsHistory));

            let colorClass = 'text-slate-400';
            let arrow = '';

            if (currentPrice < history.start) { colorClass = 'delta-down'; arrow = '↓'; }
            else if (currentPrice > history.start) { colorClass = 'delta-up'; arrow = '↑'; }

            return `
                <span class="val-main ${isFreshMove ? 'flash-move' : ''}">${currentPrice.toFixed(2)}</span>
                <div class="flex justify-between items-center mt-1 px-1">
                    <span class="val-start">S: ${history.start.toFixed(2)}</span>
                    <span class="text-[10px] font-bold ${colorClass}">${arrow} ${Math.abs(totalDiff)}</span>
                </div>
            `;
        }

        function renderScanner(matches) {
            const container = document.getElementById('scanner-feed');
            
            const html = matches.map(m => {
                const pin = m.bookmakers.find(b => b.key === 'pinnacle');
                if (!pin) return '';

                let o1 = null, oX = null, o2 = null, oOver = null;
                
                const h2h = pin.markets.find(mk => mk.key === 'h2h');
                if (h2h) {
                    o1 = h2h.outcomes.find(oc => oc.name === m.home_team)?.price;
                    o2 = h2h.outcomes.find(oc => oc.name === m.away_team)?.price;
                    oX = h2h.outcomes.find(oc => oc.name === 'Draw')?.price;
                }

                const totals = pin.markets.find(mk => mk.key === 'totals');
                if (totals) {
                    oOver = totals.outcomes.find(oc => oc.name === 'Over')?.price;
                }

                return `
                <div class="match-row grid grid-cols-12 gap-4 p-4 items-center rounded-xl">
                    <div class="col-span-4">
                        <p class="text-[10px] text-blue-500 font-bold uppercase mb-1">${m.sport_title}</p>
                        <p class="text-sm font-black uppercase tracking-tight">${m.home_team}</p>
                        <p class="text-sm font-black uppercase tracking-tight text-slate-500">${m.away_team}</p>
                        <p class="text-[9px] text-slate-600 mt-2 font-bold">${new Date(m.commence_time).toLocaleString()}</p>
                    </div>
                    <div class="col-span-2 market-cell">${getOddsInfo(m.id, '1', o1)}</div>
                    <div class="col-span-2 market-cell">${getOddsInfo(m.id, 'X', oX)}</div>
                    <div class="col-span-2 market-cell">${getOddsInfo(m.id, '2', o2)}</div>
                    <div class="col-span-2 market-cell">${getOddsInfo(m.id, 'T', oOver)}</div>
                </div>`;
            }).join('');
            
            container.innerHTML = html || '<div class="p-20 text-center text-slate-500 uppercase font-bold">No Pinnacle Data Available</div>';
        }

        let timeLeft = 900;
        function resetTimer() {
            timeLeft = 900;
            clearInterval(window.timerInterval);
            window.timerInterval = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (timeLeft <= 0) scanPinnacle();
            }, 1000);
        }

        scanPinnacle();
    </script>
</body>
</html>
