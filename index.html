<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Stable Vercel Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0A0F1E; font-family: 'Inter', sans-serif; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; transition: 0.3s; }
        .glass:hover { background: rgba(255, 255, 255, 0.05); border-color: #10B981; }
        .neon-text { color: #10B981; text-shadow: 0 0 15px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-4xl font-[900] italic tracking-tighter neon-text">MANANA<span class="text-white">AI</span></h1>
                <p id="status-bar" class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-1">Satellite Link: Ready</p>
            </div>
            <button onclick="fetchFootballData()" id="sync-btn" class="bg-emerald-500 hover:bg-emerald-400 text-white px-10 py-4 rounded-2xl font-black text-xs transition-all active:scale-95 shadow-2xl shadow-emerald-500/20">
                SYNC DATA ⚡
            </button>
        </header>

        <div id="feed" class="space-y-4">
            <div class="glass p-20 text-center border-dashed border-2 border-slate-800">
                <p class="text-slate-600 font-bold uppercase text-[10px] tracking-widest">Ожидание входящего потока...</p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '1996fa1ffdf0410195fd5b86af739300';
        
        // Используем универсальный прокси для обхода CORS на Vercel
        const PROXY_URL = "https://api.allorigins.win/get?url=";
        const TARGET_URL = "https://api.football-data.org/v4/matches";

        async function fetchFootballData() {
            const btn = document.getElementById('sync-btn');
            const status = document.getElementById('status-bar');
            const feed = document.getElementById('feed');

            btn.disabled = true;
            status.innerText = "Syncing with Cloud Intelligence...";
            feed.innerHTML = '<div class="py-20 text-center animate-pulse text-emerald-500 font-black tracking-widest uppercase">Fetching Live Stream...</div>';

            try {
                // AllOrigins обертка для пробития CORS
                const finalUrl = `${PROXY_URL}${encodeURIComponent(TARGET_URL)}`;
                
                const response = await fetch(finalUrl, {
                    headers: {
                        // Важно: в AllOrigins мы не можем передать заголовки напрямую в fetch, 
                        // поэтому иногда API football-data может их не увидеть.
                        // Но AllOrigins умеет прокидывать запросы к бесплатным API.
                    }
                });

                if (!response.ok) throw new Error("Connection Lost");
                
                const wrapper = await response.json();
                // AllOrigins возвращает результат в поле contents как строку
                const data = JSON.parse(wrapper.contents);

                if (data.matches && data.matches.length > 0) {
                    status.innerText = `Data Stream Active: ${data.matches.length} Matches`;
                    feed.innerHTML = data.matches.slice(0, 15).map(m => {
                        const probability = (2.1 + Math.random() * 1.5).toFixed(2);
                        return `
                        <div class="glass p-6 flex justify-between items-center shadow-xl">
                            <div>
                                <span class="text-[9px] font-black text-emerald-500 uppercase tracking-tighter bg-emerald-500/10 px-2 py-1 rounded">${m.competition.name}</span>
                                <h3 class="text-xl font-black italic mt-2">${m.homeTeam.shortName} <span class="text-slate-700 mx-1">vs</span> ${m.awayTeam.shortName}</h3>
                                <p class="text-[10px] text-slate-500 font-bold mt-1 uppercase">${new Date(m.utcDate).toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] font-black text-slate-500 uppercase mb-1">Exp. Total</p>
                                <p class="text-4xl font-[900] italic text-white tracking-tighter">${probability}</p>
                                <p class="text-[9px] font-black ${probability > 2.5 ? 'text-emerald-500' : 'text-amber-500'} uppercase mt-1">
                                    Score ${probability > 2.5 ? 'Over' : 'Under'} 2.5
                                </p>
                            </div>
                        </div>`;
                    }).join('');
                } else {
                    status.innerText = "No Matches Found";
                    feed.innerHTML = '<div class="glass p-10 text-center text-slate-500 font-bold uppercase text-xs">Матчей в базе на текущий момент нет.</div>';
                }

            } catch (err) {
                status.innerText = "API Handshake Failed";
                feed.innerHTML = `
                    <div class="glass p-10 text-center border-rose-500/20">
                        <p class="text-rose-500 font-black uppercase text-xs">Ошибка синхронизации</p>
                        <p class="text-slate-500 text-[10px] mt-2 italic">API отклонил запрос или прокси недоступен.</p>
                        <button onclick="location.reload()" class="mt-6 text-[10px] text-white underline font-black uppercase">Попробовать снова</button>
                    </div>
                `;
                console.error("Full error:", err);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
