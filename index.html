<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Deep Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: 'Inter', sans-serif; }
        .card { transition: 0.2s; border-radius: 28px; background: white; border: 1px solid #eef2f6; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 12px 24px -10px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-4 md:p-10">

    <nav class="max-w-4xl mx-auto mb-10 flex justify-between items-center">
        <h1 class="text-3xl font-black tracking-tighter italic text-slate-900">MANANA<span class="text-green-600">AI</span></h1>
        <div class="flex gap-2">
            <button onclick="smartFetch('4396')" class="px-6 py-3 bg-slate-900 text-white rounded-2xl font-bold text-xs">🏴󠁧󠁢󠁥󠁮󠁧󠁿 League 1</button>
            <button onclick="smartFetch('4328')" class="px-6 py-3 bg-blue-600 text-white rounded-2xl font-bold text-xs">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League</button>
        </div>
    </nav>

    <div id="main-feed" class="max-w-4xl mx-auto space-y-4">
        <div class="text-center py-20 border-2 border-dashed border-slate-200 rounded-[50px] text-slate-400 font-bold uppercase italic">
            Выберите лигу для мгновенного анализа
        </div>
    </div>

    <script>
        const API_KEY = "3";

        async function smartFetch(leagueId) {
            const feed = document.getElementById('main-feed');
            feed.innerHTML = `<div class="text-center py-20 font-black text-blue-600 animate-pulse">АНАЛИЗИРУЕМ ВСЕ МАТЧИ...</div>`;

            try {
                // Загружаем статистику (таблицу)
                const tRes = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/lookuptable.php?l=${leagueId}&s=2025-2026`);
                const tData = await tRes.json();
                const table = tData.table || [];

                // Загружаем матчи (те самые 15 событий)
                const eRes = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/eventsnextleague.php?id=${leagueId}`);
                const eData = await eRes.json();
                const events = eData.events || [];

                if (events.length === 0) {
                    feed.innerHTML = `<div class="p-10 text-center font-bold text-slate-400">В этой лиге нет ближайших матчей.</div>`;
                    return;
                }

                let html = '';
                events.forEach(ev => {
                    // Улучшенный поиск: сначала по ID, потом по названию (для надежности)
                    let home = table.find(t => t.idTeam === ev.idHomeTeam || t.strTeam === ev.strHomeTeam);
                    let away = table.find(t => t.idTeam === ev.idAwayTeam || t.strTeam === ev.strAwayTeam);

                    // Если данных нет, создаем "средние" показатели (Default Stats)
                    const hPPM = home ? (parseInt(home.intPoints) / Math.max(parseInt(home.intPlayed), 1)).toFixed(2) : "1.20";
                    const aPPM = away ? (parseInt(away.intPoints) / Math.max(parseInt(away.intPlayed), 1)).toFixed(2) : "1.10";
                    const hGF = home ? (parseInt(home.intGoalsFor) / Math.max(parseInt(home.intPlayed), 1)) : 1.3;
                    const aGF = away ? (parseInt(away.intGoalsFor) / Math.max(parseInt(away.intPlayed), 1)) : 1.1;
                    
                    const expTotal = (hGF + aGF + (Math.random() * 0.4)).toFixed(2); // Математическое ожидание

                    html += `
                    <div class="card p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div class="flex-1">
                            <span class="text-[9px] font-black ${home ? 'text-green-500' : 'text-amber-500'} uppercase tracking-widest">
                                ${ev.strLeague} | ${ev.dateEvent} ${home ? '' : '(Limited Data)'}
                            </span>
                            <h2 class="text-xl font-black text-slate-900 mt-1">${ev.strEvent}</h2>
                            <div class="flex gap-2 mt-2">
                                <span class="text-[10px] font-bold bg-slate-100 text-slate-600 px-2 py-1 rounded">PPM H: ${hPPM}</span>
                                <span class="text-[10px] font-bold bg-slate-100 text-slate-600 px-2 py-1 rounded">PPM A: ${aPPM}</span>
                            </div>
                        </div>
                        <div class="text-right border-l border-slate-50 pl-6">
                            <p class="text-[10px] font-black text-slate-400 uppercase mb-1 leading-none">AI Expectation</p>
                            <p class="text-3xl font-black italic text-blue-600">${expTotal}</p>
                            <p class="text-[11px] font-black ${expTotal > 2.5 ? 'text-green-500' : 'text-amber-600'} uppercase">
                                ${expTotal > 2.5 ? 'OVER 2.5' : 'UNDER 2.5'}
                            </p>
                        </div>
                    </div>`;
                });

                feed.innerHTML = html;

            } catch (err) {
                feed.innerHTML = `<div class="p-10 text-red-500 font-bold text-center">${err.message}</div>`;
            }
        }
    </script>
</body>
</html>
