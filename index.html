<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Football Quant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: 'Inter', sans-serif; }
        .active-league { background: #00C076 !important; color: white !important; }
        .card { transition: 0.3s; border-radius: 32px; background: white; border: 1px solid #eef2f6; }
        .value-badge { background: linear-gradient(90deg, #FF007A, #FF5C00); color: white; padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center max-w-5xl mx-auto mb-8">
        <h1 class="text-2xl font-black italic tracking-tighter">MANANA<span class="text-green-600">AI</span></h1>
        <div class="flex gap-4">
            <button onclick="toggleView('main')" id="tab-main" class="font-bold text-sm text-green-600 border-b-2 border-green-600">Scanner</button>
            <button onclick="toggleView('portfolio')" id="tab-port" class="font-bold text-sm text-slate-400">Portfolio</button>
            <button onclick="document.getElementById('setup').classList.toggle('hidden')" class="text-lg">⚙️</button>
        </div>
    </nav>

    <div id="setup" class="max-w-5xl mx-auto mb-8 hidden bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
        <p class="text-[10px] font-black uppercase text-slate-400 mb-4">Выберите лиги для анализа (API-Football IDs)</p>
        <div class="flex flex-wrap gap-2" id="league-tags">
            </div>
    </div>

    <div class="max-w-5xl mx-auto mb-10 flex justify-between items-end">
        <div>
            <h2 class="text-4xl font-black text-slate-900 leading-none">Math Analyzer</h2>
            <p class="text-slate-400 font-bold text-sm mt-2 uppercase tracking-widest">PPM & Goals Correlation</p>
        </div>
        <button id="scan-btn" onclick="runGlobalScan()" class="bg-black text-white px-10 py-5 rounded-3xl font-black shadow-2xl hover:scale-105 transition active:scale-95">RUN ANALYSIS ⚡</button>
    </div>

    <div id="view-main" class="max-w-5xl mx-auto space-y-4">
        <div id="feed" class="text-center py-20 text-slate-300 font-black uppercase italic">Нажмите кнопку для запуска сканера</div>
    </div>

    <div id="view-portfolio" class="max-w-5xl mx-auto hidden">
        <div id="portfolio-list" class="space-y-4"></div>
    </div>

    <script>
        const API_KEY = "c54fa8c0a8699f6a039bbc5555669479";
        const BASE_URL = "https://v3.football.api-sports.io";
        
        // Популярные лиги: 39 (EPL), 140 (La Liga), 78 (Bundesliga), 135 (Serie A), 61 (Ligue 1)
        let activeLeagues = [39, 140, 78, 135]; 

        async function runGlobalScan() {
            const feed = document.getElementById('feed');
            const btn = document.getElementById('scan-btn');
            feed.innerHTML = `<div class="py-20 animate-pulse text-blue-600 font-black">СКАНИРОВАНИЕ МАТЕМАТИЧЕСКИХ МОДЕЛЕЙ...</div>`;
            btn.disabled = true;

            try {
                let allSignals = [];

                for (let leagueId of activeLeagues) {
                    // 1. Получаем таблицу для расчета PPM и Голов
                    const tableRes = await fetch(`${BASE_URL}/standings?league=${leagueId}&season=2025`, {
                        headers: { "x-apisports-key": API_KEY }
                    });
                    const tableData = await tableRes.json();
                    const standings = tableData.response[0].league.standings[0];

                    // 2. Получаем ближайшие матчи
                    const matchRes = await fetch(`${BASE_URL}/fixtures?league=${leagueId}&next=10`, {
                        headers: { "x-apisports-key": API_KEY }
                    });
                    const matchData = await matchRes.json();
                    const fixtures = matchData.response;

                    fixtures.forEach(fix => {
                        const home = standings.find(s => s.team.id === fix.teams.home.id);
                        const away = standings.find(s => s.team.id === fix.teams.away.id);

                        if (home && away) {
                            // МАТЕМАТИКА
                            const hPPM = (home.points / home.all.played).toFixed(2);
                            const aPPM = (away.points / away.all.played).toFixed(2);
                            
                            const hGF = home.all.goals.for / home.all.played;
                            const hGA = home.all.goals.against / home.all.played;
                            const aGF = away.all.goals.for / away.all.played;
                            const aGA = away.all.goals.against / away.all.played;

                            const expectedGoals = ((hGF + aGA) / 2 + (aGF + hGA) / 2).toFixed(2);
                            
                            allSignals.push({
                                league: fix.league.name,
                                match: `${fix.teams.home.name} vs ${fix.teams.away.name}`,
                                exp: expectedGoals,
                                hPPM, aPPM,
                                date: new Date(fix.fixture.date).toLocaleDateString()
                            });
                        }
                    });
                }

                renderFeed(allSignals);
            } catch (err) {
                feed.innerHTML = `<div class="p-10 text-red-500 font-bold">Ошибка API: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function renderFeed(signals) {
            const feed = document.getElementById('feed');
            if(signals.length === 0) { feed.innerHTML = "Матчи не найдены."; return; }

            feed.innerHTML = signals.map(sig => `
                <div class="card p-8 flex flex-col md:flex-row justify-between items-center gap-6">
                    <div class="text-left flex-1">
                        <div class="flex items-center gap-2">
                            <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${sig.league} | ${sig.date}</span>
                            ${sig.exp > 2.8 ? '<span class="value-badge font-black italic">HIGH VALUE</span>' : ''}
                        </div>
                        <h2 class="text-2xl font-black text-slate-900 mt-1">${sig.match}</h2>
                        <div class="flex gap-3 mt-3">
                            <span class="text-[10px] font-bold bg-slate-50 text-slate-500 px-3 py-1.5 rounded-xl border border-slate-100">PPM H: ${sig.hPPM}</span>
                            <span class="text-[10px] font-bold bg-slate-50 text-slate-500 px-3 py-1.5 rounded-xl border border-slate-100">PPM A: ${sig.aPPM}</span>
                        </div>
                    </div>
                    <div class="text-center md:text-right border-t md:border-t-0 md:border-l border-slate-50 pt-4 md:pt-0 md:pl-10 min-w-[160px]">
                        <p class="text-[10px] font-black text-slate-400 uppercase mb-1">Expected Goals</p>
                        <p class="text-4xl font-black italic text-slate-900">${sig.exp}</p>
                        <p class="text-[12px] font-black ${sig.exp > 2.5 ? 'text-green-500' : 'text-amber-500'} mt-1 uppercase">
                            ${sig.exp > 2.5 ? 'Pick: OVER 2.5' : 'Pick: UNDER 2.5'}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        function toggleView(v) {
            document.getElementById('view-main').classList.toggle('hidden', v !== 'main');
            document.getElementById('view-portfolio').classList.toggle('hidden', v !== 'portfolio');
        }
    </script>
</body>
</html>
