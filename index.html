<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MananaAI | Quant Analytics Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { background: #F8FAFC; font-family: 'Inter', sans-serif; color: #1E293B; margin: 0; }
        .match-card { background: white; border: 1px solid #E2E8F0; border-radius: 24px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        
        .c-red { color: #EF4444; } .bg-red { background: #EF4444; }
        .c-yellow { color: #D97706; } .bg-yellow { background: #D97706; }
        .c-blue { color: #2563EB; } .bg-blue { background: #2563EB; }
        .c-green { color: #059669; } .bg-green { background: #059669; }

        .btn-toggle { background: #FFFFFF; color: #64748B; padding: 10px 18px; border-radius: 14px; font-size: 12px; font-weight: 600; border: 1px solid #E2E8F0; transition: 0.2s; cursor: pointer; }
        .btn-toggle.active { background: #2563EB; color: white; border-color: #2563EB; }

        .btn-sort { background: #F1F5F9; color: #475569; padding: 8px 14px; border-radius: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; border: 1px solid transparent; cursor: pointer; }
        .btn-sort.active { background: #1E293B; color: white; }

        .progress-container { width: 100%; height: 6px; background: #F1F5F9; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.8s ease-out; }

        .deep-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 1rem; background: #F8FAFC; padding: 1.5rem; border-radius: 20px; border: 1px solid #F1F5F9; margin-top: 2rem; }
        .deep-label { font-size: 9px; font-weight: 800; color: #94A3B8; text-transform: uppercase; margin-bottom: 2px; }
        .deep-value { font-size: 14px; font-weight: 900; color: #334155; }

        input { background: white; border: 1px solid #E2E8F0; border-radius: 16px; padding: 16px; width: 100%; outline: none; }
        .btn-main { background: #059669; color: white; font-weight: 800; transition: 0.3s; cursor: pointer; }
        .btn-main:disabled { background: #94A3B8; cursor: not-allowed; }
        .stat-value { font-size: 2rem; font-weight: 900; line-height: 1; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-[900] italic tracking-tighter text-blue-600 uppercase">MANANA<span class="text-slate-800">AI</span></h1>
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em] mt-1">Quant-Driven Analytical Engine</p>
            </div>
            <button onclick="updateData()" id="update-btn" class="btn-main px-12 py-4 rounded-2xl text-xs uppercase tracking-widest">Update Analytics ⚡</button>
        </header>

        <div class="space-y-6 mb-12">
            <input type="text" id="f-search" placeholder="Quick Search..." oninput="applyFilters()">
            <div id="league-btns" class="flex flex-wrap gap-2">
                <button class="btn-toggle active" onclick="filterLeague('all', this)">🌍 All Leagues</button>
            </div>
            <div class="flex flex-wrap gap-2 items-center pt-4 border-t border-slate-200">
                <span class="text-[10px] font-black text-slate-400 uppercase mr-2">Sort By:</span>
                <button class="btn-sort active" id="sort-default" onclick="setSort('default', this)">Time</button>
                <button class="btn-sort" id="sort-total" onclick="setSort('total', this)">🔥 Exp. Total</button>
                <button class="btn-sort" id="sort-btts" onclick="setSort('btts', this)">⚽ BTTS %</button>
                <button class="btn-sort" id="sort-ppm" onclick="setSort('ppm', this)">⚖️ PPM Diff</button>
            </div>
        </div>

        <div id="feed" class="space-y-8"></div>
    </div>

    <script>
        let RAW_DATA = [];
        let currentSort = 'default';
        let sortDirection = 'desc';
        let currentLeague = 'all';

        const factorial = (n) => n <= 1 ? 1 : n * factorial(n - 1);
        const poisson = (k, lambda) => (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);

        const getColorBTTS = (val) => {
            if (val >= 70) return 'c-green';
            if (val >= 60) return 'c-blue';
            if (val >= 50) return 'c-yellow';
            return 'c-red';
        };

        const getColorTotal = (val) => {
            if (val >= 3.5) return 'c-green';
            if (val >= 3.0) return 'c-blue';
            if (val >= 2.5) return 'c-yellow';
            return 'c-red';
        };

        const getColorScore = (prob) => {
            if (prob >= 80) return 'c-green';
            if (prob >= 70) return 'c-blue';
            if (prob >= 60) return 'c-yellow';
            return 'c-red';
        };

        const getMetricColor = (type, val) => {
            val = parseFloat(val);
            if (type === 'ppm') return val >= 2.0 ? 'bg-green' : val >= 1.5 ? 'bg-blue' : val >= 1.0 ? 'bg-yellow' : 'bg-red';
            if (type === 'scored') return val >= 2.0 ? 'bg-green' : val >= 1.5 ? 'bg-blue' : val >= 1.0 ? 'bg-yellow' : 'bg-red';
            if (type === 'conceded') return val <= 0.8 ? 'bg-green' : val <= 1.2 ? 'bg-blue' : val <= 1.6 ? 'bg-yellow' : 'bg-red';
            return 'bg-slate-400';
        };

        async function updateData() {
            const btn = document.getElementById('update-btn');
            btn.disabled = true;
            document.getElementById('feed').innerHTML = '<div class="text-center py-20 animate-pulse text-blue-600 font-black uppercase text-xs tracking-widest">Calculating Poisson Probabilities...</div>';
            
            try {
                const res = await fetch('/api/matches');
                const data = await res.json();
                
                RAW_DATA = data.matches.map(m => {
                    const hT = data.standings[m.homeTeam.id];
                    const aT = data.standings[m.awayTeam.id];
                    if (!hT || !aT) return null;

                    const hPPM = hT.points / hT.playedGames;
                    const aPPM = aT.points / aT.playedGames;
                    const hS = hT.goalsFor / hT.playedGames;
                    const hC = hT.goalsAgainst / hT.playedGames;
                    const aS = aT.goalsFor / aT.playedGames;
                    const aC = aT.goalsAgainst / aT.playedGames;

                    const lambdaH = (hS + aC) / 2;
                    const lambdaA = (aS + hC) / 2;

                    // Poisson 1X2 Calculation
                    let pHome = 0, pDraw = 0, pAway = 0;
                    for(let i=0; i<7; i++) {
                        for(let j=0; j<7; j++) {
                            let prob = poisson(i, lambdaH) * poisson(j, lambdaA);
                            if(i > j) pHome += prob;
                            else if(i === j) pDraw += prob;
                            else pAway += prob;
                        }
                    }

                    // Value/Edge Detection Logic
                    // Simulating market odds for comparison:
                    const mOddsH = (1 / pHome) * 1.05; 
                    const mOddsD = (1 / pDraw) * 1.05;
                    const mOddsA = (1 / pAway) * 1.05;

                    const edgeH = (pHome * mOddsH) - 1;
                    const edgeD = (pDraw * mOddsD) - 1;
                    const edgeA = (pAway * mOddsA) - 1;

                    let bestEdge = edgeH;
                    let bestLabel = "Value (Home)";
                    if (edgeD > bestEdge) { bestEdge = edgeD; bestLabel = "Value (Draw)"; }
                    if (edgeA > bestEdge) { bestEdge = edgeA; bestLabel = "Value (Away)"; }

                    const kelly = Math.max(0, bestEdge / (mOddsH - 1) * 0.25);
                    const btts = (1 - Math.exp(-lambdaH)) * (1 - Math.exp(-lambdaA)) * 100;
                    const diffVal = hPPM - aPPM;

                    return {
                        league: m.competition.name, leagueCode: m.competition.code, utcDate: m.utcDate,
                        time: new Date(m.utcDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                        home: m.homeTeam.shortName, away: m.awayTeam.shortName,
                        hPPM: hPPM.toFixed(2), aPPM: aPPM.toFixed(2),
                        hS: hS.toFixed(2), hC: hC.toFixed(2), aS: aS.toFixed(2), aC: aC.toFixed(2),
                        total: (lambdaH + lambdaA).toFixed(2),
                        btts: btts.toFixed(0),
                        kelly: (kelly * 100).toFixed(2),
                        edgeLabel: bestLabel,
                        edgeValue: (bestEdge * 100).toFixed(2),
                        winProbStr: `H: ${(pHome * 100).toFixed(0)}% | D: ${(pDraw * 100).toFixed(0)}% | A: ${(pAway * 100).toFixed(0)}%`,
                        ppmDiff: diffVal > 0 ? `H +${diffVal.toFixed(2)}` : `A +${Math.abs(diffVal).toFixed(2)}`,
                        score: `${Math.round(lambdaH)}:${Math.round(lambdaA)}`,
                        confidence: Math.max(pHome, pAway) * 100
                    };
                }).filter(i => i !== null);

                renderLeagues();
                applyFilters();
            } catch (e) { console.error(e); } finally { btn.disabled = false; }
        }

        function renderLeagues() {
            const container = document.getElementById('league-btns');
            const unique = [...new Set(RAW_DATA.map(m => JSON.stringify({code: m.leagueCode, name: m.league})))].map(s => JSON.parse(s));
            container.innerHTML = `<button class="btn-toggle active" onclick="filterLeague('all', this)">🌍 All Leagues</button>` + 
                unique.map(l => `<button class="btn-toggle" onclick="filterLeague('${l.code}', this)">${l.name}</button>`).join('');
        }

        function filterLeague(code, btn) {
            currentLeague = code;
            document.querySelectorAll('#league-btns .btn-toggle').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilters();
        }

        function setSort(type, btn) {
            if (currentSort === type) sortDirection = sortDirection === 'desc' ? 'asc' : 'desc';
            else { currentSort = type; sortDirection = 'desc'; }
            document.querySelectorAll('.btn-sort').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const search = document.getElementById('f-search').value.toLowerCase();
            let filtered = RAW_DATA.filter(m => m.home.toLowerCase().includes(search) || m.away.toLowerCase().includes(search));
            if (currentLeague !== 'all') filtered = filtered.filter(m => m.leagueCode === currentLeague);
            
            const dir = sortDirection === 'desc' ? 1 : -1;
            if (currentSort === 'total') filtered.sort((a, b) => (b.total - a.total) * dir);
            else if (currentSort === 'btts') filtered.sort((a, b) => (b.btts - a.btts) * dir);
            else if (currentSort === 'ppm') filtered.sort((a, b) => (parseFloat(b.ppmDiff.split('+')[1]) - parseFloat(a.ppmDiff.split('+')[1])) * dir);
            else filtered.sort((a, b) => (new Date(a.utcDate) - new Date(b.utcDate)) * (dir * -1));

            render(filtered);
        }

        const createMetric = (label, val, type) => {
            const colorClass = getMetricColor(type, val);
            const percentage = Math.min(100, (val / (type === 'ppm' ? 3 : 3.5)) * 100);
            return `<div class="flex-1">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-1">${label}</p>
                <p class="stat-value ${colorClass.replace('bg-', 'c-')}">${val}</p>
                <div class="progress-container"><div class="progress-fill ${colorClass}" style="width: ${percentage}%"></div></div>
            </div>`;
        };

        function render(matches) {
            document.getElementById('feed').innerHTML = matches.map(m => `
                <div class="match-card p-10">
                    <div class="flex justify-between items-start mb-10">
                        <div><span class="text-[11px] font-black text-blue-600 bg-blue-50 px-4 py-1.5 rounded-xl uppercase tracking-wider">${m.league}</span><p class="text-[11px] font-bold text-slate-400 mt-3 uppercase tracking-widest">${m.time}</p></div>
                        <div class="flex gap-10 text-right">
                            <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Exp. Total</p><p class="text-3xl font-[900] ${getColorTotal(m.total)}">${m.total}</p></div>
                            <div class="border-l border-slate-100 pl-10"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">BTTS Prob</p><p class="text-3xl font-[900] ${getColorBTTS(m.btts)}">${m.btts}%</p></div>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-20">
                        <div class="space-y-6"><h3 class="text-3xl font-[900] tracking-tighter uppercase">${m.home}</h3><div class="flex gap-6">${createMetric('PPM', m.hPPM, 'ppm')}${createMetric('G-Scored', m.hS, 'scored')}${createMetric('G-Conceded', m.hC, 'conceded')}</div></div>
                        <div class="space-y-6"><h3 class="text-3xl font-[900] tracking-tighter uppercase">${m.away}</h3><div class="flex gap-6">${createMetric('PPM', m.aPPM, 'ppm')}${createMetric('G-Scored', m.aS, 'scored')}${createMetric('G-Conceded', m.aC, 'conceded')}</div></div>
                    </div>
                    <div class="deep-stats-grid">
                        <div><p class="deep-label">Kelly Criterion</p><p class="deep-value">${m.kelly}%</p></div>
                        <div><p class="deep-label">${m.edgeLabel}</p><p class="deep-value c-green">+${m.edgeValue}%</p></div>
                        <div><p class="deep-label">1-X-2 Probabilities</p><p class="deep-value" style="font-size: 12px">${m.winProbStr}</p></div>
                        <div><p class="deep-label">PPM Diff</p><p class="deep-value ${m.ppmDiff.includes('H') ? 'c-green' : 'c-red'}">${m.ppmDiff}</p></div>
                        <div><p class="deep-label">Exp. Score</p><p class="deep-value ${getColorScore(m.confidence)}">${m.score}</p></div>
                    </div>
                </div>`).join('');
        }
    </script>
</body>
</html>
