<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Universal Hybrid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #0F172A; font-family: 'Inter', sans-serif; color: white; }
        .match-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; transition: 0.3s; }
        .match-card:hover { border-color: #10B981; background: rgba(30, 41, 59, 1); }
        .neon-btn { background: #10B981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h1 class="text-3xl font-[900] italic tracking-tighter">MANANA<span class="text-emerald-500">AI</span></h1>
                <p id="status" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Status: System Online</p>
            </div>
            <button onclick="scanAllMatches()" id="sync-btn" class="neon-btn text-white px-8 py-4 rounded-2xl font-black text-xs transition active:scale-95">
                SCAN ALL MATCHES ⚡
            </button>
        </header>

        <div id="feed" class="space-y-4">
            <div class="text-center py-20 border-2 border-dashed border-slate-700 rounded-[40px]">
                <p class="text-slate-500 font-bold uppercase text-xs tracking-[0.3em]">Нажмите SCAN для поиска активных игр</p>
            </div>
        </div>

        <div class="mt-12 text-center">
            <button onclick="document.getElementById('debug').classList.toggle('hidden')" class="text-[9px] text-slate-600 font-bold uppercase tracking-widest underline">Show Raw Debug</button>
            <pre id="debug" class="hidden mt-4 p-4 bg-black text-left text-[10px] text-emerald-500 overflow-auto max-h-64 rounded-xl"></pre>
        </div>
    </div>

    <script>
        const API_KEY = '1996fa1ffdf0410195fd5b86af739300';
        
        async function scanAllMatches() {
            const feed = document.getElementById('feed');
            const status = document.getElementById('status');
            const debug = document.getElementById('debug');
            const btn = document.getElementById('sync-btn');

            btn.disabled = true;
            status.innerText = "Status: Fetching Global Feed...";
            feed.innerHTML = '<div class="py-20 text-center animate-pulse text-emerald-500 font-black">SCANNING...</div>';

            try {
                // Запрашиваем ВСЕ доступные матчи (без привязки к лиге) на ближайшие 3 дня
                const response = await fetch(`https://api.football-data.org/v4/matches`, {
                    headers: { 'X-Auth-Token': API_KEY }
                });
                
                const data = await response.json();
                debug.innerText = JSON.stringify(data, null, 2);

                if (!data.matches || data.matches.length === 0) {
                    status.innerText = "Status: API returned empty list";
                    feed.innerHTML = `
                        <div class="p-10 text-center bg-rose-500/10 border border-rose-500/20 rounded-3xl">
                            <p class="text-rose-500 font-black text-sm uppercase">Матчи не найдены</p>
                            <p class="text-slate-400 text-[10px] mt-2 italic">Вероятно, ваш ключ еще не активирован или лимит запросов на сегодня исчерпан.</p>
                        </div>`;
                } else {
                    status.innerText = `Status: Found ${data.matches.length} Matches`;
                    feed.innerHTML = data.matches.map(m => {
                        // Эмуляция анализа (т.к. standings могут быть недоступны)
                        const mockTotal = (2.1 + Math.random() * 1.5).toFixed(2);
                        const mockPPM = (Math.random() * 0.9).toFixed(2);

                        return `
                        <div class="match-card p-6 flex justify-between items-center shadow-2xl">
                            <div>
                                <span class="text-[9px] font-black bg-emerald-500/10 text-emerald-500 px-2 py-1 rounded-lg uppercase">${m.competition.name}</span>
                                <h2 class="text-lg font-black text-white mt-2">${m.homeTeam.shortName} <span class="text-slate-500">vs</span> ${m.awayTeam.shortName}</h2>
                                <p class="text-[10px] text-slate-500 font-bold mt-1">${new Date(m.utcDate).toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] font-black text-slate-500 uppercase">Exp. Total</p>
                                <p class="text-3xl font-black italic text-emerald-500 tracking-tighter">${mockTotal}</p>
                                <p class="text-[9px] font-bold ${mockTotal > 2.5 ? 'text-emerald-400' : 'text-amber-500'} uppercase">
                                    ${mockTotal > 2.5 ? 'Value Over 2.5' : 'Value Under 2.5'}
                                </p>
                            </div>
                        </div>`;
                    }).join('');
                }
            } catch (err) {
                status.innerText = "Status: Connection Error";
                debug.innerText = err.message;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
