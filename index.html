<!DOCTYPE html>
<html>
<body style="background:#111; color:#0f0; font-family:monospace; padding:20px;">
    <h3>API SENSOR / DEBUG MODE</h3>
    <button onclick="check()" style="padding:15px; background:#0f0; font-weight:bold; cursor:pointer;">ПРОВЕРИТЬ СВЯЗЬ 📡</button>
    <div id="out" style="margin-top:20px; white-space:pre-wrap; border-top:1px solid #333; padding-top:20px;">Ожидание нажатия...</div>

    <script>
        async function check() {
            const out = document.getElementById('out');
            const key = "c54fa8c0a8699f6a039bbc5555669479";
            const url = "https://v3.football.api-sports.io/standings?league=39&season=2024";

            out.innerText = "Отправка запроса на сервер...";

            try {
                const res = await fetch(url, {
                    headers: { "x-apisports-key": key, "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const data = await res.json();
                
                out.innerText = "СТАТУС ОТВЕТА: " + res.status + "\n\n" + 
                                "ОШИБКИ API: " + JSON.stringify(data.errors) + "\n\n" +
                                "КОЛИЧЕСТВО ДАННЫХ: " + data.results + "\n\n" +
                                "ПОЛНЫЙ ОТВЕТ:\n" + JSON.stringify(data, null, 2);

            } catch (e) {
                out.innerText = "КРИТИЧЕСКАЯ ОШИБКА СЕТИ: " + e.message;
            }
        }
    </script>
</body>
</html>
