<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: 'Inter', sans-serif; }
        .active-league { background: #00C076 !important; color: white !important; border-color: #00C076 !important; }
        .card { transition: 0.2s; border-radius: 24px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center max-w-4xl mx-auto mb-8">
        <h1 class="text-2xl font-black italic tracking-tighter">MANANA<span class="text-green-600">AI</span></h1>
        <div id="league-select" class="flex gap-2">
            <button onclick="runScan('4396')" class="px-4 py-2 bg-white border border-slate-200 rounded-xl font-bold text-xs hover:bg-slate-50">League 1</button>
            <button onclick="runScan('4328')" class="px-4 py-2 bg-white border border-slate-200 rounded-xl font-bold text-xs hover:bg-slate-50">Premier League</button>
        </div>
    </nav>

    <div id="feed" class="max-w-4xl mx-auto space-y-4">
        <div class="text-center py-20 text-slate-400 font-bold">Нажми на лигу выше, чтобы загрузить матчи</div>
    </div>

    <script>
        const API_KEY = "3";

        async function runScan(leagueId) {
            const feed = document.getElementById('feed');
            feed.innerHTML = `<div class="text-center font-bold text-blue-600 animate-pulse">Загрузка данных из JSON...</div>`;

            try {
                // 1. Загружаем таблицу (статистику)
                const resT = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/lookuptable.php?l=${leagueId}&s=2025-2026`);
                const tData = await resT.json();
                const table = tData.table;

                // 2. Загружаем расписание (те самые 15 матчей)
                const resM = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/eventsnextleague.php?id=${leagueId}`);
                const mData = await resM.json();
                const events = mData.events;

                if (!events || !table) {
                    feed.innerHTML = `<div class="p-8 bg-red-50 text-red-500 rounded-3xl font-bold text-center">Данные для этой лиги временно недоступны</div>`;
                    return;
                }

                let html = '';
                events.forEach(ev => {
                    // Ищем команды по ID (как в твоем JSON: idHomeTeam и idAwayTeam)
                    const home = table.find(t => t.idTeam === ev.idHomeTeam);
                    const away = table.find(t => t.idTeam === ev.idAwayTeam);

                    if (home && away) {
                        const hP = Math.max(parseInt(home.intPlayed), 1);
                        const aP = Math.max(parseInt(away.intPlayed), 1);
                        
                        // Считаем математику (PPM и Ожидаемые голы)
                        const hPPM = (parseInt(home.intPoints) / hP).toFixed(2);
                        const aPPM = (parseInt(away.intPoints) / aP).toFixed(2);
                        const hGF = (parseInt(home.intGoalsFor) / hP);
                        const aGF = (parseInt(away.intGoalsFor) / aP);
                        const expTotal = (hGF + aGF).toFixed(2);

                        html += `
                        <div class="card bg-white p-6 border border-slate-100 shadow-sm flex justify-between items-center">
                            <div>
                                <div class="text-[10px] font-black text-slate-400 uppercase mb-1">${ev.dateEvent} | ${ev.strTime}</div>
                                <h2 class="text-lg font-black text-slate-900">${ev.strEvent}</h2>
                                <div class="flex gap-3 mt-2">
                                    <span class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded">H-PPM: ${hPPM}</span>
                                    <span class="text-[10px] font-bold bg-slate-100 px-2 py-1 rounded">A-PPM: ${aPPM}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-[9px] font-bold text-slate-400 uppercase">Exp. Goals</div>
                                <div class="text-2xl font-black text-blue-600">${expTotal}</div>
                                <div class="text-[10px] font-black ${expTotal > 2.5 ? 'text-green-500' : 'text-amber-500'}">${expTotal > 2.5 ? 'OVER 2.5' : 'UNDER 2.5'}</div>
                            </div>
                        </div>`;
                    }
                });

                feed.innerHTML = html || `<div class="text-center font-bold text-slate-400">Матчи найдены, но данные в таблице отсутствуют.</div>`;

            } catch (e) {
                feed.innerHTML = `<div class="p-8 text-red-500 font-bold">Ошибка: ${e.message}</div>`;
            }
        }
    </script>
</body>
</html>
