<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MananaAI | Tactical Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background: #0F172A; 
            font-family: 'Inter', sans-serif; 
            color: #E2E8F0; 
        }

        .glass-card { 
            background: rgba(30, 41, 59, 0.7); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 24px; 
            backdrop-filter: blur(12px);
        }

        .neon-text { color: #10B981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .neon-border { border-color: rgba(16, 185, 129, 0.3); }

        /* Индикаторы формы */
        .f-dot {
            width: 20px; height: 20px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 9px; font-weight: 900; color: white;
        }
        .f-w { background: #10B981; box-shadow: 0 0 8px rgba(16, 185, 129, 0.4); }
        .f-d { background: #64748B; }
        .f-l { background: #F43F5E; box-shadow: 0 0 8px rgba(244, 63, 94, 0.4); }

        .stat-badge {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 8px 12px;
        }

        input, select {
            background: #1E293B;
            border: 1px solid #334155;
            color: white;
            border-radius: 12px;
            padding: 8px 12px;
            font-size: 12px;
            outline: none;
        }

        input:focus { border-color: #10B981; }

        .btn-main {
            background: #10B981;
            color: white;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
            transition: 0.2s;
        }
        .btn-main:hover { background: #059669; transform: translateY(-1px); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-[900] italic tracking-tighter neon-text">MANANA<span class="text-white">AI</span></h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-1">Satellite Intelligence System</p>
            </div>
            <button onclick="updateData()" id="update-btn" class="btn-main px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95">
                Update Data ⚡
            </button>
        </header>

        <div class="glass-card p-6 mb-10 grid grid-cols-2 md:grid-cols-5 gap-4 items-end">
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-bold text-slate-500 uppercase">League</label>
                <select id="f-league" onchange="applyFilters()"><option value="all">All Leagues</option></select>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-bold text-slate-500 uppercase">Min PPM Diff</label>
                <input type="number" id="f-ppm" step="0.1" value="0" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-bold text-slate-500 uppercase">Min Total</label>
                <input type="number" id="f-total" step="0.1" value="0" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-bold text-slate-500 uppercase">Date</label>
                <input type="date" id="f-date" onchange="applyFilters()">
            </div>
            <div class="text-right pb-3">
                <span id="match-count" class="text-[10px] font-black text-emerald-400 uppercase">0 Matches Found</span>
            </div>
        </div>

        <div id="feed" class="space-y-6">
            <div class="text-center py-20 border-2 border-dashed border-slate-800 rounded-[40px]">
                <p class="text-slate-600 font-bold uppercase text-[10px] tracking-[0.4em]">Handshake Protocol Required</p>
            </div>
        </div>
    </div>

    <script>
        let RAW_DATA = [];

        async function updateData() {
            const btn = document.getElementById('update-btn');
            const feed = document.getElementById('feed');
            btn.disabled = true;
            feed.innerHTML = '<div class="text-center py-20 animate-pulse font-black text-emerald-500 tracking-widest text-xs">SYNCHRONIZING FEED...</div>';

            try {
                const res = await fetch('/api/matches');
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);

                RAW_DATA = data.matches.map(m => {
                    const leagueTable = data.standings[m.competition.code] || [];
                    const hTeam = leagueTable.find(t => t.team.id === m.homeTeam.id);
                    const aTeam = leagueTable.find(t => t.team.id === m.awayTeam.id);

                    if (!hTeam || !aTeam) return null;

                    const hPPM = (hTeam.points / hTeam.playedGames).toFixed(2);
                    const aPPM = (aTeam.points / aTeam.playedGames).toFixed(2);
                    const hGF = (hTeam.goalsFor / hTeam.playedGames).toFixed(2);
                    const hGA = (hTeam.goalsAgainst / hTeam.playedGames).toFixed(2);
                    const aGF = (aTeam.goalsFor / aTeam.playedGames).toFixed(2);
                    const aGA = (aTeam.goalsAgainst / aTeam.playedGames).toFixed(2);

                    const expTotal = (parseFloat(hGF) + parseFloat(aGA) + parseFloat(aGF) + parseFloat(hGA)) / 2;
                    const ppmDiff = (hPPM - aPPM).toFixed(2);

                    return {
                        league: m.competition.name,
                        code: m.competition.code,
                        date: m.utcDate.split('T')[0],
                        time: new Date(m.utcDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                        home: m.homeTeam.shortName,
                        away: m.awayTeam.shortName,
                        hForm: hTeam.form ? hTeam.form.split(',') : [],
                        aForm: aTeam.form ? aTeam.form.split(',') : [],
                        hPPM, aPPM, hGF, hGA, aGF, aGA,
                        ppmDiff: Math.abs(ppmDiff),
                        expTotal: expTotal.toFixed(2),
                        handicap: (ppmDiff * 0.8).toFixed(2),
                        oddsH: (1 / (0.33 + (ppmDiff * 0.2))).toFixed(2),
                        oddsA: (1 / (0.33 - (ppmDiff * 0.2))).toFixed(2)
                    };
                }).filter(i => i !== null);

                updateLeagueDropdown();
                applyFilters();

            } catch (err) {
                feed.innerHTML = `<div class="p-10 text-center text-rose-500 font-bold uppercase text-xs">Sync Error: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function getFormHtml(formArray) {
            if (!formArray || formArray.length === 0) return '<span class="text-[8px] text-slate-700">NO DATA</span>';
            return formArray.slice(0, 5).map(f => {
                const char = f.trim().charAt(0);
                const cls = char === 'W' ? 'f-w' : (char === 'D' ? 'f-d' : 'f-l');
                return `<div class="f-dot ${cls}">${char}</div>`;
            }).join('');
        }

        function applyFilters() {
            const league = document.getElementById('f-league').value;
            const date = document.getElementById('f-date').value;
            const ppm = parseFloat(document.getElementById('f-ppm').value) || 0;
            const total = parseFloat(document.getElementById('f-total').value) || 0;

            const filtered = RAW_DATA.filter(m => {
                return (league === 'all' || m.code === league) &&
                       (!date || m.date === date) &&
                       (m.ppmDiff >= ppm) &&
                       (parseFloat(m.expTotal) >= total);
            });

            document.getElementById('match-count').innerText = `${filtered.length} Matches Found`;
            render(filtered);
        }

        function render(matches) {
            const feed = document.getElementById('feed');
            if (matches.length === 0) {
                feed.innerHTML = '<div class="text-center py-20 text-slate-600 font-bold uppercase text-[10px]">No matches found for criteria</div>';
                return;
            }

            feed.innerHTML = matches.map(m => `
                <div class="glass-card p-6 md:p-8 flex flex-col lg:flex-row justify-between items-center gap-8 border-l-4 neon-border shadow-2xl">
                    
                    <div class="flex-1 w-full">
                        <div class="flex items-center gap-3 mb-4">
                            <span class="text-[9px] font-black text-emerald-500 uppercase tracking-widest bg-emerald-500/10 px-2 py-1 rounded">${m.league}</span>
                            <span class="text-[9px] font-bold text-slate-500 uppercase">${m.date} • ${m.time}</span>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                            <div class="relative">
                                <h2 class="text-2xl font-black italic tracking-tighter text-white mb-2">${m.home}</h2>
                                <div class="flex gap-1 mb-4">${getFormHtml(m.hForm)}</div>
                                <div class="flex gap-4">
                                    <div class="stat-badge"><p class="text-[8px] text-slate-500 font-bold">PPM</p><p class="text-xs font-black text-white">${m.hPPM}</p></div>
                                    <div class="stat-badge"><p class="text-[8px] text-slate-500 font-bold">GF/GA</p><p class="text-xs font-black text-emerald-400">${m.hGF} <span class="text-slate-700">|</span> ${m.hGA}</p></div>
                                </div>
                            </div>
                            <div class="relative">
                                <h2 class="text-2xl font-black italic tracking-tighter text-white mb-2">${m.away}</h2>
                                <div class="flex gap-1 mb-4">${getFormHtml(m.aForm)}</div>
                                <div class="flex gap-4">
                                    <div class="stat-badge"><p class="text-[8px] text-slate-500 font-bold">PPM</p><p class="text-xs font-black text-white">${m.aPPM}</p></div>
                                    <div class="stat-badge"><p class="text-[8px] text-slate-500 font-bold">GF/GA</p><p class="text-xs font-black text-emerald-400">${m.aGF} <span class="text-slate-700">|</span> ${m.aGA}</p></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-row lg:flex-col gap-6 w-full lg:w-48 lg:border-l border-white/5 lg:pl-10 justify-around text-center">
                        <div>
                            <p class="text-[9px] font-black text-slate-500 uppercase mb-1 tracking-widest">Exp. Total</p>
                            <p class="text-4xl font-[900] italic text-emerald-500 tracking-tighter">${m.expTotal}</p>
                            <p class="text-[8px] font-black ${m.expTotal > 2.5 ? 'text-emerald-500' : 'text-amber-500'} uppercase mt-1">
                                Score ${m.expTotal > 2.5 ? 'Over' : 'Under'} 2.5
                            </p>
                        </div>
                        <div>
                            <p class="text-[9px] font-black text-slate-500 uppercase mb-1 tracking-widest">Handicap</p>
                            <p class="text-3xl font-[900] italic text-white tracking-tighter">${m.handicap > 0 ? '-' : '+'}${Math.abs(m.handicap)}</p>
                        </div>
                    </div>

                    <div class="flex flex-row lg:flex-col gap-6 w-full lg:w-24 lg:border-l border-white/5 lg:pl-10 justify-around text-center">
                        <div>
                            <p class="text-[8px] font-bold text-slate-500 uppercase mb-1">Odds H</p>
                            <p class="text-sm font-black text-white uppercase tracking-tighter">@${m.oddsH}</p>
                        </div>
                        <div>
                            <p class="text-[8px] font-bold text-slate-500 uppercase mb-1">Odds A</p>
                            <p class="text-sm font-black text-white uppercase tracking-tighter">@${m.oddsA}</p>
                        </div>
                    </div>

                </div>
            `).join('');
        }

        function updateLeagueDropdown() {
            const select = document.getElementById('f-league');
            const unique = [];
            const map = new Map();
            for (const item of RAW_DATA) {
                if(!map.has(item.code)){
                    map.set(item.code, true);
                    unique.push({code: item.code, name: item.league});
                }
            }
            select.innerHTML = '<option value="all">All Competitions</option>' + 
                unique.map(l => `<option value="${l.code}">${l.name}</option>`).join('');
        }
    </script>
</body>
</html>
