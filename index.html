<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Football-Data Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #F3F4F6; font-family: 'Inter', sans-serif; color: #1F2937; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .card { border-radius: 24px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .filter-input { background: white; border: 1px solid #E5E7EB; border-radius: 12px; padding: 8px 12px; font-size: 12px; font-weight: 600; outline: none; }
        .filter-input:focus { border-color: #10B981; ring: 2px ring-emerald-500; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-[900] italic tracking-tighter text-slate-900">MANANA<span class="text-emerald-500">AI</span></h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Football-Data.org Engine</p>
            </div>
            <button onclick="updateAllData()" id="update-btn" class="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-4 rounded-2xl font-black text-xs transition shadow-lg shadow-emerald-200 active:scale-95">
                UPDATE DATA
            </button>
        </header>

        <div class="glass p-6 rounded-[32px] mb-8 shadow-sm grid grid-cols-2 md:grid-cols-5 gap-4">
            <div class="flex flex-col gap-2">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Лига</label>
                <select id="filter-league" class="filter-input" onchange="applyFilters()">
                    <option value="all">Все лиги</option>
                </select>
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Мин. PPM Diff</label>
                <input type="number" id="filter-ppm" step="0.1" placeholder="0.5" class="filter-input" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Мин. Total</label>
                <input type="number" id="filter-total" step="0.1" placeholder="2.5" class="filter-input" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Гандикап >=</label>
                <input type="number" id="filter-handicap" step="0.5" placeholder="1.0" class="filter-input" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[9px] font-black text-slate-400 uppercase ml-1">Дата</label>
                <input type="date" id="filter-date" class="filter-input" onchange="applyFilters()">
            </div>
        </div>

        <div id="loader" class="hidden mb-8 text-center p-4 bg-white rounded-2xl border border-emerald-100 text-emerald-600 font-bold text-xs animate-pulse">
            СИНХРОНИЗАЦИЯ С ЕВРОПЕЙСКИМИ СЕРВЕРАМИ...
        </div>

        <div id="match-feed" class="grid grid-cols-1 gap-4">
            <div class="text-center py-20 text-slate-300 font-black uppercase italic tracking-widest">
                Нажмите Update Data для загрузки недели
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '1996fa1ffdf0410195fd5b86af739300';
        const LEAGUES = ['PL', 'PD', 'BL1', 'SA', 'FL1', 'DED', 'PPL', 'ELC', 'CL'];
        let ALL_MATCHES = [];

        async function updateAllData() {
            const btn = document.getElementById('update-btn');
            const loader = document.getElementById('loader');
            btn.disabled = true;
            loader.classList.remove('hidden');
            ALL_MATCHES = [];

            try {
                // Получаем дату Пн-Вс
                const now = new Date();
                const day = now.getDay() || 7;
                const monday = new Date(now.setDate(now.getDate() - day + 1)).toISOString().split('T')[0];
                const sunday = new Date(now.setDate(now.getDate() - day + 7)).toISOString().split('T')[0];

                for (let code of LEAGUES) {
                    loader.innerText = `ЗАГРУЗКА ${code}...`;
                    
                    // 1. Получаем таблицу (Standings)
                    const standRes = await fetch(`https://api.football-data.org/v4/competitions/${code}/standings`, { headers: {'X-Auth-Token': API_KEY}});
                    const standData = await standRes.json();
                    if (!standData.standings) continue;

                    const table = {};
                    standData.standings[0].table.forEach(t => {
                        table[t.team.id] = {
                            rank: t.rank,
                            points: t.points,
                            played: t.playedGames,
                            gf: t.goalsFor,
                            ga: t.goalsAgainst,
                            ppm: (t.points / t.playedGames).toFixed(2)
                        };
                    });

                    // 2. Получаем матчи (Scheduled)
                    const matchRes = await fetch(`https://api.football-data.org/v4/competitions/${code}/matches?dateFrom=${monday}&dateTo=${sunday}`, { headers: {'X-Auth-Token': API_KEY}});
                    const matchData = await matchRes.json();
                    
                    if (matchData.matches) {
                        matchData.matches.forEach(m => {
                            const home = table[m.homeTeam.id];
                            const away = table[m.awayTeam.id];
                            if (home && away) {
                                ALL_MATCHES.push(calculateMath(m, home, away, standData.competition.name));
                            }
                        });
                    }
                    // Пауза 1 сек для обхода лимита 10 зап/мин
                    await new Promise(r => setTimeout(r, 1000));
                }

                updateLeagueFilter();
                renderMatches(ALL_MATCHES);
            } catch (err) {
                console.error(err);
                alert("Ошибка API: Вероятно, превышен лимит запросов. Подождите минуту.");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        }

        function calculateMath(match, h, a, leagueName) {
            const hGF = h.gf / h.played;
            const hGA = h.ga / h.played;
            const aGF = a.gf / a.played;
            const aGA = a.ga / a.played;

            const expTotal = ((hGF + aGA) / 2 + (aGF + hGA) / 2).toFixed(2);
            const ppmDiff = (h.ppm - a.ppm).toFixed(2);
            
            // Азиатский гандикап (упрощенная модель на разнице PPM и силы атаки)
            const handicap = (ppmDiff * 0.75 + (hGF - aGF) * 0.25).toFixed(2);
            
            // Коэффициенты (на базе вероятности из PPM)
            const probH = 0.33 + (ppmDiff * 0.2);
            const oddH = Math.min(Math.max(1 / probH, 1.1), 10).toFixed(2);
            const oddA = Math.min(Math.max(1 / (1 - probH - 0.2), 1.1), 10).toFixed(2);

            return {
                ...match,
                leagueName,
                h, a,
                expTotal,
                ppmDiff,
                handicap,
                oddH, oddA
            };
        }

        function renderMatches(matches) {
            const feed = document.getElementById('match-feed');
            if (matches.length === 0) {
                feed.innerHTML = '<div class="text-center py-20 text-slate-400 font-bold uppercase">Матчи не найдены</div>';
                return;
            }

            feed.innerHTML = matches.map(m => `
                <div class="card glass p-6 flex flex-col md:flex-row justify-between items-center gap-6 border border-slate-100 shadow-sm">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="bg-slate-900 text-white text-[9px] font-black px-2 py-1 rounded-md uppercase">${m.leagueName}</span>
                            <span class="text-[10px] font-bold text-slate-400">${new Date(m.utcDate).toLocaleString('ru-RU', {weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit'})}</span>
                        </div>
                        <div class="flex items-center gap-4">
                            <h2 class="text-xl font-black text-slate-900">${m.homeTeam.shortName} <span class="text-slate-300">v</span> ${m.awayTeam.shortName}</h2>
                        </div>
                        <div class="grid grid-cols-3 gap-2 mt-4">
                            <div class="bg-slate-50 p-2 rounded-xl">
                                <p class="text-[8px] font-bold text-slate-400 uppercase">PPM Diff</p>
                                <p class="text-xs font-black ${m.ppmDiff > 0 ? 'text-emerald-600' : 'text-rose-600'}">${m.ppmDiff}</p>
                            </div>
                            <div class="bg-slate-50 p-2 rounded-xl">
                                <p class="text-[8px] font-bold text-slate-400 uppercase">Gls For</p>
                                <p class="text-xs font-black text-slate-700">${(m.h.gf/m.h.played).toFixed(1)} / ${(m.a.gf/m.a.played).toFixed(1)}</p>
                            </div>
                            <div class="bg-slate-50 p-2 rounded-xl">
                                <p class="text-[8px] font-bold text-slate-400 uppercase">Gls Agst</p>
                                <p class="text-xs font-black text-slate-700">${(m.h.ga/m.h.played).toFixed(1)} / ${(m.a.ga/m.a.played).toFixed(1)}</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-4 border-l border-slate-100 pl-6 min-w-[280px]">
                        <div class="text-center">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-1 tracking-tighter">Exp. Total</p>
                            <p class="text-3xl font-black italic text-slate-900">${m.expTotal}</p>
                            <div class="mt-1 px-2 py-0.5 rounded bg-emerald-50 text-emerald-600 text-[9px] font-black">TO 2.5: ${m.expTotal > 2.5 ? 'YES' : 'NO'}</div>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-1 tracking-tighter">Handicap</p>
                            <p class="text-3xl font-black italic text-slate-900">${m.handicap > 0 ? '-' + m.handicap : '+' + Math.abs(m.handicap)}</p>
                            <div class="mt-1 px-2 py-0.5 rounded bg-slate-900 text-white text-[9px] font-black">VALUE AHC</div>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-1 tracking-tighter">Exp. Odds</p>
                            <div class="text-xs font-black text-slate-900 mt-2">H: ${m.oddH}</div>
                            <div class="text-xs font-black text-slate-900">A: ${m.oddA}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function applyFilters() {
            const league = document.getElementById('filter-league').value;
            const ppm = parseFloat(document.getElementById('filter-ppm').value) || 0;
            const total = parseFloat(document.getElementById('filter-total').value) || 0;
            const handicap = parseFloat(document.getElementById('filter-handicap').value) || 0;
            const date = document.getElementById('filter-date').value;

            const filtered = ALL_MATCHES.filter(m => {
                const matchDate = m.utcDate.split('T')[0];
                return (league === 'all' || m.leagueName === league) &&
                       (Math.abs(m.ppmDiff) >= ppm) &&
                       (m.expTotal >= total) &&
                       (Math.abs(m.handicap) >= handicap) &&
                       (!date || matchDate === date);
            });

            renderMatches(filtered);
        }

        function updateLeagueFilter() {
            const select = document.getElementById('filter-league');
            const uniqueLeagues = [...new Set(ALL_MATCHES.map(m => m.leagueName))];
            select.innerHTML = '<option value="all">Все лиги</option>' + 
                uniqueLeagues.map(l => `<option value="${l}">${l}</option>`).join('');
        }
    </script>
</body>
</html>
