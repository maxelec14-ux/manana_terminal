<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinnacle Elite | Final Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        body { background: #F8FAFC; font-family: 'Inter', sans-serif; color: #1E293B; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .match-card { background: white; border-radius: 20px; border: 1px solid #E2E8F0; margin-bottom: 1.5rem; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .is-fav { border-left: 6px solid #F59E0B !important; }
        .market-box { background: #F1F5F9; border-radius: 12px; padding: 12px; border: 1px solid #E2E8F0; flex: 1; }
        .label-u { font-size: 10px; color: #64748B; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .odds-val { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.15rem; color: #0F172A; }
        .chart-container { height: 150px; width: 100%; position: relative; padding: 10px; }
        .btn-active { background: #2563EB !important; color: white !important; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-[1600px] mx-auto">
        <header class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 mb-8">
            <div class="flex flex-wrap justify-between items-center gap-6 mb-8">
                <div>
                    <h1 class="text-3xl font-black tracking-tighter italic text-slate-900">PINNACLE<span class="text-blue-600">ELITE</span></h1>
                    <div id="api-status" class="text-[11px] font-bold text-slate-400 uppercase mt-1 tracking-widest italic">System Ready</div>
                </div>
                <div class="flex gap-3">
                    <button onclick="fullSync()" id="scan-btn" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold text-sm uppercase hover:bg-slate-800 transition-all shadow-lg shadow-slate-200">Full 24h Sync ⚡</button>
                    <button onclick="toggleFavMode()" id="fav-toggle" class="bg-white border border-slate-200 px-8 py-3 rounded-2xl font-bold text-sm uppercase hover:bg-amber-50 transition-all">Favorites ⭐</button>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 border-t pt-8">
                <div class="flex bg-slate-100 p-1.5 rounded-2xl">
                    <button onclick="setSport('all')" class="sport-btn px-6 py-2.5 text-xs font-bold uppercase rounded-xl btn-active" data-sport="all">All</button>
                    <button onclick="setSport('1')" class="sport-btn px-6 py-2.5 text-xs font-bold uppercase rounded-xl" data-sport="1">Soccer</button>
                    <button onclick="setSport('4')" class="sport-btn px-6 py-2.5 text-xs font-bold uppercase rounded-xl" data-sport="4">Hockey</button>
                    <button onclick="setSport('3')" class="sport-btn px-6 py-2.5 text-xs font-bold uppercase rounded-xl" data-sport="3">Basketball</button>
                </div>
                <input type="text" id="search" oninput="render()" placeholder="Search team or league..." class="bg-slate-50 border border-slate-200 rounded-2xl px-6 py-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none flex-grow">
            </div>
        </header>

        <div id="scanner-feed"></div>
    </div>

    <script>
        const API_KEY = "fd36bdc679msh21fa7b256e2dda5p13662cjsnbdbf4c2ed8c6";
        const API_HOST = "odds-feed.p.rapidapi.com";
        
        let db = JSON.parse(localStorage.getItem('pin_db_final')) || {};
        let favorites = JSON.parse(localStorage.getItem('pin_favs_final')) || [];
        let currentSport = 'all';
        let favMode = false;
        let charts = {};

        async function fetchRapid(endpoint) {
            const res = await fetch(`https://${API_HOST}${endpoint}`, {
                headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": API_HOST }
            });
            return await res.json();
        }

        async function fullSync() {
            const btn = document.getElementById('scan-btn');
            const status = document.getElementById('api-status');
            btn.disabled = true;
            try {
                const now = new Date();
                const dMin = now.toISOString().split('T')[0] + " 00:00:00";
                status.innerText = "Syncing Events...";
                const eventsRes = await fetchRapid(`/api/v1/events?status=SCHEDULED&start_at_min=${dMin}`);
                
                if (eventsRes && eventsRes.data) {
                    for (let event of eventsRes.data) {
                        status.innerText = `Loading Odds: ${event.team_home.name}`;
                        const marketsRes = await fetchRapid(`/api/v1/events/markets?event_id=${event.id}`);
                        if (marketsRes && marketsRes.data) {
                            processData(event, marketsRes.data);
                        }
                        await new Promise(r => setTimeout(r, 150));
                    }
                    localStorage.setItem('pin_db_final', JSON.stringify(db));
                    render();
                    status.innerText = "Sync Complete";
                }
            } catch (e) { status.innerText = "Error: " + e.message; }
            finally { btn.disabled = false; }
        }

        function processData(event, markets) {
            const now = Date.now();
            if (!db[event.id]) {
                db[event.id] = {
                    id: event.id,
                    home: event.team_home.name,
                    away: event.team_away.name,
                    league: event.league?.name || event.league_name || "International",
                    sport_id: event.sport.id,
                    start: event.start_at,
                    history: { h2h: [], spr: [], tot: [] },
                    lastUpdate: now
                };
            }
            
            const pinMarkets = markets.filter(m => m.market_books.some(b => b.book === 'PINNACLE'));
            pinMarkets.forEach(m => {
                const book = m.market_books.find(b => b.book === 'PINNACLE');
                const val = m.value || 0;
                if (m.market_name === '1X2') db[event.id].history.h2h.push({ t: now, v1: book.outcome_0, vx: book.outcome_x || '-', v2: book.outcome_1 });
                if (m.market_name === 'ASIAN_HANDICAP') db[event.id].history.spr.push({ t: now, h: book.outcome_0, a: book.outcome_1, n: val });
                if (m.market_name === 'OVER_UNDER') db[event.id].history.tot.push({ t: now, o: book.outcome_0, u: book.outcome_1, n: val });
            });
            db[event.id].lastUpdate = now;
        }

        function render() {
            const feed = document.getElementById('scanner-feed');
            const searchStr = document.getElementById('search').value.toLowerCase();
            const now = Date.now();

            let list = Object.values(db).filter(m => {
                if (new Date(m.start).getTime() < now - 3600000) return false;
                if (currentSport !== 'all' && m.sport_id.toString() !== currentSport) return false;
                if (favMode && !favorites.includes(m.id)) return false;
                const matchName = (m.home + m.away + m.league).toLowerCase();
                return searchStr ? matchName.includes(searchStr) : true;
            }).sort((a, b) => new Date(a.start) - new Date(b.start));

            feed.innerHTML = list.map(m => {
                const h = m.history.h2h.slice(-1)[0] || {};
                const s = m.history.spr.slice(-1)[0] || {};
                const t = m.history.tot.slice(-1)[0] || {};
                const isFav = favorites.includes(m.id);

                return `
                <div class="match-card ${isFav ? 'is-fav' : ''}">
                    <div class="p-8 grid grid-cols-12 gap-8 items-center">
                        <div class="col-span-4">
                            <div class="text-[11px] font-black text-blue-600 uppercase mb-2 tracking-widest">${m.league}</div>
                            <div class="text-xl font-black text-slate-900 leading-tight uppercase">${m.home}</div>
                            <div class="text-xl font-black text-slate-400 leading-tight uppercase mb-4">${m.away}</div>
                            <div class="flex gap-4">
                                <button onclick="toggleFav('${m.id}')" class="text-[11px] font-bold uppercase px-4 py-1.5 rounded-lg border ${isFav ? 'bg-amber-400 border-amber-400 text-white' : 'border-slate-200 text-slate-400'} transition-all">
                                    ${isFav ? '★ Favorited' : '☆ Favorite'}
                                </button>
                                <span class="text-[11px] font-bold text-slate-400 py-1.5 mono italic uppercase">Update: ${Math.floor((now - m.lastUpdate)/1000)}s ago</span>
                            </div>
                        </div>
                        <div class="col-span-8 flex gap-4">
                            <div class="market-box"><span class="label-u">1X2 Odds</span>
                                <div class="flex text-center"><div class="flex-1">1<div class="odds-val">${h.v1 || '-'}</div></div><div class="flex-1">X<div class="odds-val">${h.vx || '-'}</div></div><div class="flex-1">2<div class="odds-val">${h.v2 || '-'}</div></div></div>
                            </div>
                            <div class="market-box"><span class="label-u">Handicap (${s.n || 0})</span>
                                <div class="flex text-center"><div class="flex-1">Home<div class="odds-val text-blue-600">${s.h || '-'}</div></div><div class="flex-1">Away<div class="odds-val text-blue-600">${s.a || '-'}</div></div></div>
                            </div>
                            <div class="market-box"><span class="label-u">Total (${t.n || 0})</span>
                                <div class="flex text-center"><div class="flex-1">Over<div class="odds-val text-orange-600">${t.o || '-'}</div></div><div class="flex-1">Under<div class="odds-val text-emerald-600">${t.u || '-'}</div></div></div>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-8 p-6 bg-slate-50/50 border-t border-slate-100">
                        <div class="chart-container"><canvas id="ch-h-${m.id}"></canvas></div>
                        <div class="chart-container"><canvas id="ch-s-${m.id}"></canvas></div>
                        <div class="chart-container"><canvas id="ch-t-${m.id}"></canvas></div>
                    </div>
                </div>`;
            }).join('');
            
            list.forEach(m => updateCharts(m));
        }

        function updateCharts(m) {
            const sets = [
                { id: `ch-h-${m.id}`, data: [{ d: m.history.h2h.map(x=>x.v1), c: '#2563EB' }, { d: m.history.h2h.map(x=>x.vx), c: '#94A3B8' }, { d: m.history.h2h.map(x=>x.v2), c: '#F43F5E' }] },
                { id: `ch-s-${m.id}`, data: [{ d: m.history.spr.map(x=>x.h), c: '#2563EB' }, { d: m.history.spr.map(x=>x.a), c: '#60A5FA' }] },
                { id: `ch-t-${m.id}`, data: [{ d: m.history.tot.map(x=>x.o), c: '#F59E0B' }, { d: m.history.tot.map(x=>x.u), c: '#10B981' }] }
            ];

            sets.forEach(s => {
                const ctx = document.getElementById(s.id);
                if (!ctx) return;
                if (charts[s.id]) charts[s.id].destroy();
                charts[s.id] = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: s.data[0].d.map(() => ''),
                        datasets: s.data.map(ds => ({ data: ds.d, borderColor: ds.c, borderWidth: 2.5, pointRadius: 0, tension: 0.4 }))
                    },
                    options: { animation: false, responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { ticks: { font: { size: 9, weight: 'bold' } }, grid: { color: '#E2E8F0' } } } }
                });
            });
        }

        function toggleFav(id) {
            const idx = favorites.indexOf(id);
            if (idx > -1) favorites.splice(idx, 1);
            else favorites.push(id);
            localStorage.setItem('pin_favs_final', JSON.stringify(favorites));
            render();
        }

        function setSport(id) {
            currentSport = id;
            document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('btn-active'));
            document.querySelector(`[data-sport="${id}"]`).classList.add('btn-active');
            render();
        }

        function toggleFavMode() {
            favMode = !favMode;
            document.getElementById('fav-toggle').classList.toggle('btn-active', favMode);
            render();
        }

        setInterval(render, 30000);
        render();
    </script>
</body>
</html>
