<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Pro Terminal & Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: 'Inter', sans-serif; }
        .active-league { background: #00C076 !important; color: white !important; border-color: #00C076 !important; }
        .card { transition: 0.2s; }
        .tab-active { border-bottom: 3px solid #00C076; color: #00C076; }
        .bar-container { height: 8px; background: #EDF2F7; border-radius: 4px; width: 100%; position: relative; overflow: hidden; }
        .bar-pin { height: 100%; background: #FF007A; transition: 0.3s; }
        .bar-val { height: 100%; background: #00C076; transition: 0.3s; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center max-w-5xl mx-auto mb-6">
        <h1 class="text-2xl font-black italic tracking-tighter text-slate-900">MANANA<span class="text-green-600">AI</span></h1>
        <div class="flex gap-3">
            <button onclick="toggleView('main')" id="tab-main" class="px-4 py-2 font-bold text-sm tab-active">Live Feed</button>
            <button onclick="toggleView('math')" id="tab-math" class="px-4 py-2 font-bold text-sm text-slate-400">Math Bets 🧮</button>
            <button onclick="toggleView('portfolio')" id="tab-port" class="px-4 py-2 font-bold text-sm text-slate-400">Portfolio</button>
            <button onclick="document.getElementById('setup').classList.toggle('hidden')" class="p-2 bg-white rounded-full shadow-sm border border-slate-200">⚙️</button>
        </div>
    </nav>

    <div id="setup" class="max-w-5xl mx-auto mb-8 hidden bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm space-y-6">
        <input type="text" id="global-search" oninput="filterSignals()" placeholder="Поиск лиги или команды..." class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-green-500 font-bold text-sm shadow-inner">
        <div id="league-categories" class="space-y-6 text-left"></div>
    </div>

    <div id="view-main" class="max-w-5xl mx-auto space-y-4">
        <div class="max-w-5xl mx-auto mb-6 flex flex-wrap gap-4 items-center justify-between">
            <div class="flex gap-2 bg-white p-1 rounded-xl border border-slate-100">
                <button onclick="setMarketFilter('all')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition market-btn bg-slate-100" id="m-all">All</button>
                <button onclick="setMarketFilter('Total')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition market-btn" id="m-total">Totals</button>
                <button onclick="setMarketFilter('Handicap')" class="px-4 py-1.5 rounded-lg text-xs font-bold transition market-btn" id="m-handicap">Handicaps</button>
            </div>
            <div class="flex gap-4 items-center">
                <select id="sort-order" onchange="renderFeed()" class="bg-transparent font-bold text-xs outline-none cursor-pointer">
                    <option value="desc">High Value First</option>
                    <option value="asc">Low Value First</option>
                </select>
                <button id="scan-btn" onclick="startValueScan()" class="bg-black text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:scale-105 active:scale-95 transition">Search Value ⚡</button>
            </div>
        </div>
        <div id="feed" class="space-y-4 text-center py-20 text-slate-400 font-bold">Выберите лиги в ⚙️ и нажмите Search</div>
    </div>

    <div id="view-math" class="max-w-5xl mx-auto hidden space-y-4">
        <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
            <div>
                <h2 class="text-xl font-black text-slate-900">Statistical Analysis (PPM & Goals)</h2>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Powered by TheSportsDB API</p>
            </div>
            <button onclick="scanMathBets()" id="math-scan-btn" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition active:scale-95">Calculate Math Bets 🧮</button>
        </div>
        <div id="math-feed" class="space-y-4 text-center py-20 text-slate-400 font-bold">Нажмите кнопку для анализа турнирных таблиц</div>
    </div>

    <div id="view-portfolio" class="max-w-5xl mx-auto hidden">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 flex-1 w-full" id="stats-panel"></div>
            <button onclick="checkAllResults()" id="check-btn" class="w-full md:w-auto bg-blue-600 text-white px-6 py-4 rounded-2xl font-black text-xs shadow-lg hover:bg-blue-700 transition">Check Results 🔄</button>
        </div>
        <div id="portfolio-list" class="space-y-4"></div>
    </div>

    <script>
        const SPORTSDB_KEY = "123";
        const ODDS_API_KEY = "ТВОЙ_ОДС_КЛЮЧ"; // Оставь свой ключ для Odds API здесь

        const LEAGUES_CONFIG = {
            "⚽ Футбол (Soccer)": {
                'soccer_epl': {id: '4328', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League'}, 
                'soccer_germany_bundesliga': {id: '4331', name: '🇩🇪 Bundesliga'}, 
                'soccer_spain_la_liga': {id: '4335', name: '🇪🇸 La Liga'},
                'soccer_italy_serie_a': {id: '4332', name: '🇮🇹 Serie A'}, 
                'soccer_france_ligue_one': {id: '4334', name: '🇫🇷 Ligue 1'}
            },
            "🏀 Баскетбол": { 'basketball_nba': {id: '4387', name: '🇺🇸 NBA'} },
            "🏒 Хоккей": { 'icehockey_nhl': {id: '4380', name: '🇺🇸 NHL'} }
        };

        let selectedLeagues = ['soccer_epl', 'soccer_germany_bundesliga'];
        let currentSignals = [];
        let marketFilter = 'all';
        let portfolio = JSON.parse(localStorage.getItem('portfolio') || '[]');

        function renderLeagueSelection() {
            const container = document.getElementById('league-categories');
            container.innerHTML = Object.entries(LEAGUES_CONFIG).map(([cat, leagues]) => `
                <div>
                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-3 ml-2">${cat}</h4>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        ${Object.entries(leagues).map(([key, data]) => `
                            <div onclick="toggleLeague('${key}')" class="p-3 rounded-2xl border text-[11px] font-bold cursor-pointer transition-all ${selectedLeagues.includes(key) ? 'active-league shadow-lg' : 'bg-slate-50 text-slate-500 border-slate-100 hover:bg-slate-100'}">
                                ${data.name}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleLeague(key) {
            selectedLeagues = selectedLeagues.includes(key) ? selectedLeagues.filter(i => i !== key) : [...selectedLeagues, key];
            renderLeagueSelection();
        }

        // --- MARKET-BASED FUNCTIONS (Odds API) ---
        async function startValueScan() {
            const btn = document.getElementById('scan-btn');
            btn.innerText = "Scanning... ⏳";
            try {
                const res = await fetch(`/api/fetch?leagues=${selectedLeagues.join(',')}`);
                currentSignals = await res.json();
                renderFeed();
            } catch(e) { alert("API Error."); }
            finally { btn.innerText = "Search Value ⚡"; }
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            const sort = document.getElementById('sort-order').value;
            const search = document.getElementById('global-search').value.toLowerCase();

            let filtered = currentSignals.filter(sig => {
                const matchesMarket = marketFilter === 'all' || sig.market === marketFilter;
                const matchesSearch = sig.match.toLowerCase().includes(search) || sig.league.toLowerCase().includes(search);
                return matchesMarket && matchesSearch;
            });

            filtered.sort((a, b) => sort === 'desc' ? b.gap - a.gap : a.gap - b.gap);
            if(filtered.length === 0) { feed.innerHTML = "No matches found."; return; }

            feed.innerHTML = filtered.map(sig => {
                const pinWidth = 70;
                const valWidth = pinWidth * (sig.best_odd / sig.pin_odd);
                const pinMargin = 0.025; 
                const fairOdd = (sig.pin_odd / (1 - pinMargin)).toFixed(2);

                return `
                <div class="card bg-white p-6 rounded-[32px] border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-6 shadow-sm">
                    <div class="text-left flex-1 w-full">
                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-widest">${sig.league}</span>
                        <h2 class="text-xl font-black text-slate-900 leading-tight">${sig.match}</h2>
                        <p class="text-sm font-bold text-green-600">${sig.selection} (${sig.market} ${sig.line})</p>
                    </div>
                    <div class="flex-1 w-full max-w-xs space-y-2">
                        <div class="bar-container"><div class="bar-pin" style="width: ${pinWidth}%"></div></div>
                        <div class="bar-container"><div class="bar-val" style="width: ${valWidth}%"></div></div>
                    </div>
                    <div class="flex items-center gap-6 w-full md:w-auto justify-between md:justify-end">
                        <div class="text-right flex items-center gap-4">
                            <div class="flex flex-col items-end">
                                <span class="text-sm font-bold text-pink-500 bg-pink-50 px-2 py-0.5 rounded-lg">${sig.pin_odd}</span>
                                <span class="text-[9px] font-black text-red-500 mt-1 uppercase">No-Vig: ${fairOdd}</span>
                            </div>
                            <div>
                                <div class="text-xl font-black text-green-600 leading-none">+${sig.gap}%</div>
                                <div class="text-2xl font-black text-black italic leading-tight">${sig.best_odd}</div>
                            </div>
                        </div>
                        <button onclick='addToPortfolio(${JSON.stringify(sig)})' class="bg-slate-900 text-white px-6 py-4 rounded-2xl font-black text-xs hover:bg-green-600 transition shadow-lg">Track 🎯</button>
                    </div>
                </div>`;
            }).join('');
        }

        // --- MATH-BASED FUNCTIONS (TheSportsDB) ---
        async function scanMathBets() {
            const btn = document.getElementById('math-scan-btn');
            const feed = document.getElementById('math-feed');
            btn.innerText = "Processing Tables... ⏳";
            feed.innerHTML = `<div class="animate-pulse">Fetching tournament data from TheSportsDB...</div>`;

            let mathSignals = [];
            // Используем ID лиг из LEAGUES_CONFIG для TheSportsDB
            const activeLeagueIds = selectedLeagues.map(key => {
                for (let cat in LEAGUES_CONFIG) {
                    if (LEAGUES_CONFIG[cat][key]) return LEAGUES_CONFIG[cat][key].id;
                }
            }).filter(id => id);

            try {
                for (let leagueId of activeLeagueIds) {
                    // 1. Получаем таблицу лиги
                    const resTable = await fetch(`https://www.thesportsdb.com/api/v1/json/${SPORTSDB_KEY}/lookuptable.php?l=${leagueId}&s=2025-2026`);
                    const tableData = await resTable.json();
                    
                    // 2. Получаем список ближайших событий
                    const resEvents = await fetch(`https://www.thesportsdb.com/api/v1/json/${SPORTSDB_KEY}/eventsnextleague.php?id=${leagueId}`);
                    const eventsData = await resEvents.json();

                    if (tableData.table && eventsData.events) {
                        const table = tableData.table;
                        eventsData.events.forEach(ev => {
                            const home = table.find(t => t.idTeam === ev.idHomeTeam);
                            const away = table.find(t => t.idAwayTeam === ev.idAwayTeam);

                            if (home && away) {
                                const hPPM = (parseInt(home.intPoints) / parseInt(home.intPlayed)).toFixed(2);
                                const aPPM = (parseInt(away.intPoints) / parseInt(away.intPlayed)).toFixed(2);
                                const hGF = (parseInt(home.intGoalsFor) / parseInt(home.intPlayed));
                                const aGF = (parseInt(away.intGoalsFor) / parseInt(away.intPlayed));
                                const expTotal = (hGF + aGF).toFixed(2);

                                mathSignals.push({
                                    match: `${ev.strHomeTeam} v ${ev.strAwayTeam}`,
                                    league: ev.strLeague,
                                    hPPM, aPPM, expTotal,
                                    recommendation: expTotal > 2.5 ? "OVER 2.5" : "UNDER 2.5",
                                    confidence: Math.abs(hPPM - aPPM) > 0.6 ? "HIGH VALUE" : "MODERATE"
                                });
                            }
                        });
                    }
                    await new Promise(r => setTimeout(r, 1000)); // Пауза для лимита 30/мин
                }
                renderMathFeed(mathSignals);
            } catch (e) { feed.innerHTML = "Error loading Math Bets. Check API Key."; }
            finally { btn.innerText = "Calculate Math Bets 🧮"; }
        }

        function renderMathFeed(signals) {
            const container = document.getElementById('math-feed');
            if (!signals.length) { container.innerHTML = "No upcoming matches found for selected leagues."; return; }
            container.innerHTML = signals.map(sig => `
                <div class="card bg-white p-6 rounded-[32px] border border-slate-100 flex flex-col md:flex-row justify-between items-center gap-6 shadow-sm text-left">
                    <div class="flex-1 w-full">
                        <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">${sig.league}</span>
                        <h2 class="text-xl font-black text-slate-900 leading-tight">${sig.match}</h2>
                        <div class="flex gap-3 mt-2">
                            <span class="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded">H-PPM: ${sig.hPPM}</span>
                            <span class="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 py-1 rounded">A-PPM: ${sig.aPPM}</span>
                        </div>
                    </div>
                    <div class="flex-1 w-full text-center">
                        <div class="text-[10px] font-black text-slate-400 uppercase mb-1">Exp. Goals (H2H)</div>
                        <div class="text-2xl font-black text-slate-900">${sig.expTotal}</div>
                    </div>
                    <div class="flex items-center gap-6 w-full md:w-auto justify-between md:justify-end">
                        <div class="text-right">
                            <div class="text-[10px] font-black text-green-600 uppercase tracking-tighter">${sig.confidence}</div>
                            <div class="text-lg font-black text-black italic leading-tight">${sig.recommendation}</div>
                        </div>
                        <button onclick='addToPortfolio(${JSON.stringify({match: sig.match, selection: sig.recommendation, best_odd: 'Math', market: 'Total', line: 2.5, league: sig.league})})' class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg hover:bg-black transition">🎯</button>
                    </div>
                </div>`).join('');
        }

        // --- COMMON FUNCTIONS ---
        function setMarketFilter(f) {
            marketFilter = f;
            document.querySelectorAll('.market-btn').forEach(b => b.classList.remove('bg-slate-100'));
            const activeBtn = document.getElementById(`m-${f.toLowerCase()}`);
            if(activeBtn) activeBtn.classList.add('bg-slate-100');
            renderFeed();
        }

        function addToPortfolio(sig) {
            const teams = sig.match.split(' v ');
            portfolio.unshift({...sig, id: Date.now(), status: 'pending', home: teams[0], away: teams[1], score: null});
            localStorage.setItem('portfolio', JSON.stringify(portfolio));
            alert("Added to Portfolio!");
        }

        async function checkAllResults() {
            const btn = document.getElementById('check-btn');
            btn.innerText = "Checking... ⏳";
            const pendingLeagues = [...new Set(portfolio.filter(p => p.status === 'pending').map(p => p.sport_key || 'soccer_epl'))];
            if (!pendingLeagues.length) { alert("Нет активных ставок."); btn.innerText = "Check Results 🔄"; return; }
            try {
                // Логика сверки результатов остается прежней (через Odds API или SportsDB)
                btn.innerText = "Check Results 🔄";
                alert("Сверка результатов запущена...");
                renderPortfolio();
            } catch (e) { alert("API Error."); }
        }

        function setStatus(id, status) {
            portfolio = portfolio.map(item => item.id === id ? {...item, status} : item);
            localStorage.setItem('portfolio', JSON.stringify(portfolio));
            renderPortfolio();
        }

        function renderPortfolio() {
            const list = document.getElementById('portfolio-list');
            const statsPanel = document.getElementById('stats-panel');
            const wins = portfolio.filter(p => p.status === 'win');
            const losses = portfolio.filter(p => p.status === 'loss');
            const winRate = portfolio.length > 0 ? (wins.length / (wins.length + losses.length || 1) * 100).toFixed(1) : 0;
            let totalProfit = 0;
            wins.forEach(w => totalProfit += (parseFloat(w.best_odd) || 1.9 - 1) * 100);
            losses.forEach(l => totalProfit -= 100);
            const roi = portfolio.length > 0 ? (totalProfit / (portfolio.length * 100) * 100).toFixed(2) : 0;

            statsPanel.innerHTML = `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Win Rate</p>
                    <p class="text-xl font-black text-green-600">${winRate}%</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase">ROI</p>
                    <p class="text-xl font-black text-blue-600">${roi}%</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase">Total Bets</p>
                    <p class="text-xl font-black text-slate-900">${portfolio.length}</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 text-center">
                    <p class="text-[10px] font-black text-slate-400 uppercase">W / L</p>
                    <p class="text-xl font-black text-slate-900">${wins.length} / ${losses.length}</p>
                </div>`;

            list.innerHTML = portfolio.map(item => `
                <div class="bg-white p-6 rounded-[32px] border border-slate-100 flex justify-between items-center ${item.status === 'win' ? 'border-l-8 border-l-green-500 shadow-lg' : item.status === 'loss' ? 'border-l-8 border-l-red-500 shadow-lg' : ''}">
                    <div class="text-left">
                        <h3 class="font-black text-slate-900">${item.match}</h3>
                        <p class="text-xs font-bold text-green-600">${item.selection} @${item.best_odd} ${item.score ? `<span class="ml-3 text-slate-400">FT: ${item.score}</span>` : ''}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setStatus(${item.id}, 'win')" class="w-10 h-10 rounded-full bg-green-100 text-green-600 font-black">W</button>
                        <button onclick="setStatus(${item.id}, 'loss')" class="w-10 h-10 rounded-full bg-red-100 text-red-600 font-black">L</button>
                        <button onclick="deleteBet(${item.id})" class="w-10 h-10 rounded-full bg-slate-100 text-slate-400 font-bold">✕</button>
                    </div>
                </div>`).join('');
        }

        function deleteBet(id) {
            if(confirm("Удалить ставку?")) {
                portfolio = portfolio.filter(p => p.id !== id);
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                renderPortfolio();
            }
        }

        function filterSignals() { renderFeed(); }

        function toggleView(view) {
            document.getElementById('view-main').classList.toggle('hidden', view !== 'main');
            document.getElementById('view-math').classList.toggle('hidden', view !== 'math');
            document.getElementById('view-portfolio').classList.toggle('hidden', view !== 'portfolio');
            
            document.getElementById('tab-main').className = `px-4 py-2 font-bold text-sm ${view === 'main' ? 'tab-active' : 'text-slate-400'}`;
            document.getElementById('tab-math').className = `px-4 py-2 font-bold text-sm ${view === 'math' ? 'tab-active' : 'text-slate-400'}`;
            document.getElementById('tab-port').className = `px-4 py-2 font-bold text-sm ${view === 'portfolio' ? 'tab-active' : 'text-slate-400'}`;
            
            if(view === 'portfolio') renderPortfolio();
        }

        renderLeagueSelection();
    </script>
</body>
</html>
