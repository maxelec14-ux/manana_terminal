<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MananaAI | Analytics Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0A0F1E; font-family: 'Inter', sans-serif; color: #F8FAFC; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; }
        .stat-box { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.03); }
        input, select { background: #161B2D; border: 1px solid #2D3748; color: white; padding: 8px; border-radius: 8px; font-size: 12px; width: 100%; }
        .neon-accent { color: #10B981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-[900] italic tracking-tighter neon-accent uppercase">Manana<span class="text-white">AI</span></h1>
            <button onclick="updateData()" id="update-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-3 rounded-xl font-bold text-xs transition uppercase tracking-widest">
                Update Data ⚡
            </button>
        </header>

        <div class="glass-card p-6 mb-8 grid grid-cols-2 md:grid-cols-6 gap-4 items-end">
            <div>
                <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">League</label>
                <select id="f-league" onchange="applyFilters()"><option value="all">All Leagues</option></select>
            </div>
            <div>
                <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Date</label>
                <input type="date" id="f-date" onchange="applyFilters()">
            </div>
            <div>
                <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Min PPM Diff</label>
                <input type="number" id="f-ppm" step="0.1" value="0" oninput="applyFilters()">
            </div>
            <div>
                <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Min Total</label>
                <input type="number" id="f-total" step="0.1" value="0" oninput="applyFilters()">
            </div>
            <div>
                <label class="text-[9px] font-bold text-slate-500 uppercase block mb-1">Min Handicap</label>
                <input type="number" id="f-handicap" step="0.25" value="0" oninput="applyFilters()">
            </div>
            <div class="text-[10px] text-slate-500 font-bold pb-2" id="match-count">0 Matches</div>
        </div>

        <div id="feed" class="space-y-4 text-slate-500 text-center py-20 uppercase font-black tracking-[0.3em]">
            Press Update Data to start analysis
        </div>
    </div>

    <script>
        let RAW_DATA = [];

        async function updateData() {
            const btn = document.getElementById('update-btn');
            const feed = document.getElementById('feed');
            btn.disabled = true;
            feed.innerHTML = '<div class="animate-pulse">Analyzing European Data Streams...</div>';

            try {
                const res = await fetch('/api/matches');
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);

                // Обработка данных
                const processed = data.matches.map(m => {
                    const leagueTable = data.standings[m.competition.code] || [];
                    const hTeam = leagueTable.find(t => t.team.id === m.homeTeam.id) || null;
                    const aTeam = leagueTable.find(t => t.team.id === m.awayTeam.id) || null;

                    if (!hTeam || !aTeam) return null;

                    const hPPM = (hTeam.points / hTeam.playedGames).toFixed(2);
                    const aPPM = (aTeam.points / aTeam.playedGames).toFixed(2);
                    const hGF = (hTeam.goalsFor / hTeam.playedGames).toFixed(2);
                    const hGA = (hTeam.goalsAgainst / hTeam.playedGames).toFixed(2);
                    const aGF = (aTeam.goalsFor / aTeam.playedGames).toFixed(2);
                    const aGA = (aTeam.goalsAgainst / aTeam.playedGames).toFixed(2);

                    const expTotal = (parseFloat(hGF) + parseFloat(aGA) + parseFloat(aGF) + parseFloat(hGA)) / 2;
                    const ppmDiff = (hPPM - aPPM).toFixed(2);
                    const handicap = (ppmDiff * 0.75).toFixed(2);

                    return {
                        league: m.competition.name,
                        code: m.competition.code,
                        date: m.utcDate.split('T')[0],
                        time: new Date(m.utcDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                        home: m.homeTeam.shortName,
                        away: m.awayTeam.shortName,
                        hPPM, aPPM, hGF, hGA, aGF, aGA,
                        ppmDiff: Math.abs(ppmDiff),
                        expTotal: expTotal.toFixed(2),
                        handicap: handicap,
                        oddsH: (1 / (0.33 + (ppmDiff * 0.2))).toFixed(2),
                        oddsA: (1 / (0.33 - (ppmDiff * 0.2))).toFixed(2)
                    };
                }).filter(i => i !== null);

                RAW_DATA = processed;
                updateLeagueDropdown();
                applyFilters();

            } catch (err) {
                feed.innerHTML = `<div class="text-rose-500 font-bold">Error: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        function applyFilters() {
            const league = document.getElementById('f-league').value;
            const date = document.getElementById('f-date').value;
            const ppm = parseFloat(document.getElementById('f-ppm').value);
            const total = parseFloat(document.getElementById('f-total').value);
            const handi = parseFloat(document.getElementById('f-handicap').value);

            const filtered = RAW_DATA.filter(m => {
                return (league === 'all' || m.code === league) &&
                       (!date || m.date === date) &&
                       (m.ppmDiff >= ppm) &&
                       (parseFloat(m.expTotal) >= total) &&
                       (Math.abs(m.handicap) >= handi);
            });

            document.getElementById('match-count').innerText = `${filtered.length} Matches`;
            render(filtered);
        }

        function render(matches) {
            const feed = document.getElementById('feed');
            if (matches.length === 0) {
                feed.innerHTML = '<div class="py-10 text-slate-700">No matches match filters</div>';
                return;
            }

            feed.innerHTML = matches.map(m => `
                <div class="glass-card p-6 flex flex-col lg:flex-row gap-6 items-center">
                    <div class="flex-1 w-full">
                        <div class="flex items-center gap-2 mb-2 text-[10px] font-bold text-emerald-500">
                            <span class="bg-emerald-500/10 px-2 py-0.5 rounded uppercase">${m.league}</span>
                            <span class="text-slate-500 tracking-widest">${m.date} | ${m.time}</span>
                        </div>
                        <div class="flex justify-between items-center text-xl font-black italic tracking-tighter text-white">
                            <div class="w-[45%] text-right">${m.home}</div>
                            <div class="text-slate-800 text-sm mx-4 uppercase font-normal">vs</div>
                            <div class="w-[45%] text-left">${m.away}</div>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-2 mt-4">
                            <div class="stat-box">
                                <div class="text-[8px] text-slate-500 uppercase mb-1">PPM</div>
                                <div class="text-xs font-bold">${m.hPPM} <span class="text-slate-600">|</span> ${m.aPPM}</div>
                            </div>
                            <div class="stat-box">
                                <div class="text-[8px] text-slate-500 uppercase mb-1">Avg GF</div>
                                <div class="text-xs font-bold text-emerald-400">${m.hGF} <span class="text-slate-600">|</span> ${m.aGF}</div>
                            </div>
                            <div class="stat-box">
                                <div class="text-[8px] text-slate-500 uppercase mb-1">Avg GA</div>
                                <div class="text-xs font-bold text-rose-400">${m.hGA} <span class="text-slate-600">|</span> ${m.aGA}</div>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-row lg:flex-col gap-4 w-full lg:w-48 lg:border-l border-slate-800 lg:pl-6 justify-around">
                        <div class="text-center">
                            <div class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Exp. Total</div>
                            <div class="text-3xl font-black italic text-emerald-500">${m.expTotal}</div>
                        </div>
                        <div class="text-center">
                            <div class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">AI Handicap</div>
                            <div class="text-2xl font-black italic text-white">${m.handicap > 0 ? '-' : '+'}${Math.abs(m.handicap)}</div>
                        </div>
                    </div>

                    <div class="flex flex-row lg:flex-col gap-4 w-full lg:w-32 lg:border-l border-slate-800 lg:pl-6 justify-around">
                        <div class="text-center">
                            <div class="text-[9px] font-bold text-slate-500 uppercase">H Odds</div>
                            <div class="text-sm font-black text-white">@${m.oddsH}</div>
                        </div>
                        <div class="text-center">
                            <div class="text-[9px] font-bold text-slate-500 uppercase">A Odds</div>
                            <div class="text-sm font-black text-white">@${m.oddsA}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function updateLeagueDropdown() {
            const select = document.getElementById('f-league');
            const leagues = [...new Set(RAW_DATA.map(m => m.league))];
            const codes = [...new Set(RAW_DATA.map(m => m.code))];
            
            let options = '<option value="all">All Leagues</option>';
            leagues.forEach((l, i) => {
                options += `<option value="${codes[i]}">${l}</option>`;
            });
            select.innerHTML = options;
        }
    </script>
</body>
</html>
