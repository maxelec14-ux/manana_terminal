<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Professional Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #F9FAFB; font-family: 'Inter', sans-serif; color: #111827; }
        .card { border-radius: 32px; background: white; border: 1px solid #F3F4F6; transition: 0.3s ease; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); }
        .badge { padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        input, select { border-radius: 14px; border: 1px solid #E5E7EB; padding: 10px 14px; font-size: 12px; font-weight: 600; outline: none; }
        input:focus { border-color: #10B981; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
            <div>
                <h1 class="text-4xl font-[900] italic tracking-tighter italic">MANANA<span class="text-emerald-500">AI</span></h1>
                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.4em] mt-1">Intelligence Scanner v4.0</p>
            </div>
            <button onclick="updateData()" id="btn-main" class="bg-slate-900 hover:bg-emerald-600 text-white px-10 py-5 rounded-[22px] font-black text-xs transition-all shadow-xl active:scale-95">
                UPDATE WEEK DATA ⚡
            </button>
        </header>

        <div class="bg-white p-8 rounded-[40px] mb-10 shadow-sm border border-slate-50 grid grid-cols-2 md:grid-cols-5 gap-6">
            <div class="flex flex-col gap-2">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">League</label>
                <select id="f-league" onchange="applyFilters()"><option value="all">All Leagues</option></select>
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Min PPM Diff</label>
                <input type="number" id="f-ppm" step="0.1" placeholder="e.g. 0.8" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Min Exp. Total</label>
                <input type="number" id="f-total" step="0.1" placeholder="e.g. 2.5" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Min Handicap</label>
                <input type="number" id="f-handi" step="0.1" placeholder="e.g. 1.0" oninput="applyFilters()">
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[10px] font-black text-slate-400 uppercase ml-1">Event Date</label>
                <input type="date" id="f-date" onchange="applyFilters()">
            </div>
        </div>

        <div id="status-bar" class="hidden mb-10 p-6 bg-emerald-50 text-emerald-700 rounded-[28px] border border-emerald-100 font-bold text-xs text-center animate-pulse">
            SYNCING LIVE DATA... PLEASE WAIT
        </div>

        <div id="feed" class="space-y-6">
            <div class="text-center py-32 border-4 border-dashed border-slate-100 rounded-[60px]">
                <p class="text-slate-300 font-black uppercase italic tracking-widest">No data. Press Update to scan the week.</p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '1996fa1ffdf0410195fd5b86af739300';
        const LEAGUES = ['PL', 'PD', 'BL1', 'SA', 'FL1', 'DED', 'PPL', 'CL'];
        let CACHE = [];

        async function updateData() {
            const btn = document.getElementById('btn-main');
            const status = document.getElementById('status-bar');
            btn.disabled = true;
            status.classList.remove('hidden');
            CACHE = [];

            const now = new Date();
            const monday = new Date(now.setDate(now.getDate() - (now.getDay() || 7) + 1)).toISOString().split('T')[0];
            const sunday = new Date(now.setDate(now.getDate() - (now.getDay() || 7) + 7)).toISOString().split('T')[0];

            for (let code of LEAGUES) {
                status.innerText = `SCANNING ${code}...`;
                try {
                    // 1. Standings
                    const sRes = await fetch(`https://api.football-data.org/v4/competitions/${code}/standings`, { headers: {'X-Auth-Token': API_KEY}});
                    const sData = await sRes.json();
                    
                    if (!sData.standings || !sData.standings[0]) continue;
                    const table = {};
                    sData.standings[0].table.forEach(t => {
                        table[t.team.id] = {
                            ppm: (t.points / t.playedGames || 0).toFixed(2),
                            gf: (t.goalsFor / t.playedGames || 0).toFixed(2),
                            ga: (t.goalsAgainst / t.playedGames || 0).toFixed(2)
                        };
                    });

                    // 2. Matches
                    const mRes = await fetch(`https://api.football-data.org/v4/competitions/${code}/matches?dateFrom=${monday}&dateTo=${sunday}`, { headers: {'X-Auth-Token': API_KEY}});
                    const mData = await mRes.json();

                    if (mData.matches) {
                        mData.matches.forEach(m => {
                            const h = table[m.homeTeam.id];
                            const a = table[m.awayTeam.id];
                            if (h && a) {
                                const expT = (parseFloat(h.gf) + parseFloat(a.ga) + parseFloat(a.gf) + parseFloat(h.ga)) / 2;
                                const ppmD = Math.abs(h.ppm - a.ppm).toFixed(2);
                                const hand = (ppmD * 0.6 + (h.gf - a.gf) * 0.4).toFixed(2);
                                
                                CACHE.push({
                                    league: sData.competition.name,
                                    date: m.utcDate.split('T')[0],
                                    time: m.utcDate.split('T')[1].substring(0,5),
                                    home: m.homeTeam.shortName,
                                    away: m.awayTeam.shortName,
                                    hPPM: h.ppm, aPPM: a.ppm,
                                    hGF: h.gf, hGA: h.ga,
                                    aGF: a.gf, aGA: a.ga,
                                    expTotal: expT.toFixed(2),
                                    ppmDiff: ppmD,
                                    handicap: hand,
                                    oddH: (1 / (0.35 + (h.ppm - a.ppm) * 0.2)).toFixed(2)
                                });
                            }
                        });
                    }
                    await new Promise(r => setTimeout(r, 1500)); // Delay to avoid 429 error
                } catch (e) { console.log(`Skip ${code} due to API limits`); }
            }

            fillLeagueSelect();
            render(CACHE);
            btn.disabled = false;
            status.classList.add('hidden');
        }

        function render(data) {
            const feed = document.getElementById('feed');
            if (!data.length) {
                feed.innerHTML = '<div class="text-center py-20 font-bold text-slate-300">NO MATCHES FOUND FOR FILTERS</div>';
                return;
            }

            feed.innerHTML = data.map(m => `
                <div class="card p-8 flex flex-col md:flex-row justify-between items-center gap-8">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="badge bg-slate-100 text-slate-600">${m.league}</span>
                            <span class="text-[10px] font-black text-emerald-500 tracking-widest">${m.date} | ${m.time} UTC</span>
                        </div>
                        <h2 class="text-2xl font-[900] text-slate-900 mb-4">${m.home} <span class="text-slate-300 mx-1">v</span> ${m.away}</h2>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                            <div class="bg-slate-50 p-3 rounded-2xl text-center">
                                <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">PPM H/A</p>
                                <p class="text-xs font-black">${m.hPPM} / ${m.aPPM}</p>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-2xl text-center">
                                <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Avg Gls H</p>
                                <p class="text-xs font-black text-emerald-600">${m.hGF} <span class="text-slate-300">/</span> ${m.hGA}</p>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-2xl text-center">
                                <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">Avg Gls A</p>
                                <p class="text-xs font-black text-blue-600">${m.aGF} <span class="text-slate-300">/</span> ${m.aGA}</p>
                            </div>
                            <div class="bg-slate-50 p-3 rounded-2xl text-center">
                                <p class="text-[8px] font-bold text-slate-400 uppercase mb-1">PPM Diff</p>
                                <p class="text-xs font-black text-slate-900">${m.ppmDiff}</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-6 border-l border-slate-50 pl-8 min-w-[320px] justify-between">
                        <div class="text-center">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Exp. Total</p>
                            <p class="text-4xl font-[900] italic text-slate-900">${m.expTotal}</p>
                            <span class="text-[9px] font-black ${m.expTotal > 2.5 ? 'text-emerald-500' : 'text-slate-300'}">O/U 2.5</span>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Handicap</p>
                            <p class="text-4xl font-[900] italic text-slate-900">${m.handicap > 0 ? '-' : '+'}${Math.abs(m.handicap)}</p>
                            <span class="text-[9px] font-black text-slate-900 bg-yellow-400 px-2 py-0.5 rounded">VALUE</span>
                        </div>
                        <div class="text-center">
                            <p class="text-[9px] font-black text-slate-400 uppercase mb-1">Prob. Odd</p>
                            <p class="text-xl font-black text-emerald-500 mt-2">@${Math.max(m.oddH, 1.1).toFixed(2)}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function applyFilters() {
            const league = document.getElementById('f-league').value;
            const ppm = parseFloat(document.getElementById('f-ppm').value) || 0;
            const total = parseFloat(document.getElementById('f-total').value) || 0;
            const handi = parseFloat(document.getElementById('f-handi').value) || 0;
            const date = document.getElementById('f-date').value;

            const filtered = CACHE.filter(m => {
                return (league === 'all' || m.league === league) &&
                       (parseFloat(m.ppmDiff) >= ppm) &&
                       (parseFloat(m.expTotal) >= total) &&
                       (Math.abs(m.handicap) >= handi) &&
                       (!date || m.date === date);
            });
            render(filtered);
        }

        function fillLeagueSelect() {
            const s = document.getElementById('f-league');
            const leagues = [...new Set(CACHE.map(m => m.league))];
            s.innerHTML = '<option value="all">All Leagues</option>' + leagues.map(l => `<option value="${l}">${l}</option>`).join('');
        }
    </script>
</body>
</html>
