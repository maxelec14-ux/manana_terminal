<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinnacle Elite | Multi-Sport Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        body { background: #F1F5F9; font-family: 'Inter', sans-serif; color: #1E293B; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .match-card { background: white; border-radius: 16px; border: 1px solid #E2E8F0; transition: all 0.2s ease; overflow: hidden; }
        .match-card.is-fav { border-left: 4px solid #F59E0B; }
        .market-box { background: #F8FAFC; border-radius: 10px; padding: 10px; border: 1px solid #E2E8F0; }
        .label-u { font-size: 9px; color: #64748B; font-weight: 800; text-transform: uppercase; }
        .btn-active { background: #2563EB !important; color: white !important; }
        .chart-container { height: 150px; width: 100%; }
        .nominal-change-up { color: #EF4444; font-weight: 800; animation: pulse 1s; }
        .nominal-change-down { color: #10B981; font-weight: 800; animation: pulse 1s; }
        @keyframes pulse { 0% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto">
        <header class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                <div>
                    <h1 class="text-2xl font-black tracking-tighter">PINNACLE<span class="text-blue-600">ELITE</span></h1>
                    <div id="api-status" class="text-[10px] font-bold text-slate-400 uppercase mt-1 italic">Focus: 60m Pre-Match Scan</div>
                </div>
                <div class="flex gap-2">
                    <button onclick="fullSync()" id="scan-btn" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold text-xs uppercase hover:bg-slate-800 transition-all">Full 24h Sync ⚡</button>
                    <button onclick="toggleFavMode()" id="fav-toggle" class="bg-white border border-slate-200 px-6 py-2.5 rounded-xl font-bold text-xs uppercase hover:bg-amber-50">Favorites ⭐</button>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 border-t pt-6">
                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button onclick="setSport('all')" class="sport-btn px-4 py-2 text-xs font-bold uppercase rounded-lg btn-active" data-sport="all">All</button>
                    <button onclick="setSport('soccer')" class="sport-btn px-4 py-2 text-xs font-bold uppercase rounded-lg" data-sport="soccer">Soccer</button>
                    <button onclick="setSport('hockey')" class="sport-btn px-4 py-2 text-xs font-bold uppercase rounded-lg" data-sport="hockey">Hockey</button>
                    <button onclick="setSport('basketball')" class="sport-btn px-4 py-2 text-xs font-bold uppercase rounded-lg" data-sport="basketball">Basketball</button>
                </div>

                <input type="text" id="search" oninput="render()" placeholder="Search team..." class="bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none flex-grow">
                
                <button onclick="handleSort('time')" class="sort-btn bg-slate-50 border border-slate-200 px-4 py-2 rounded-lg text-xs font-bold uppercase">Time ↕</button>
                <button onclick="handleSort('total')" class="sort-btn bg-slate-50 border border-slate-200 px-4 py-2 rounded-lg text-xs font-bold uppercase">Total ↕</button>
                <button onclick="handleSort('spread')" class="sort-btn bg-slate-50 border border-slate-200 px-4 py-2 rounded-lg text-xs font-bold uppercase">Handicap ↕</button>
            </div>
        </header>

        <div id="scanner-feed" class="space-y-4"></div>
    </div>

    <script>
        const API_KEY = "fd36bdc679msh21fa7b256e2dda5p13662cjsnbdbf4c2ed8c6";
        const API_HOST = "odds-feed.p.rapidapi.com";
        
        let db = JSON.parse(localStorage.getItem('pin_pro_db_v2')) || {};
        let favorites = JSON.parse(localStorage.getItem('pin_favs')) || [];
        let currentSport = 'all';
        let favMode = false;
        let sortField = 'time';
        let sortOrder = 'asc';

        // Инициализация графиков
        let charts = {};

        async function apiRequest(endpoint) {
            const response = await fetch(`https://${API_HOST}${endpoint}`, {
                headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": API_HOST }
            });
            return await response.json();
        }

        async function fullSync() {
            const status = document.getElementById('api-status');
            status.innerText = "Syncing all sports...";
            
            // В RapidAPI Odds-Feed часто один эндпоинт на все события
            try {
                const data = await apiRequest('/odds?bookmakers=pinnacle');
                if (data && Array.isArray(data)) {
                    data.forEach(m => {
                        // Сохраняем базовые данные, если матча нет или прошло 23 часа
                        const existing = db[m.id];
                        const now = Date.now();
                        
                        if (!existing || (now - (existing.lastFullSync || 0) > 82800000)) {
                            m.lastFullSync = now;
                            m.history = { h2h: [], spread: [], total: [] };
                            db[m.id] = m;
                        } else {
                            // Если матч уже есть, просто обновляем текущие кэфы
                            updateMatchData(m.id, m);
                        }
                    });
                    localStorage.setItem('pin_pro_db_v2', JSON.stringify(db));
                    render();
                }
            } catch (e) { console.error(e); }
            status.innerText = "Sync Complete";
        }

        function updateMatchData(id, newData) {
            const match = db[id];
            if (!match) return;

            const pin = newData.bookmakers?.find(b => b.key === 'pinnacle');
            if (!pin) return;

            const now = Date.now();
            match.lastUpdate = now;

            pin.markets.forEach(mk => {
                if (mk.key === 'h2h') {
                    const price = mk.outcomes[0].price; // Для примера берем П1
                    match.history.h2h.push({ t: now, v: price });
                }
                if (mk.key === 'spreads') {
                    const nominal = mk.outcomes[0].point;
                    const price = mk.outcomes[0].price;
                    match.history.spread.push({ t: now, v: price, n: nominal });
                }
                if (mk.key === 'totals') {
                    const nominal = mk.outcomes[0].point;
                    const price = mk.outcomes[0].price;
                    match.history.total.push({ t: now, v: price, n: nominal });
                }
            });
        }

        function handleSort(field) {
            if (sortField === field) {
                sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                sortField = field;
                sortOrder = 'desc';
            }
            render();
        }

        function setSport(s) {
            currentSport = s;
            document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('btn-active'));
            document.querySelector(`[data-sport="${s}"]`).classList.add('btn-active');
            render();
        }

        function toggleFav(id) {
            if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('pin_favs', JSON.stringify(favorites));
            render();
        }

        function getNominalUI(history, type) {
            if (!history || history.length < 2) return '';
            const current = history[history.length - 1].n;
            const prev = history[history.length - 2].n;

            if (current > prev) return `<span class="nominal-change-up">↑ ${current}</span>`;
            if (current < prev) return `<span class="nominal-change-down">↓ ${current}</span>`;
            return `<span class="text-slate-900">${current}</span>`;
        }

        function render() {
            const feed = document.getElementById('scanner-feed');
            const search = document.getElementById('search').value.toLowerCase();
            const now = Date.now();

            let list = Object.values(db).filter(m => {
                const startTime = new Date(m.commence_time).getTime();
                if (startTime < now) return false;
                if (currentSport !== 'all' && m.sport_key.indexOf(currentSport) === -1) return false;
                if (favMode && !favorites.includes(m.id)) return false;
                if (search && !m.home_team.toLowerCase().includes(search) && !m.away_team.toLowerCase().includes(search)) return false;
                return true;
            });

            // Сортировка
            list.sort((a, b) => {
                let valA, valB;
                if (sortField === 'time') {
                    valA = new Date(a.commence_time).getTime();
                    valB = new Date(b.commence_time).getTime();
                } else {
                    const pinA = a.bookmakers?.find(bk => bk.key === 'pinnacle');
                    const pinB = b.bookmakers?.find(bk => bk.key === 'pinnacle');
                    valA = pinA?.markets.find(m => m.key === (sortField === 'total' ? 'totals' : 'spreads'))?.outcomes[0]?.point || 0;
                    valB = pinB?.markets.find(m => m.key === (sortField === 'total' ? 'totals' : 'spreads'))?.outcomes[0]?.point || 0;
                }
                return sortOrder === 'asc' ? valA - valB : valB - valA;
            });

            feed.innerHTML = list.map(m => {
                const isFav = favorites.includes(m.id);
                const startTime = new Date(m.commence_time).getTime();
                const msToStart = startTime - now;
                const nextScan = m.lastUpdate ? Math.max(0, Math.floor((m.lastUpdate + 540000 - now) / 1000)) : 0;

                return `
                <div class="match-card ${isFav ? 'is-fav' : ''}">
                    <div class="p-5 grid grid-cols-12 gap-4 items-center">
                        <div class="col-span-3">
                            <div class="flex items-center gap-2 mb-1">
                                <button onclick="toggleFav('${m.id}')">${isFav ? '⭐' : '☆'}</button>
                                <span class="text-[9px] font-bold text-blue-600 uppercase">${m.sport_title}</span>
                            </div>
                            <div class="font-bold text-sm uppercase">${m.home_team}</div>
                            <div class="font-bold text-sm uppercase text-slate-400">${m.away_team}</div>
                            <div class="mt-2 text-[10px] mono text-blue-500">
                                Start: ${new Date(m.commence_time).toLocaleTimeString()} | Upd in: ${nextScan}s
                            </div>
                        </div>

                        <div class="col-span-3 market-box text-center">
                            <span class="label-u">1X2 Main</span>
                            <div class="text-lg font-black">${m.history.h2h.slice(-1)[0]?.v || '—'}</div>
                        </div>

                        <div class="col-span-3 market-box text-center">
                            <span class="label-u">Handicap</span>
                            <div class="text-sm">${getNominalUI(m.history.spread)}</div>
                            <div class="text-lg font-black">${m.history.spread.slice(-1)[0]?.v || '—'}</div>
                        </div>

                        <div class="col-span-3 market-box text-center">
                            <span class="label-u">Total</span>
                            <div class="text-sm">${getNominalUI(m.history.total)}</div>
                            <div class="text-lg font-black">${m.history.total.slice(-1)[0]?.v || '—'}</div>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-4 p-4 bg-slate-50 border-t">
                        <div class="chart-container"><canvas id="chart-h2h-${m.id}"></canvas></div>
                        <div class="chart-container"><canvas id="chart-spr-${m.id}"></canvas></div>
                        <div class="chart-container"><canvas id="chart-tot-${m.id}"></canvas></div>
                    </div>
                </div>`;
            }).join('');

            list.forEach(m => initCharts(m));
        }

        function initCharts(m) {
            const ctxs = [
                { id: `chart-h2h-${m.id}`, data: m.history.h2h, label: '1X2' },
                { id: `chart-spr-${m.id}`, data: m.history.spread, label: 'Handicap' },
                { id: `chart-tot-${m.id}`, data: m.history.total, label: 'Total' }
            ];

            ctxs.forEach(c => {
                const el = document.getElementById(c.id);
                if (!el) return;
                new Chart(el, {
                    type: 'line',
                    data: {
                        labels: c.data.map(d => ''),
                        datasets: [{
                            label: c.label,
                            data: c.data.map(d => d.v),
                            borderColor: '#2563EB',
                            borderWidth: 2,
                            pointRadius: 0,
                            fill: false,
                            tension: 0.3
                        }]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { x: { display: false }, y: { ticks: { font: { size: 8 } } } }
                    }
                });
            });
        }

        // Авто-сканирование каждые 9 минут для матчей, до которых < 1 часа
        setInterval(() => {
            const now = Date.now();
            Object.values(db).forEach(async m => {
                const start = new Date(m.commence_time).getTime();
                if (start - now < 3600000 && start - now > 0) {
                    // Здесь должен быть точечный запрос по ID матча, если API позволяет
                    // Или общий запрос раз в 9 минут
                }
            });
            render();
        }, 1000);

        // Первый запуск
        fullSync();
    </script>
</body>
</html>
