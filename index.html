<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Pro Terminal & Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: 'Inter', sans-serif; }
        .active-league { background: #00C076 !important; color: white !important; border-color: #00C076 !important; }
        .tab-active { border-bottom: 3px solid #00C076; color: #00C076; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center max-w-5xl mx-auto mb-6">
        <h1 class="text-2xl font-black italic tracking-tighter text-slate-900">MANANA<span class="text-green-600">AI</span></h1>
        <div class="flex gap-3">
            <button onclick="toggleView('math')" id="tab-math" class="px-4 py-2 font-bold text-sm tab-active">Math Bets 🧮</button>
            <button onclick="document.getElementById('setup').classList.toggle('hidden')" class="p-2 bg-white rounded-full shadow-sm border border-slate-200">⚙️</button>
        </div>
    </nav>

    <div id="setup" class="max-w-5xl mx-auto mb-8 hidden bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
        <div id="league-categories" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
    </div>

    <div id="view-math" class="max-w-5xl mx-auto space-y-4">
        <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
            <div>
                <h2 class="text-xl font-black text-slate-900">Statistical Engine</h2>
                <p id="math-status" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Mode: Hybrid Analytics (API + Math)</p>
            </div>
            <button onclick="scanMathBets()" id="math-scan-btn" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition">Smart Scan 🚀</button>
        </div>
        <div id="math-feed" class="grid gap-4">
            <div class="text-center py-20 text-slate-400 font-bold italic">Выберите лиги и нажмите Smart Scan</div>
        </div>
    </div>

    <script>
        const API_KEY = "3"; 
        const LEAGUES = {
            '4328': '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League', 
            '4396': '🏴󠁧󠁢󠁥󠁮󠁧󠁿 League One',
            '4329': '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Championship',
            '4331': '🇩🇪 Bundesliga',
            '4335': '🇪🇸 La Liga',
            '4332': '🇮🇹 Serie A'
        };

        let selectedLeagues = ['4328', '4396'];

        async function scanMathBets() {
            const btn = document.getElementById('math-scan-btn');
            const feed = document.getElementById('math-feed');
            const statusLabel = document.getElementById('math-status');
            
            btn.innerText = "Analyzing... ⏳";
            feed.innerHTML = `<div class="p-10 text-center animate-pulse font-black text-blue-600">СКАНИРОВАНИЕ БАЗЫ...</div>`;
            
            let mathSignals = [];

            try {
                for (let id of selectedLeagues) {
                    statusLabel.innerText = `Лига ${LEAGUES[id]}: Проверка...`;
                    
                    // 1. Получаем таблицу (без нее расчет невозможен)
                    let table = null;
                    let resT = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/lookuptable.php?l=${id}&s=2025-2026`);
                    let tData = await resT.json();
                    if (tData.table) table = tData.table;

                    if (!table) {
                        resT = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/lookuptable.php?l=${id}&s=2024-2025`);
                        tData = await resT.json();
                        table = tData.table;
                    }

                    if (table) {
                        // 2. Ищем реальные матчи
                        let resNext = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/eventsnextleague.php?id=${id}`);
                        let dataNext = await resNext.json();
                        let foundMatches = dataNext.events || [];

                        // 3. Если API не дало матчей, создаем симуляцию из топ-команд (Math Simulation)
                        if (foundMatches.length === 0) {
                            statusLabel.innerText = `Лига ${LEAGUES[id]}: Генерация прогнозов...`;
                            for (let i = 0; i < 3; i++) {
                                const hIdx = Math.floor(Math.random() * table.length);
                                let aIdx = Math.floor(Math.random() * table.length);
                                if (hIdx === aIdx) aIdx = (hIdx + 1) % table.length;
                                
                                foundMatches.push({
                                    strHomeTeam: table[hIdx].strTeam,
                                    strAwayTeam: table[aIdx].strTeam,
                                    idHomeTeam: table[hIdx].idTeam,
                                    idAwayTeam: table[aIdx].idTeam,
                                    strLeague: LEAGUES[id],
                                    strStatus: 'Math Simulation 🧪',
                                    dateEvent: 'Upcoming'
                                });
                            }
                        }

                        // 4. Расчет для всех найденных или симулированных матчей
                        foundMatches.forEach(ev => {
                            const home = table.find(t => t.idTeam === ev.idHomeTeam || t.strTeam === ev.strHomeTeam);
                            const away = table.find(t => t.idTeam === ev.idAwayTeam || t.strTeam === ev.strAwayTeam);

                            if (home && away) {
                                const hP = Math.max(parseInt(home.intPlayed || 1), 1);
                                const aP = Math.max(parseInt(away.intPlayed || 1), 1);
                                const hPPM = (parseFloat(home.intPoints || 0) / hP).toFixed(2);
                                const aPPM = (parseFloat(away.intPoints || 0) / aP).toFixed(2);
                                const hGF = (parseFloat(home.intGoalsFor || 0) / hP);
                                const aGF = (parseFloat(away.intGoalsFor || 0) / aP);
                                const expT = (hGF + aGF + (Math.random() * 0.5)).toFixed(2); // + небольшая погрешность

                                mathSignals.push({
                                    match: `${ev.strHomeTeam} v ${ev.strAwayTeam}`,
                                    league: ev.strLeague,
                                    hPPM, aPPM, expTotal: expT,
                                    recommendation: expT > 2.5 ? "OVER 2.5" : "UNDER 2.5",
                                    status: ev.strStatus
                                });
                            }
                        });
                    }
                    await new Promise(r => setTimeout(r, 200));
                }

                feed.innerHTML = mathSignals.map(sig => `
                    <div class="card bg-white p-6 rounded-[32px] border border-slate-100 flex justify-between items-center shadow-sm">
                        <div class="text-left">
                            <span class="text-[9px] font-black ${sig.status.includes('🧪') ? 'text-amber-500' : 'text-blue-500'} uppercase tracking-widest">${sig.league} | ${sig.status}</span>
                            <h2 class="text-xl font-black text-slate-900 leading-tight">${sig.match}</h2>
                            <p class="text-[10px] font-bold text-slate-400 mt-1 uppercase">PPM: H ${sig.hPPM} / A ${sig.aPPM}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-slate-400 uppercase leading-none mb-1">Exp. Goals</p>
                            <p class="text-2xl font-black italic text-blue-600">${sig.expTotal}</p>
                            <p class="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 rounded inline-block uppercase mt-1">${sig.recommendation}</p>
                        </div>
                    </div>`).join('');
                
                statusLabel.innerText = `Анализ завершен. Найдено: ${mathSignals.length}`;

            } catch (e) {
                feed.innerHTML = `<div class="p-10 text-red-500">Ошибка: ${e.message}</div>`;
            } finally {
                btn.innerText = "Smart Scan 🚀";
            }
        }

        function renderLeagueSelection() {
            const container = document.getElementById('league-categories');
            container.innerHTML = Object.entries(LEAGUES).map(([id, name]) => `
                <div onclick="toggleLeague('${id}')" class="p-3 rounded-2xl border text-[11px] font-bold cursor-pointer transition-all ${selectedLeagues.includes(id) ? 'active-league' : 'bg-slate-50 text-slate-500'}">
                    ${name}
                </div>`).join('');
        }

        function toggleLeague(id) {
            selectedLeagues = selectedLeagues.includes(id) ? selectedLeagues.filter(i => i !== id) : [...selectedLeagues, id];
            renderLeagueSelection();
        }

        function toggleView(v) { /* Stub for foundation compatibility */ }

        renderLeagueSelection();
    </script>
</body>
</html>
