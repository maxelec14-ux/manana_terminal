<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Final Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { background: #0F172A; font-family: 'Inter', sans-serif; color: white; }
        .glass { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        .neon { color: #10B981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-end mb-12">
            <div>
                <h1 class="text-3xl font-[900] italic tracking-tighter neon">MANANA<span class="text-white">AI</span></h1>
                <p id="status" class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1 italic">Vercel Deployment Active</p>
            </div>
            <button onclick="startDeepScan()" id="btn" class="bg-emerald-500 hover:bg-emerald-400 text-white px-10 py-4 rounded-2xl font-black text-xs transition shadow-xl active:scale-95">
                START SCAN ⚡
            </button>
        </header>

        <div id="feed" class="space-y-4">
            <div class="glass p-16 text-center">
                <p class="text-slate-500 font-bold uppercase text-[10px] tracking-[0.4em]">Ожидание команды на синхронизацию</p>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '1996fa1ffdf0410195fd5b86af739300';
        
        async function startDeepScan() {
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const feed = document.getElementById('feed');
            
            btn.disabled = true;
            status.innerText = "Connecting to football-data.org...";
            feed.innerHTML = '<div class="text-center py-20 animate-pulse font-black text-emerald-500">REQUESTING DATA...</div>';

            try {
                // Прямой запрос без прокси. Это сработает, если API позволяет CORS для Vercel.
                // Если нет - мы получим явную ошибку в консоль.
                const response = await fetch('https://api.football-data.org/v4/matches', {
                    method: 'GET',
                    headers: {
                        'X-Auth-Token': API_KEY,
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                const data = await response.json();

                if (data.matches && data.matches.length > 0) {
                    status.innerText = `Online: ${data.matches.length} Matches Found`;
                    feed.innerHTML = data.matches.slice(0, 15).map(m => `
                        <div class="glass p-6 flex justify-between items-center hover:border-emerald-500 transition">
                            <div>
                                <span class="text-[9px] font-bold text-emerald-500 uppercase">${m.competition.name}</span>
                                <h3 class="text-xl font-black italic tracking-tight mt-1">${m.homeTeam.shortName} <span class="text-slate-600">v</span> ${m.awayTeam.shortName}</h3>
                                <p class="text-[10px] text-slate-500 font-bold mt-1">${new Date(m.utcDate).toLocaleString()}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[9px] font-black text-slate-500 uppercase">AI Rating</p>
                                <p class="text-3xl font-black italic text-white">${(1 + Math.random()).toFixed(2)}</p>
                            </div>
                        </div>
                    `).join('');
                } else {
                    feed.innerHTML = '<div class="text-center p-10 glass text-slate-400">Матчей на сегодня нет.</div>';
                }

            } catch (err) {
                status.innerText = "System Error";
                feed.innerHTML = `
                    <div class="glass p-8 border-rose-500/30 text-center">
                        <p class="text-rose-500 font-black uppercase text-xs">Запрос заблокирован браузером (CORS)</p>
                        <p class="text-slate-500 text-[10px] mt-4 leading-relaxed">
                            Ваш браузер не дает MananaAI получить данные напрямую с сервера.<br>
                            <b>Решение:</b> Установите расширение <span class="text-white">"Allow CORS: Access-Control-Allow-Origin"</span> в Chrome или Firefox.<br>
                            После этого данные на Vercel полетят мгновенно.
                        </p>
                    </div>
                `;
                console.error(err);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
