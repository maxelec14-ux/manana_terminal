<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MananaAI | Pro Tactical Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0F172A; font-family: 'Inter', sans-serif; color: #E2E8F0; margin: 0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; backdrop-filter: blur(12px); }
        .neon-text { color: #10B981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .f-dot { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: white; }
        .f-w { background: #10B981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        .f-d { background: #64748B; }
        .f-l { background: #F43F5E; box-shadow: 0 0 10px rgba(244, 63, 94, 0.3); }
        .stat-badge { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px; padding: 10px 15px; min-width: 90px; }
        input, select { background: #1E293B; border: 1px solid #334155; color: white; border-radius: 12px; padding: 10px; font-size: 12px; outline: none; }
        .val-bad { color: #F43F5E; }        
        .val-mid { color: #FBBF24; }        
        .val-good { color: #10B981; }       
        .val-excellent { color: #34D399; text-shadow: 0 0 8px rgba(52, 211, 153, 0.4); font-weight: 900; }
        .btn-update { background: #10B981; transition: 0.3s; }
        .btn-update:hover { background: #059669; transform: translateY(-1px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-[900] italic tracking-tighter neon-text uppercase">MANANA<span class="text-white">AI</span></h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-1">Satellite Intelligence System</p>
            </div>
            <button onclick="updateData()" id="update-btn" class="btn-update text-white px-10 py-4 rounded-2xl font-black text-xs uppercase tracking-widest">Update Data ⚡</button>
        </header>

        <div class="glass-card p-6 mb-10 grid grid-cols-1 md:grid-cols-6 gap-4 items-end">
            <div class="flex flex-col gap-1 md:col-span-2"><label class="text-[9px] font-bold text-slate-500 uppercase">Search Team</label><input type="text" id="f-search" placeholder="Enter team..." oninput="applyFilters()"></div>
            <div class="flex flex-col gap-1"><label class="text-[9px] font-bold text-slate-500 uppercase">League</label><select id="f-league" onchange="applyFilters()"><option value="all">All Leagues</option></select></div>
            <div class="flex flex-col gap-1"><label class="text-[9px] font-bold text-slate-500 uppercase">Min PPM Diff</label><input type="number" id="f-ppm" step="0.1" value="0" oninput="applyFilters()"></div>
            <div class="flex flex-col gap-1"><label class="text-[9px] font-bold text-slate-500 uppercase">Min Total</label><input type="number" id="f-total" step="0.1" value="0" oninput="applyFilters()"></div>
            <div class="text-right pb-3 font-black text-[10px] text-emerald-500 uppercase" id="match-count">0 Matches</div>
        </div>

        <div id="feed" class="space-y-6"><div class="text-center py-20 border-2 border-dashed border-slate-800 rounded-[40px] text-slate-600 font-bold uppercase text-xs tracking-widest">No active session. Press Update.</div></div>
    </div>

    <script>
        let RAW_DATA = [];

        const getColor = (type, val) => {
            val = parseFloat(val);
            if (type === 'ppm') return val <= 1.0 ? 'val-bad' : val <= 1.5 ? 'val-mid' : val <= 2.0 ? 'val-good' : 'val-excellent';
            if (type === 'scored') return val < 1.0 ? 'val-bad' : val <= 1.3 ? 'val-mid' : val <= 2.0 ? 'val-good' : 'val-excellent';
            if (type === 'conceded') return val <= 0.6 ? 'val-excellent' : val <= 1.3 ? 'val-good' : val <= 2.0 ? 'val-mid' : 'val-bad';
            return '';
        };

        const processForm = (formStr) => {
            if (!formStr) return [];
            // Убираем всё, кроме W, D, L и берем последние 5 игр
            return formStr.toUpperCase().replace(/[^WDL]/g, '').split('').slice(-5);
        };

        async function updateData() {
            const btn = document.getElementById('update-btn');
            const feed = document.getElementById('feed');
            btn.disabled = true;
            feed.innerHTML = '<div class="text-center py-20 animate-pulse font-black text-emerald-500 text-xs tracking-widest uppercase">Fetching Live Data...</div>';

            try {
                const res = await fetch('/api/matches');
                const data = await res.json();
                
                RAW_DATA = data.matches.map(m => {
                    const hT = data.standings[m.homeTeam.id];
                    const aT = data.standings[m.awayTeam.id];
                    if (!hT || !aT) return null;

                    const hPPM = (hT.points / hT.playedGames).toFixed(2);
                    const aPPM = (aT.points / aT.playedGames).toFixed(2);
                    const hS = (hT.goalsFor / hT.playedGames).toFixed(2);
                    const hC = (hT.goalsAgainst / hT.playedGames).toFixed(2);
                    const aS = (aT.goalsFor / aT.playedGames).toFixed(2);
                    const aC = (aT.goalsAgainst / aT.playedGames).toFixed(2);

                    return {
                        league: m.competition.name, code: m.competition.code,
                        date: m.utcDate.split('T')[0],
                        time: new Date(m.utcDate).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
                        home: m.homeTeam.shortName, away: m.awayTeam.shortName,
                        hForm: processForm(hT.form), aForm: processForm(aT.form),
                        hPPM, aPPM, hS, hC, aS, aC,
                        expTotal: ((parseFloat(hS)+parseFloat(aC)+parseFloat(aS)+parseFloat(hC))/2).toFixed(2),
                        handicap: ((hPPM - aPPM) * 0.8).toFixed(2)
                    };
                }).filter(i => i !== null);

                updateLeagueDropdown();
                applyFilters();
            } catch (err) { feed.innerHTML = `<div class="p-10 text-center text-rose-500 font-bold uppercase text-xs">${err.message}</div>`; }
            finally { btn.disabled = false; }
        }

        function applyFilters() {
            const league = document.getElementById('f-league').value;
            const search = document.getElementById('f-search').value.toLowerCase();
            const ppmLimit = parseFloat(document.getElementById('f-ppm').value) || 0;
            const totalLimit = parseFloat(document.getElementById('f-total').value) || 0;

            const filtered = RAW_DATA.filter(m => {
                const matchesSearch = m.home.toLowerCase().includes(search) || m.away.toLowerCase().includes(search);
                return (league === 'all' || m.code === league) && matchesSearch && (Math.abs(m.hPPM - m.aPPM) >= ppmLimit) && (parseFloat(m.expTotal) >= totalLimit);
            });

            document.getElementById('match-count').innerText = `${filtered.length} Matches Found`;
            render(filtered);
        }

        function render(matches) {
            const feed = document.getElementById('feed');
            if (!matches.length) { feed.innerHTML = '<div class="text-center py-20 text-slate-700 font-bold uppercase text-xs">No Results</div>'; return; }
            feed.innerHTML = matches.map(m => `
                <div class="glass-card p-6 md:p-8 flex flex-col lg:flex-row justify-between items-center gap-8 border-l-4 border-emerald-500/30 mb-6">
                    <div class="flex-1 w-full">
                        <div class="flex items-center gap-3 mb-6">
                            <span class="text-[9px] font-black text-emerald-500 uppercase tracking-widest bg-emerald-500/10 px-2 py-1 rounded-lg">${m.league}</span>
                            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest">${m.date} • ${m.time}</span>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                            <div>
                                <h2 class="text-2xl font-black italic tracking-tighter text-white mb-2 uppercase">${m.home}</h2>
                                <div class="flex gap-1.5 mb-5">${m.hForm.length ? m.hForm.map(f => `<div class="f-dot f-${f.toLowerCase()}">${f}</div>`).join('') : '<span class="text-[8px] text-slate-700 font-black uppercase tracking-widest">N/A</span>'}</div>
                                <div class="flex gap-3">
                                    <div class="stat-badge"><p class="text-[8px] text-slate-500 font-bold uppercase mb-1">PPM</p><p class="text-xs font-black ${getColor('ppm', m.hPPM)}">${m.hPPM}</p></div>
                                    <div class="stat-badge"><p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Scored</p><p class="text-xs font-black ${getColor('scored', m.hS)}">${m.hS}</p></div>
                                    <div class="stat-badge"><p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Conceded</p><p class="text-xs font-black ${getColor('conceded', m.hC)}">${m.hC}</p></div>
                                </div>
                            </div>
                            <div>
                                <h2 class="text-2xl font-black italic tracking-tighter text-white mb-2 uppercase">${m.away}</h2>
                                <div class="flex gap-1.5 mb-5">${m.aForm.length ? m.aForm.map(f => `<div class="f-dot f-${f.toLowerCase()}">${f}</div>`).join('') : '<span class="text-[8px] text-slate-700 font-black uppercase tracking-widest">N/A</span>'}</div>
                                <div class="flex gap-3">
                                    <div class="stat-badge"><p class="text-[8px] text-slate-500 font-bold uppercase mb-1">PPM</p><p class="text-xs font-black ${getColor('ppm', m.aPPM)}">${m.aPPM}</p></div>
                                    <div class="stat-badge"><p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Scored</p><p class="text-xs font-black ${getColor('scored', m.aS)}">${m.aS}</p></div>
                                    <div class="stat-badge"><p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Conceded</p><p class="text-xs font-black ${getColor('conceded', m.aC)}">${m.aC}</p></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-row lg:flex-col gap-8 w-full lg:w-48 lg:border-l border-white/5 lg:pl-10 justify-around text-center">
                        <div><p class="text-[10px] font-black text-slate-500 uppercase mb-1">Exp. Total</p><p class="text-4xl font-[900] italic text-emerald-500 tracking-tighter">${m.expTotal}</p></div>
                        <div><p class="text-[10px] font-black text-slate-500 uppercase mb-1">AI Handicap</p><p class="text-3xl font-[900] italic text-white tracking-tighter">${m.handicap > 0 ? '-' : '+'}${Math.abs(m.handicap)}</p></div>
                    </div>
                </div>`).join('');
        }

        function updateLeagueDropdown() {
            const select = document.getElementById('f-league');
            const map = new Map();
            RAW_DATA.forEach(item => map.set(item.code, item.league));
            select.innerHTML = '<option value="all">All Competitions</option>' + Array.from(map.entries()).map(([code, name]) => `<option value="${code}">${name}</option>`).join('');
        }
    </script>
</body>
</html>
