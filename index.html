<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Live 2025 Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: 'Inter', sans-serif; }
        .card { border-radius: 24px; background: white; border: 1px solid #eef2f6; transition: 0.2s; }
        .status-msg { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-black italic">MANANA<span class="text-green-600">AI</span></h1>
            <div class="flex gap-2">
                <button onclick="fetchCurrentData(39)" class="bg-black text-white px-6 py-3 rounded-xl font-bold text-xs hover:bg-green-600 transition">🏴󠁧󠁢󠁥󠁮󠁧󠁿 АПЛ 2025</button>
                <button onclick="fetchCurrentData(140)" class="bg-black text-white px-6 py-3 rounded-xl font-bold text-xs hover:bg-green-600 transition">🇪🇸 ЛА ЛИГА 2025</button>
            </div>
        </header>

        <div id="console" class="hidden mb-6 p-4 bg-slate-900 text-green-400 font-mono text-[10px] rounded-xl overflow-x-auto"></div>

        <div id="main-feed" class="space-y-4">
            <div class="text-center py-20 text-slate-300 font-bold italic uppercase tracking-widest">
                Ожидание запроса на сезон 2025...
            </div>
        </div>
    </div>

    <script>
        const API_KEY = "c54fa8c0a8699f6a039bbc5555669479";
        const HEADERS = { "x-apisports-key": API_KEY };

        async function fetchCurrentData(leagueId) {
            const feed = document.getElementById('main-feed');
            const log = document.getElementById('console');
            
            log.classList.remove('hidden');
            log.innerText = `> Запрос: Лига ${leagueId}, Сезон 2025...`;
            feed.innerHTML = `<div class="text-center py-20 animate-pulse font-black text-slate-400">ПОЛУЧЕНИЕ LIVE ДАННЫХ...</div>`;

            try {
                // 1. Проверяем таблицу СТРОГО 2025
                const res = await fetch(`https://v3.football.api-sports.io/standings?league=${leagueId}&season=2025`, { headers: HEADERS });
                const data = await res.json();

                // Выводим сырой ответ в нашу мини-консоль для диагностики
                log.innerText += `\n> Ответ API: ${data.response.length > 0 ? 'Данные найдены' : 'Пустой массив'}`;
                
                if (!data.response || data.response.length === 0) {
                    feed.innerHTML = `
                        <div class="p-10 bg-white border border-red-100 rounded-[32px] text-center">
                            <p class="text-red-500 font-black uppercase text-sm">Внимание: API вернул пустую таблицу для 2025</p>
                            <p class="text-slate-400 text-xs mt-2">Это значит, что в базе API для этой лиги еще нет сыгранных матчей в сезоне 2025.</p>
                        </div>`;
                    return;
                }

                const standings = data.response[0].league.standings[0];
                
                // 2. Получаем матчи
                const mRes = await fetch(`https://v3.football.api-sports.io/fixtures?league=${leagueId}&season=2025&next=15`, { headers: HEADERS });
                const mData = await mRes.json();
                const fixtures = mData.response || [];

                render(fixtures, standings);
                log.innerText += `\n> Анализ завершен успешно.`;

            } catch (err) {
                log.innerText += `\n> ОШИБКА: ${err.message}`;
                feed.innerHTML = `<div class="text-red-500 font-bold">${err.message}</div>`;
            }
        }

        function render(fixtures, standings) {
            const feed = document.getElementById('main-feed');
            if (fixtures.length === 0) {
                feed.innerHTML = `<div class="text-center py-10 font-bold text-slate-400">В сезоне 2025 пока нет запланированных матчей.</div>`;
                return;
            }

            feed.innerHTML = fixtures.map(fix => {
                const home = standings.find(s => s.team.id === fix.teams.home.id);
                const away = standings.find(s => s.team.id === fix.teams.away.id);
                if (!home || !away) return '';

                const exp = ((home.all.goals.for / home.all.played + away.all.goals.against / away.all.played + 
                              away.all.goals.for / away.all.played + home.all.goals.against / home.all.played) / 2).toFixed(2);

                return `
                <div class="card p-6 flex justify-between items-center shadow-sm">
                    <div>
                        <span class="status-msg text-blue-500">${fix.league.name}</span>
                        <h2 class="text-lg font-black text-slate-800">${fix.teams.home.name} vs ${fix.teams.away.name}</h2>
                        <div class="flex gap-4 mt-2">
                            <div class="text-[10px] font-bold text-slate-400">PPM H: <span class="text-slate-900">${(home.points/home.all.played).toFixed(2)}</span></div>
                            <div class="text-[10px] font-bold text-slate-400">PPM A: <span class="text-slate-900">${(away.points/away.all.played).toFixed(2)}</span></div>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="status-msg text-slate-400">Exp. Goals</p>
                        <p class="text-3xl font-black italic">${exp}</p>
                    </div>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
