<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Pro Terminal & Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: 'Inter', sans-serif; }
        .active-league { background: #00C076 !important; color: white !important; border-color: #00C076 !important; }
        .card { transition: 0.2s; }
        .tab-active { border-bottom: 3px solid #00C076; color: #00C076; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center max-w-5xl mx-auto mb-6">
        <h1 class="text-2xl font-black italic tracking-tighter text-slate-900">MANANA<span class="text-green-600">AI</span></h1>
        <div class="flex gap-3">
            <button onclick="toggleView('main')" id="tab-main" class="px-4 py-2 font-bold text-sm tab-active">Live Feed</button>
            <button onclick="toggleView('math')" id="tab-math" class="px-4 py-2 font-bold text-sm text-slate-400">Math Bets 🧮</button>
            <button onclick="toggleView('portfolio')" id="tab-port" class="px-4 py-2 font-bold text-sm text-slate-400">Portfolio</button>
            <button onclick="document.getElementById('setup').classList.toggle('hidden')" class="p-2 bg-white rounded-full shadow-sm border border-slate-200">⚙️</button>
        </div>
    </nav>

    <div id="setup" class="max-w-5xl mx-auto mb-8 hidden bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm space-y-6">
        <input type="text" id="global-search" oninput="filterSignals()" placeholder="Поиск лиги или команды..." class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-green-500 font-bold text-sm shadow-inner">
        <div id="league-categories" class="space-y-6 text-left"></div>
    </div>

    <div id="view-math" class="max-w-5xl mx-auto hidden space-y-4">
        <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
            <div>
                <h2 class="text-xl font-black text-slate-900">Statistical Engine</h2>
                <p id="math-status" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Deep Scanning Enabled</p>
            </div>
            <button onclick="scanMathBets()" id="math-scan-btn" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition">Calculate Math Bets 🧮</button>
        </div>
        <div id="math-feed" class="space-y-4 text-center py-20 text-slate-400 font-bold">Нажмите кнопку для поиска матчей на всю неделю</div>
    </div>

    <div id="view-main" class="max-w-5xl mx-auto space-y-4"></div>
    <div id="view-portfolio" class="max-w-5xl mx-auto hidden"></div>

    <script>
        const API_KEY_SPORTSDB = "3"; 

        const LEAGUES_CONFIG = {
            "⚽ Футбол (Англия)": {
                'soccer_epl': {id: '4328', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League'}, 
                'soccer_england_league1': {id: '4396', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 League One'},
                'soccer_england_championship': {id: '4329', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Championship'}
            },
            "⚽ Футбол (Европа)": {
                'soccer_germany_bundesliga': {id: '4331', name: '🇩🇪 Bundesliga'}, 
                'soccer_spain_la_liga': {id: '4335', name: '🇪🇸 La Liga'},
                'soccer_italy_serie_a': {id: '4332', name: '🇮🇹 Serie A'}, 
                'soccer_france_ligue_one': {id: '4334', name: '🇫🇷 Ligue 1'}
            }
        };

        let selectedLeagues = ['soccer_epl', 'soccer_england_league1', 'soccer_england_championship'];

        async function scanMathBets() {
            const btn = document.getElementById('math-scan-btn');
            const feed = document.getElementById('math-feed');
            const statusLabel = document.getElementById('math-status');
            
            btn.innerText = "Deep Scan... ⏳";
            feed.innerHTML = `<div class="animate-bounce text-blue-600 font-black">СКАНИРУЕМ КАЛЕНДАРЬ НА 7 ДНЕЙ...</div>`;
            let mathSignals = [];

            const activeIds = selectedLeagues.map(key => {
                for (let cat in LEAGUES_CONFIG) if (LEAGUES_CONFIG[cat][key]) return LEAGUES_CONFIG[cat][key].id;
            }).filter(id => id);

            try {
                for (let leagueId of activeIds) {
                    statusLabel.innerText = `League ${leagueId}: Поиск расписания...`;
                    
                    // Собираем матчи через разные методы (Next Events + Calendar)
                    let matches = [];
                    
                    // Метод 1: Стандартный список ближайших
                    let resNext = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY_SPORTSDB}/eventsnextleague.php?id=${leagueId}`);
                    let dataNext = await resNext.json();
                    if (dataNext.events) matches = [...dataNext.events];

                    // Метод 2: Если матчей мало, берем календарь на ближайшие даты (цикл 3 дня)
                    if (matches.length < 5) {
                        const today = new Date();
                        for (let i = 0; i < 3; i++) {
                            const dateStr = new Date(today.getTime() + i * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                            let resDay = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY_SPORTSDB}/eventsday.php?d=${dateStr}&l=${leagueId}`);
                            let dataDay = await resDay.json();
                            if (dataDay.events) matches = [...matches, ...dataDay.events];
                        }
                    }

                    // Убираем дубликаты
                    const uniqueMatches = Array.from(new Set(matches.map(m => m.idEvent))).map(id => matches.find(m => m.idEvent === id));

                    if (uniqueMatches.length === 0) continue;

                    // Поиск таблицы (Seasons check)
                    let table = null;
                    for (let s of ["2025-2026", "2024-2025"]) {
                        let resT = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY_SPORTSDB}/lookuptable.php?l=${leagueId}&s=${s}`);
                        let tData = await resT.json();
                        if (tData.table) { table = tData.table; break; }
                    }

                    if (table) {
                        uniqueMatches.forEach(ev => {
                            const home = table.find(t => t.idTeam === ev.idHomeTeam || t.strTeam === ev.strHomeTeam);
                            const away = table.find(t => t.idTeam === ev.idAwayTeam || t.strTeam === ev.strAwayTeam);

                            if (home && away) {
                                const hP = Math.max(parseInt(home.intPlayed || 1), 1);
                                const aP = Math.max(parseInt(away.intPlayed || 1), 1);
                                const hGF = (parseFloat(home.intGoalsFor || 0) / hP);
                                const aGF = (parseFloat(away.intGoalsFor || 0) / aP);
                                const expT = (hGF + aGF).toFixed(2);

                                mathSignals.push({
                                    match: `${ev.strHomeTeam} v ${ev.strAwayTeam}`,
                                    league: ev.strLeague,
                                    hPPM: (parseFloat(home.intPoints || 0) / hP).toFixed(2),
                                    aPPM: (parseFloat(away.intPoints || 0) / aP).toFixed(2),
                                    expTotal: expT,
                                    recommendation: expT > 2.5 ? "OVER 2.5" : "UNDER 2.5",
                                    date: ev.dateEvent
                                });
                            }
                        });
                    }
                }

                renderMathFeed(mathSignals);
                statusLabel.innerText = `Найдено: ${mathSignals.length} прогнозов`;

            } catch (e) {
                feed.innerHTML = "Ошибка API. Попробуйте позже.";
            } finally {
                btn.innerText = "Calculate Math Bets 🧮";
            }
        }

        function renderMathFeed(signals) {
            const container = document.getElementById('math-feed');
            if (signals.length === 0) {
                container.innerHTML = "Матчей не найдено. Проверьте выбор лиг.";
                return;
            }
            container.innerHTML = signals.map(sig => `
                <div class="card bg-white p-6 rounded-[32px] border border-slate-100 flex justify-between items-center shadow-sm text-left mb-4">
                    <div>
                        <span class="text-[9px] font-black text-blue-500 uppercase">${sig.league} | ${sig.date}</span>
                        <h2 class="text-xl font-black text-slate-900 leading-tight">${sig.match}</h2>
                        <span class="text-[10px] font-bold text-slate-400">PPM: H ${sig.hPPM} / A ${sig.aPPM}</span>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] font-black text-slate-400 uppercase">Exp. Goals: ${sig.expTotal}</div>
                        <div class="text-lg font-black italic text-blue-600">${sig.recommendation}</div>
                    </div>
                </div>`).join('');
        }

        function renderLeagueSelection() {
            const container = document.getElementById('league-categories');
            container.innerHTML = Object.entries(LEAGUES_CONFIG).map(([cat, leagues]) => `
                <div>
                    <h4 class="text-[10px] font-black text-slate-400 uppercase mb-3">${cat}</h4>
                    <div class="grid grid-cols-2 gap-2">
                        ${Object.entries(leagues).map(([key, data]) => `
                            <div onclick="toggleLeague('${key}')" class="p-3 rounded-2xl border text-[11px] font-bold cursor-pointer ${selectedLeagues.includes(key) ? 'active-league' : 'bg-slate-50'}">
                                ${data.name}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleLeague(key) {
            selectedLeagues = selectedLeagues.includes(key) ? selectedLeagues.filter(i => i !== key) : [...selectedLeagues, key];
            renderLeagueSelection();
        }

        function toggleView(view) {
            document.getElementById('view-math').classList.toggle('hidden', view !== 'math');
        }

        renderLeagueSelection();
    </script>
</body>
</html>
