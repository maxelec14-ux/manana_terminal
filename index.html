<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Pro Terminal & Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: 'Inter', sans-serif; }
        .active-league { background: #00C076 !important; color: white !important; border-color: #00C076 !important; }
        .card { transition: 0.2s; }
        .tab-active { border-bottom: 3px solid #00C076; color: #00C076; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center max-w-5xl mx-auto mb-6">
        <h1 class="text-2xl font-black italic tracking-tighter text-slate-900">MANANA<span class="text-green-600">AI</span></h1>
        <div class="flex gap-3">
            <button onclick="toggleView('main')" id="tab-main" class="px-4 py-2 font-bold text-sm tab-active">Live Feed</button>
            <button onclick="toggleView('math')" id="tab-math" class="px-4 py-2 font-bold text-sm text-slate-400">Math Bets 🧮</button>
            <button onclick="toggleView('portfolio')" id="tab-port" class="px-4 py-2 font-bold text-sm text-slate-400">Portfolio</button>
            <button onclick="document.getElementById('setup').classList.toggle('hidden')" class="p-2 bg-white rounded-full shadow-sm border border-slate-200">⚙️</button>
        </div>
    </nav>

    <div id="setup" class="max-w-5xl mx-auto mb-8 hidden bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm space-y-6">
        <input type="text" id="global-search" oninput="filterSignals()" placeholder="Поиск лиги или команды..." class="w-full p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-green-500 font-bold text-sm shadow-inner">
        <div id="league-categories" class="space-y-6 text-left"></div>
    </div>

    <div id="view-main" class="max-w-5xl mx-auto space-y-4">
        <div class="flex justify-end mb-6">
            <button id="scan-btn" onclick="startValueScan()" class="bg-black text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:scale-105 transition">Search Value ⚡</button>
        </div>
        <div id="feed" class="space-y-4 text-center py-20 text-slate-400 font-bold">Выберите лиги в ⚙️ и нажмите Search</div>
    </div>

    <div id="view-math" class="max-w-5xl mx-auto hidden space-y-4">
        <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
            <div>
                <h2 class="text-xl font-black text-slate-900">Statistical Engine</h2>
                <p id="math-status" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Ready for Analysis</p>
            </div>
            <button onclick="scanMathBets()" id="math-scan-btn" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition">Calculate Math Bets 🧮</button>
        </div>
        <div id="math-feed" class="space-y-4 text-center py-20 text-slate-400 font-bold">Нажмите кнопку для анализа выбранных лиг</div>
    </div>

    <div id="view-portfolio" class="max-w-5xl mx-auto hidden">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="stats-panel"></div>
        <div id="portfolio-list" class="space-y-4"></div>
    </div>

    <script>
        const API_KEY_SPORTSDB = "3"; // Публичный ключ для тестов

        const LEAGUES_CONFIG = {
            "⚽ Футбол (Англия)": {
                'soccer_epl': {id: '4328', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League'}, 
                'soccer_england_league1': {id: '4396', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 League One'}, // Ваша лига из JSON
                'soccer_england_championship': {id: '4329', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Championship'}
            },
            "⚽ Футбол (Европа)": {
                'soccer_germany_bundesliga': {id: '4331', name: '🇩🇪 Bundesliga'}, 
                'soccer_spain_la_liga': {id: '4335', name: '🇪🇸 La Liga'},
                'soccer_italy_serie_a': {id: '4332', name: '🇮🇹 Serie A'}, 
                'soccer_france_ligue_one': {id: '4334', name: '🇫🇷 Ligue 1'},
                'soccer_russia_premier_league': {id: '4355', name: '🇷🇺 РПЛ'}
            }
        };

        let selectedLeagues = ['soccer_epl', 'soccer_england_league1'];
        let portfolio = JSON.parse(localStorage.getItem('portfolio') || '[]');

        function renderLeagueSelection() {
            const container = document.getElementById('league-categories');
            container.innerHTML = Object.entries(LEAGUES_CONFIG).map(([cat, leagues]) => `
                <div>
                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-2">${cat}</h4>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        ${Object.entries(leagues).map(([key, data]) => `
                            <div onclick="toggleLeague('${key}')" class="p-3 rounded-2xl border text-[11px] font-bold cursor-pointer transition-all ${selectedLeagues.includes(key) ? 'active-league shadow-lg' : 'bg-slate-50 text-slate-500 border-slate-100 hover:bg-slate-100'}">
                                ${data.name}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleLeague(key) {
            selectedLeagues = selectedLeagues.includes(key) ? selectedLeagues.filter(i => i !== key) : [...selectedLeagues, key];
            renderLeagueSelection();
        }

        async function scanMathBets() {
            const btn = document.getElementById('math-scan-btn');
            const feed = document.getElementById('math-feed');
            const statusLabel = document.getElementById('math-status');
            
            btn.innerText = "Processing... ⏳";
            feed.innerHTML = `<div class="animate-pulse text-blue-600 font-black uppercase tracking-widest">Анализируем базу данных...</div>`;
            let mathSignals = [];

            const activeIds = selectedLeagues.map(key => {
                for (let cat in LEAGUES_CONFIG) if (LEAGUES_CONFIG[cat][key]) return LEAGUES_CONFIG[cat][key].id;
            }).filter(id => id);

            try {
                for (let leagueId of activeIds) {
                    statusLabel.innerText = `Загрузка матчей Лиги ID: ${leagueId}...`;
                    
                    // 1. Получаем список матчей
                    let resEvents = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY_SPORTSDB}/eventsnextleague.php?id=${leagueId}`);
                    let eventsData = await resEvents.json();

                    if (!eventsData || !eventsData.events) continue;

                    // 2. Получаем таблицу (сначала текущий сезон, потом прошлый как запасной)
                    let resTable = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY_SPORTSDB}/lookuptable.php?l=${leagueId}&s=2025-2026`);
                    let tableData = await resTable.json();
                    
                    if (!tableData || !tableData.table) {
                        resTable = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY_SPORTSDB}/lookuptable.php?l=${leagueId}&s=2024-2025`);
                        tableData = await resTable.json();
                    }

                    if (tableData && tableData.table) {
                        const table = tableData.table;
                        eventsData.events.forEach(ev => {
                            // Гибкий поиск: по ID (надежно) или по точному имени (запасной вариант)
                            const home = table.find(t => t.idTeam === ev.idHomeTeam || t.strTeam === ev.strHomeTeam);
                            const away = table.find(t => t.idTeam === ev.idAwayTeam || t.strTeam === ev.strAwayTeam);

                            if (home && away) {
                                const hPlayed = Math.max(parseInt(home.intPlayed || 1), 1);
                                const aPlayed = Math.max(parseInt(away.intPlayed || 1), 1);
                                
                                const hPPM = (parseFloat(home.intPoints || 0) / hPlayed).toFixed(2);
                                const aPPM = (parseFloat(away.intPoints || 0) / aPlayed).toFixed(2);
                                
                                const hGF = (parseFloat(home.intGoalsFor || 0) / hPlayed);
                                const aGF = (parseFloat(away.intGoalsFor || 0) / aPlayed);
                                const expTotal = (hGF + aGF).toFixed(2);

                                mathSignals.push({
                                    match: `${ev.strHomeTeam} v ${ev.strAwayTeam}`,
                                    league: ev.strLeague,
                                    hPPM, aPPM, expTotal,
                                    recommendation: expTotal > 2.5 ? "OVER 2.5" : "UNDER 2.5",
                                    confidence: Math.abs(hPPM - aPPM) > 0.6 ? "HIGH VALUE" : "MODERATE"
                                });
                            }
                        });
                    }
                    await new Promise(r => setTimeout(r, 400));
                }
                
                if (mathSignals.length === 0) {
                    feed.innerHTML = `<div class="text-slate-400 font-bold">Матчи найдены, но данные команд (PPM) для расчёта временно недоступны.</div>`;
                } else {
                    renderMathFeed(mathSignals);
                    statusLabel.innerText = `Успешно проанализировано: ${mathSignals.length} матчей`;
                }

            } catch (e) {
                feed.innerHTML = "Ошибка подключения к API.";
                console.error(e);
            } finally {
                btn.innerText = "Calculate Math Bets 🧮";
            }
        }

        function renderMathFeed(signals) {
            const container = document.getElementById('math-feed');
            container.innerHTML = signals.map(sig => `
                <div class="card bg-white p-6 rounded-[32px] border border-slate-100 flex justify-between items-center shadow-sm text-left">
                    <div class="flex-1">
                        <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">${sig.league}</span>
                        <h2 class="text-xl font-black text-slate-900 leading-tight">${sig.match}</h2>
                        <div class="flex gap-2 mt-1">
                            <span class="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 rounded">PPM H: ${sig.hPPM} / A: ${sig.aPPM}</span>
                        </div>
                    </div>
                    <div class="text-right flex items-center gap-6">
                        <div>
                            <div class="text-[10px] font-black text-slate-400 uppercase">Exp. Goals: ${sig.expTotal}</div>
                            <div class="text-lg font-black italic leading-tight">${sig.recommendation}</div>
                        </div>
                        <button onclick='addToPortfolio(${JSON.stringify(sig)})' class="bg-blue-600 text-white p-4 rounded-2xl hover:bg-black transition shadow-lg">🎯</button>
                    </div>
                </div>`).join('');
        }

        function addToPortfolio(sig) {
            portfolio.unshift({...sig, id: Date.now(), status: 'pending'});
            localStorage.setItem('portfolio', JSON.stringify(portfolio));
            alert("Добавлено в трекер!");
        }

        function toggleView(view) {
            ['main', 'math', 'portfolio'].forEach(v => {
                document.getElementById(`view-${v}`).classList.toggle('hidden', v !== view);
                document.getElementById(`tab-${v === 'portfolio' ? 'port' : v}`).className = `px-4 py-2 font-bold text-sm ${v === view ? 'tab-active' : 'text-slate-400'}`;
            });
        }

        renderLeagueSelection();
    </script>
</body>
</html>
