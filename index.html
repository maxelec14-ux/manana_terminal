<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Pro Terminal & Math</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: 'Inter', sans-serif; }
        .active-league { background: #00C076 !important; color: white !important; border-color: #00C076 !important; }
        .card { transition: 0.2s; }
        .tab-active { border-bottom: 3px solid #00C076; color: #00C076; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center max-w-5xl mx-auto mb-6">
        <h1 class="text-2xl font-black italic tracking-tighter text-slate-900">MANANA<span class="text-green-600">AI</span></h1>
        <div class="flex gap-3">
            <button onclick="toggleView('main')" id="tab-main" class="px-4 py-2 font-bold text-sm tab-active">Live Feed</button>
            <button onclick="toggleView('math')" id="tab-math" class="px-4 py-2 font-bold text-sm text-slate-400">Math Bets 🧮</button>
            <button onclick="toggleView('portfolio')" id="tab-port" class="px-4 py-2 font-bold text-sm text-slate-400">Portfolio</button>
            <button onclick="document.getElementById('setup').classList.toggle('hidden')" class="p-2 bg-white rounded-full shadow-sm border border-slate-200">⚙️</button>
        </div>
    </nav>

    <div id="setup" class="max-w-5xl mx-auto mb-8 hidden bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm space-y-6">
        <input type="text" id="global-search" placeholder="Поиск лиги или команды..." class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-sm shadow-inner">
        <div id="league-categories" class="space-y-6 text-left"></div>
    </div>

    <div id="view-math" class="max-w-5xl mx-auto hidden space-y-4">
        <div class="flex justify-between items-center mb-6 bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
            <div>
                <h2 class="text-xl font-black text-slate-900">Statistical Engine</h2>
                <p id="math-status" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Forced Calendar Scan Mode</p>
            </div>
            <button onclick="scanMathBets()" id="math-scan-btn" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:bg-blue-700 transition">Scan Full Week 🚀</button>
        </div>
        <div id="math-feed" class="grid gap-4">
            <div class="text-center py-20 text-slate-400 font-bold">Выберите лиги в ⚙️ и нажмите Scan</div>
        </div>
    </div>

    <div id="view-main" class="max-w-5xl mx-auto"></div>
    <div id="view-portfolio" class="max-w-5xl mx-auto hidden"></div>

    <script>
        const API_KEY = "3"; 
        const LEAGUES_CONFIG = {
            "⚽ Англия": {
                'soccer_epl': {id: '4328', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League'}, 
                'soccer_england_league1': {id: '4396', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 League One'},
                'soccer_england_championship': {id: '4329', name: '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Championship'}
            },
            "⚽ Европа": {
                'soccer_germany_bundesliga': {id: '4331', name: '🇩🇪 Bundesliga'}, 
                'soccer_spain_la_liga': {id: '4335', name: '🇪🇸 La Liga'},
                'soccer_italy_serie_a': {id: '4332', name: '🇮🇹 Serie A'}
            }
        };

        let selectedLeagues = ['soccer_epl', 'soccer_england_league1'];

        async function scanMathBets() {
            const btn = document.getElementById('math-scan-btn');
            const feed = document.getElementById('math-feed');
            const statusLabel = document.getElementById('math-status');
            
            btn.innerText = "Scanning... ⏳";
            feed.innerHTML = `<div class="p-10 text-center animate-pulse font-black text-blue-600">СКАНИРУЕМ ДАТЫ И ТАБЛИЦЫ...</div>`;
            
            let mathSignals = [];
            const activeIds = selectedLeagues.map(key => {
                for (let cat in LEAGUES_CONFIG) if (LEAGUES_CONFIG[cat][key]) return LEAGUES_CONFIG[cat][key].id;
            }).filter(id => id);

            try {
                // 1. Сначала загружаем таблицы для всех выбранных лиг (Season Fallback)
                let leagueDataMap = {};
                for (let id of activeIds) {
                    statusLabel.innerText = `Загрузка таблицы Лиги ${id}...`;
                    let table = null;
                    for (let s of ["2025-2026", "2024-2025"]) {
                        let resT = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/lookuptable.php?l=${id}&s=${s}`);
                        let tData = await resT.json();
                        if (tData.table && tData.table.length > 0) { table = tData.table; break; }
                    }
                    if (table) leagueDataMap[id] = table;
                }

                // 2. Сканируем события на сегодня и следующие 3 дня
                const today = new Date();
                for (let i = 0; i < 4; i++) {
                    const date = new Date(today.getTime() + i * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                    statusLabel.innerText = `Проверка матчей на ${date}...`;
                    
                    let resDay = await fetch(`https://www.thesportsdb.com/api/v1/json/${API_KEY}/eventsday.php?d=${date}&s=Soccer`);
                    let dayData = await resDay.json();

                    if (dayData.events) {
                        dayData.events.forEach(ev => {
                            // Фильтруем: только те лиги, которые мы выбрали и для которых есть таблица
                            if (activeIds.includes(ev.idLeague) && leagueDataMap[ev.idLeague]) {
                                const table = leagueDataMap[ev.idLeague];
                                const home = table.find(t => t.idTeam === ev.idHomeTeam || t.strTeam === ev.strHomeTeam);
                                const away = table.find(t => t.idTeam === ev.idAwayTeam || t.strTeam === ev.strAwayTeam);

                                if (home && away) {
                                    const hP = Math.max(parseInt(home.intPlayed || 1), 1);
                                    const aP = Math.max(parseInt(away.intPlayed || 1), 1);
                                    const hGF = (parseFloat(home.intGoalsFor || 0) / hP);
                                    const aGF = (parseFloat(away.intGoalsFor || 0) / aP);
                                    const expT = (hGF + aGF).toFixed(2);

                                    mathSignals.push({
                                        match: `${ev.strHomeTeam} v ${ev.strAwayTeam}`,
                                        league: ev.strLeague,
                                        hPPM: (parseFloat(home.intPoints || 0) / hP).toFixed(2),
                                        aPPM: (parseFloat(away.intPoints || 0) / aP).toFixed(2),
                                        expTotal: expT,
                                        recommendation: expT > 2.5 ? "OVER 2.5" : "UNDER 2.5",
                                        time: ev.strTime,
                                        date: ev.dateEvent
                                    });
                                }
                            }
                        });
                    }
                    await new Promise(r => setTimeout(r, 200)); 
                }

                renderMathFeed(mathSignals);
                statusLabel.innerText = `Найдено: ${mathSignals.length} матчей на 4 дня`;

            } catch (e) {
                feed.innerHTML = `<div class="text-red-500 font-bold p-10">Ошибка API: ${e.message}</div>`;
            } finally {
                btn.innerText = "Scan Full Week 🚀";
            }
        }

        function renderMathFeed(signals) {
            const container = document.getElementById('math-feed');
            if (signals.length === 0) {
                container.innerHTML = `<div class="text-slate-400 font-bold p-10 border-2 border-dashed border-slate-100 rounded-[40px]">Матчей на ближайшие 4 дня не найдено. Попробуйте выбрать больше лиг.</div>`;
                return;
            }
            // Сортировка по дате
            signals.sort((a,b) => new Date(a.date) - new Date(b.date));
            
            container.innerHTML = signals.map(sig => `
                <div class="card bg-white p-6 rounded-[32px] border border-slate-100 flex justify-between items-center shadow-sm">
                    <div class="text-left">
                        <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest">${sig.league} | ${sig.date}</span>
                        <h2 class="text-xl font-black text-slate-900 leading-tight">${sig.match}</h2>
                        <div class="flex gap-2 mt-1">
                            <span class="text-[10px] font-bold bg-blue-50 text-blue-600 px-2 rounded uppercase">PPM: H ${sig.hPPM} / A ${sig.aPPM}</span>
                        </div>
                    </div>
                    <div class="text-right flex items-center gap-6">
                        <div>
                            <div class="text-[10px] font-black text-slate-400 uppercase leading-none mb-1">Exp. Goals: ${sig.expTotal}</div>
                            <div class="text-xl font-black italic text-blue-600">${sig.recommendation}</div>
                        </div>
                    </div>
                </div>`).join('');
        }

        function renderLeagueSelection() {
            const container = document.getElementById('league-categories');
            container.innerHTML = Object.entries(LEAGUES_CONFIG).map(([cat, leagues]) => `
                <div>
                    <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-2">${cat}</h4>
                    <div class="grid grid-cols-2 gap-2">
                        ${Object.entries(leagues).map(([key, data]) => `
                            <div onclick="toggleLeague('${key}')" class="p-3 rounded-2xl border text-[11px] font-bold cursor-pointer transition-all ${selectedLeagues.includes(key) ? 'active-league shadow-md' : 'bg-slate-50 text-slate-500 border-slate-100'}">
                                ${data.name}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleLeague(key) {
            selectedLeagues = selectedLeagues.includes(key) ? selectedLeagues.filter(i => i !== key) : [...selectedLeagues, key];
            renderLeagueSelection();
        }

        function toggleView(view) {
            document.getElementById('view-math').classList.toggle('hidden', view !== 'math');
            document.getElementById('tab-math').className = `px-4 py-2 font-bold text-sm ${view === 'math' ? 'tab-active' : 'text-slate-400'}`;
        }

        renderLeagueSelection();
    </script>
</body>
</html>
