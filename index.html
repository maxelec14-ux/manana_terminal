<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Cloud Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: sans-serif; }
        .active-league { background: #00C076 !important; color: white !important; }
        .card { background: white; border-radius: 20px; border: 1px solid #E2E8F0; transition: 0.2s; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="p-6">

    <nav class="flex justify-between items-center max-w-5xl mx-auto mb-10">
        <h1 class="text-2xl font-black italic">MANANA<span class="text-green-600">AI</span></h1>
        <div class="flex gap-4">
            <button onclick="document.getElementById('setup').classList.toggle('hidden')" class="px-4 py-2 bg-slate-100 rounded-xl font-bold text-sm">Настройка лиг ⚙️</button>
            <button id="scan-btn" onclick="startValueScan()" class="px-6 py-2 bg-black text-white rounded-xl font-bold text-sm shadow-lg shadow-black/20">Search Value ⚡</button>
        </div>
    </nav>

    <div id="setup" class="max-w-5xl mx-auto mb-10 hidden bg-white p-6 rounded-3xl border border-slate-200">
        <h3 class="font-black text-xs uppercase tracking-widest text-slate-400 mb-4">Выбор лиг для парсинга</h3>
        <div id="league-grid" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
    </div>

    <main class="max-w-5xl mx-auto space-y-4" id="feed"></main>

    <script>
        const MY_LEAGUES = [
            'soccer_epl','soccer_germany_bundesliga','soccer_spain_la_liga','soccer_italy_serie_a','soccer_france_ligue_one','soccer_uefa_champs_league','soccer_uefa_europa_league','soccer_uefa_europa_conference_league',
            'soccer_portugal_primeira_liga','soccer_netherlands_eredivisie','soccer_belgium_first_div','soccer_russia_premier_league','soccer_turkey_super_league','soccer_usa_mls','soccer_mexico_ligamx','soccer_brazil_campeonato','soccer_argentina_primera_division',
            'basketball_nba','basketball_euroleague','basketball_ncaab','basketball_wncaab',
            'icehockey_nhl','icehockey_ahl','icehockey_liiga','icehockey_mestis','icehockey_sweden_allsvenskan','icehockey_sweden_hockey_league'
        ];

        let selectedLeagues = ['soccer_epl', 'basketball_nba', 'icehockey_nhl'];

        function renderLeagues() {
            const grid = document.getElementById('league-grid');
            grid.innerHTML = MY_LEAGUES.map(l => `
                <div onclick="toggleLeague('${l}')" class="p-2 rounded-lg border text-[10px] font-bold cursor-pointer text-center ${selectedLeagues.includes(l) ? 'active-league' : 'bg-slate-50 text-slate-400'}">
                    ${l.replace('soccer_', '').replace('icehockey_', '').toUpperCase()}
                </div>
            `).join('');
        }

        function toggleLeague(l) {
            if(selectedLeagues.includes(l)) selectedLeagues = selectedLeagues.filter(i => i !== l);
            else selectedLeagues.push(l);
            renderLeagues();
        }

        async function startValueScan() {
            const btn = document.getElementById('scan-btn');
            btn.innerText = "Сканирую... ⏳";
            try {
                const res = await fetch(`/api/fetch?leagues=${selectedLeagues.join(',')}`);
                const data = await res.json();
                renderFeed(data);
            } catch(e) { alert("Ошибка API"); }
            finally { btn.innerText = "Search Value ⚡"; }
        }

       function renderFeed(items) {
    const feed = document.getElementById('feed');
    if (!items || items.length === 0) { 
        feed.innerHTML = "<p class='text-center text-slate-400'>Валуев не найдено. Попробуйте выбрать другие лиги или подождите.</p>"; 
        return; 
    }
    feed.innerHTML = items.map(sig => `
        <div class="card p-6 flex justify-between items-center mb-4 bg-white rounded-3xl border border-slate-100">
            <div>
                <span class="text-[10px] font-bold text-slate-400 uppercase">${sig.league}</span>
                <h2 class="text-lg font-black text-slate-900">${sig.match}</h2>
                <p class="text-sm font-bold text-blue-600">${sig.selection} (${sig.market} ${sig.line}) — ${sig.bookie}</p>
            </div>
            <div class="text-right">
                <div class="text-xs font-bold text-green-600 mb-1">+${sig.gap}% Value</div>
                <div class="flex gap-2">
                    <span class="bg-slate-100 px-3 py-1 rounded-lg text-xs font-bold">PIN: ${sig.pin_odd}</span>
                    <span class="bg-green-500 text-white px-3 py-1 rounded-lg text-xs font-bold italic">${sig.best_odd}</span>
                </div>
            </div>
        </div>
    `).join('');
}

        renderLeagues();
    </script>
</body>
</html>
