<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>MananaAI | Cloud Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #F8FAF1; font-family: 'Inter', sans-serif; }
        .active-league { background: #00C076 !important; color: white !important; border-color: #00C076 !important; }
        .card { transition: 0.2s; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0,0,0,0.06); }
        .tab-active { border-bottom: 3px solid #00C076; color: #00C076; }
        /* Стили для визуальных линий кэфов */
        .bar-container { height: 4px; background: #EDF2F7; border-radius: 2px; width: 100px; position: relative; overflow: hidden; }
        .bar-pin { height: 100%; background: #FF007A; transition: 0.3s; }
        .bar-val { height: 100%; background: #00C076; transition: 0.3s; }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="flex justify-between items-center max-w-5xl mx-auto mb-10">
        <h1 class="text-2xl font-black italic tracking-tighter text-slate-900">MANANA<span class="text-green-600">AI</span></h1>
        <div class="flex gap-3">
            <button onclick="toggleView('main')" id="tab-main" class="px-4 py-2 font-bold text-sm tab-active">Live Feed</button>
            <button onclick="toggleView('portfolio')" id="tab-port" class="px-4 py-2 font-bold text-sm text-slate-400">Portfolio</button>
            <button onclick="document.getElementById('setup').classList.toggle('hidden')" class="p-2 bg-white rounded-full shadow-sm border border-slate-200">⚙️</button>
        </div>
    </nav>

    <div id="setup" class="max-w-5xl mx-auto mb-8 hidden bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm">
        <div id="league-grid" class="grid grid-cols-2 md:grid-cols-4 gap-2 text-left"></div>
    </div>

    <div id="view-main" class="max-w-5xl mx-auto space-y-4">
        <div class="flex justify-end mb-6">
            <button id="scan-btn" onclick="startValueScan()" class="bg-black text-white px-8 py-4 rounded-2xl font-bold shadow-xl hover:scale-105 active:scale-95 transition">Search Value ⚡</button>
        </div>
        <div id="feed" class="space-y-4 text-center py-20 text-slate-400">Выберите лиги и нажмите Search</div>
    </div>

    <div id="view-portfolio" class="max-w-5xl mx-auto hidden">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-3xl font-black">My Portfolio</h2>
            <div id="stats" class="bg-green-100 text-green-700 px-4 py-2 rounded-xl font-bold text-sm">Profit: +0.00%</div>
        </div>
        <div id="portfolio-list" class="space-y-4"></div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[40px] max-w-md w-full p-8 relative shadow-2xl">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-300 hover:text-black text-2xl">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        const LEAGUES_DATA = {
            'soccer_epl': '🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League', 'soccer_germany_bundesliga': '🇩🇪 Bundesliga', 'soccer_spain_la_liga': '🇪🇸 La Liga',
            'soccer_italy_serie_a': '🇮🇹 Serie A', 'soccer_france_ligue_one': '🇫🇷 Ligue 1', 'soccer_uefa_champs_league': '🇪🇺 Champions League',
            'soccer_uefa_europa_league': '🇪🇺 Europa League', 'soccer_uefa_europa_conference_league': '🇪🇺 Conference League',
            'soccer_portugal_primeira_liga': '🇵🇹 Portugal', 'soccer_netherlands_eredivisie': '🇳🇱 Netherlands',
            'soccer_belgium_first_div': '🇧🇪 Belgium', 'soccer_russia_premier_league': '🇷🇺 RPL', 'soccer_turkey_super_league': '🇹🇷 Turkey',
            'soccer_usa_mls': '🇺🇸 MLS', 'soccer_mexico_ligamx': '🇲🇽 Mexico', 'soccer_brazil_campeonato': '🇧🇷 Brazil',
            'soccer_argentina_primera_division': '🇦🇷 Argentina', 'basketball_nba': '🇺🇸 NBA', 'basketball_euroleague': '🇪🇺 Euroleague',
            'basketball_ncaab': '🇺🇸 NCAA', 'icehockey_nhl': '🇺🇸 NHL', 'icehockey_ahl': '🇺🇸 AHL', 'icehockey_liiga': '🇫🇮 Liiga',
            'icehockey_sweden_hockey_league': '🇸🇪 SHL'
        };

        let selectedLeagues = ['soccer_epl', 'basketball_nba', 'icehockey_nhl'];
        let currentSignals = [];
        let portfolio = JSON.parse(localStorage.getItem('portfolio') || '[]');

        function renderLeagues() {
            const grid = document.getElementById('league-grid');
            grid.innerHTML = Object.entries(LEAGUES_DATA).map(([id, name]) => `
                <div onclick="toggleLeague('${id}')" class="p-3 rounded-2xl border text-[11px] font-bold cursor-pointer transition-all ${selectedLeagues.includes(id) ? 'active-league shadow-lg shadow-green-100' : 'bg-slate-50 text-slate-500 border-slate-100'}">
                    ${name}
                </div>
            `).join('');
        }

        function toggleLeague(id) {
            selectedLeagues = selectedLeagues.includes(id) ? selectedLeagues.filter(i => i !== id) : [...selectedLeagues, id];
            renderLeagues();
        }

        async function startValueScan() {
            const btn = document.getElementById('scan-btn');
            btn.innerText = "Scanning... ⏳";
            try {
                const res = await fetch(`/api/fetch?leagues=${selectedLeagues.join(',')}`);
                currentSignals = await res.json();
                renderFeed();
            } catch(e) { alert("API Error"); }
            finally { btn.innerText = "Search Value ⚡"; }
        }

        function renderFeed() {
            const feed = document.getElementById('feed');
            if(currentSignals.length === 0) { feed.innerHTML = "No signals found."; return; }
            feed.innerHTML = currentSignals.map((sig, idx) => {
                // Рассчитываем ширину линий для визуализации (Pinnacle берем за 70%)
                const pinWidth = 70;
                const valWidth = pinWidth * (sig.best_odd / sig.pin_odd);
                
                return `
                <div class="card bg-white p-6 rounded-[32px] border border-slate-100 flex justify-between items-center shadow-sm relative overflow-hidden">
                    <div class="text-left flex-1 cursor-pointer" onclick="openModal(${idx})">
                        <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">${sig.league}</span>
                        <h2 class="text-lg font-black text-slate-900 leading-tight">${sig.match}</h2>
                        <p class="text-sm font-bold text-green-600 mb-2">${sig.selection} (${sig.market} ${sig.line})</p>
                        
                        <div class="flex flex-col gap-1 mt-3">
                            <div class="flex items-center gap-2">
                                <div class="bar-container"><div class="bar-pin" style="width: ${pinWidth}%"></div></div>
                                <span class="text-[8px] font-bold text-slate-400">PIN</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <div class="bar-container"><div class="bar-val" style="width: ${valWidth}%"></div></div>
                                <span class="text-[8px] font-bold text-green-600">VALUE</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex items-center gap-6">
                        <div class="text-right">
                            <div class="text-lg font-black text-green-600 leading-none">+${sig.gap}%</div>
                            <div class="text-2xl font-black text-black italic">${sig.best_odd}</div>
                        </div>
                        <button onclick='addToPortfolio(${JSON.stringify(sig)})' class="bg-slate-900 text-white px-5 py-3 rounded-2xl font-black text-xs hover:bg-green-600 transition shadow-lg">Track 🎯</button>
                    </div>
                </div>
                `;
            }).join('');
        }

        function openModal(idx) {
            const sig = currentSignals[idx];
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-content').innerHTML = `
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b pb-4 block mb-4">${sig.league}</span>
                <h2 class="text-2xl font-black mb-1">${sig.match}</h2>
                <p class="text-green-600 font-bold mb-6">${sig.selection} (${sig.market} ${sig.line})</p>
                <div class="grid grid-cols-2 gap-4 mb-8 text-left">
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Best Price</p>
                        <p class="text-xl font-black text-black">${sig.best_odd}</p>
                        <p class="text-[10px] text-slate-400">${sig.bookie}</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Pinnacle</p>
                        <p class="text-xl font-black text-slate-900">${sig.pin_odd}</p>
                    </div>
                </div>
                <button onclick='addToPortfolio(${JSON.stringify(sig)})' class="w-full bg-black text-white py-4 rounded-2xl font-black shadow-xl">Add to Track List 🎯</button>
            `;
        }

        function addToPortfolio(sig) {
            portfolio.unshift({...sig, id: Date.now(), status: 'pending'});
            localStorage.setItem('portfolio', JSON.stringify(portfolio));
            closeModal();
            alert("Match Tracked!");
            if(!document.getElementById('view-portfolio').classList.contains('hidden')) renderPortfolio();
        }

        function setStatus(id, status) {
            portfolio = portfolio.map(item => item.id === id ? {...item, status} : item);
            localStorage.setItem('portfolio', JSON.stringify(portfolio));
            renderPortfolio();
        }

        function renderPortfolio() {
            const list = document.getElementById('portfolio-list');
            list.innerHTML = portfolio.map(item => `
                <div class="bg-white p-6 rounded-[32px] border border-slate-100 flex justify-between items-center ${item.status === 'win' ? 'border-l-8 border-l-green-500 shadow-lg shadow-green-50' : item.status === 'loss' ? 'border-l-8 border-l-red-500 shadow-lg shadow-red-50' : ''}">
                    <div class="text-left">
                        <h3 class="font-black text-slate-900">${item.match}</h3>
                        <p class="text-xs font-bold text-green-600">${item.selection} @${item.best_odd}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setStatus(${item.id}, 'win')" class="w-10 h-10 rounded-full bg-green-100 text-green-600 font-black hover:bg-green-600 hover:text-white transition">W</button>
                        <button onclick="setStatus(${item.id}, 'loss')" class="w-10 h-10 rounded-full bg-red-100 text-red-600 font-black hover:bg-red-600 hover:text-white transition">L</button>
                        <button onclick="deleteBet(${item.id})" class="w-10 h-10 rounded-full bg-slate-100 text-slate-400">✕</button>
                    </div>
                </div>
            `).join('');
            updateStats();
        }

        function deleteBet(id) {
            if(confirm("Delete this match?")) {
                portfolio = portfolio.filter(p => p.id !== id);
                localStorage.setItem('portfolio', JSON.stringify(portfolio));
                renderPortfolio();
            }
        }

        function updateStats() {
            const wins = portfolio.filter(p => p.status === 'win').length;
            const losses = portfolio.filter(p => p.status === 'loss').length;
            document.getElementById('stats').innerText = `Profit Stats — W: ${wins} | L: ${losses}`;
        }

        function toggleView(view) {
            document.getElementById('view-main').classList.toggle('hidden', view !== 'main');
            document.getElementById('view-portfolio').classList.toggle('hidden', view !== 'portfolio');
            document.getElementById('tab-main').classList.toggle('tab-active', view === 'main');
            document.getElementById('tab-port').classList.toggle('tab-active', view === 'portfolio');
            if(view === 'portfolio') renderPortfolio();
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        renderLeagues();
    </script>
</body>
</html>
