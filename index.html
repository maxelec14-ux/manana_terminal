<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pinnacle Elite | RapidAPI Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        body { background: #F1F5F9; font-family: 'Inter', sans-serif; color: #1E293B; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .match-card { background: white; border-radius: 16px; border: 1px solid #E2E8F0; transition: all 0.2s ease; overflow: hidden; margin-bottom: 1rem; }
        .match-card.is-fav { border-left: 4px solid #F59E0B; }
        .market-box { background: #F8FAFC; border-radius: 10px; padding: 10px; border: 1px solid #E2E8F0; }
        .label-u { font-size: 9px; color: #64748B; font-weight: 800; text-transform: uppercase; }
        .btn-active { background: #2563EB !important; color: white !important; }
        .chart-container { height: 120px; width: 100%; }
        .nominal-up { color: #EF4444; font-weight: 800; }
        .nominal-down { color: #10B981; font-weight: 800; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-[1600px] mx-auto">
        <header class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
            <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                <div>
                    <h1 class="text-2xl font-black tracking-tighter">PINNACLE<span class="text-blue-600">ELITE</span></h1>
                    <div id="api-status" class="text-[10px] font-bold text-slate-400 uppercase mt-1 italic">Ready to Sync</div>
                </div>
                <div class="flex gap-2">
                    <button onclick="fullSync()" id="scan-btn" class="bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold text-xs uppercase hover:bg-slate-800 transition-all">Full 24h Sync ⚡</button>
                    <button onclick="toggleFavMode()" id="fav-toggle" class="bg-white border border-slate-200 px-6 py-2.5 rounded-xl font-bold text-xs uppercase hover:bg-amber-50">Favorites ⭐</button>
                </div>
            </div>

            <div class="flex flex-wrap gap-4 border-t pt-6">
                <div class="flex bg-slate-100 p-1 rounded-xl">
                    <button onclick="setSport('all')" class="sport-btn px-4 py-2 text-xs font-bold uppercase rounded-lg btn-active" data-sport="all">All</button>
                    <button onclick="setSport('1')" class="sport-btn px-4 py-2 text-xs font-bold uppercase rounded-lg" data-sport="1">Soccer</button>
                    <button onclick="setSport('4')" class="sport-btn px-4 py-2 text-xs font-bold uppercase rounded-lg" data-sport="4">Hockey</button>
                    <button onclick="setSport('3')" class="sport-btn px-4 py-2 text-xs font-bold uppercase rounded-lg" data-sport="3">Basketball</button>
                </div>

                <input type="text" id="search" oninput="render()" placeholder="Search team..." class="bg-slate-50 border border-slate-200 rounded-lg px-4 py-2 text-sm focus:outline-none flex-grow">
                
                <button onclick="handleSort('time')" class="sort-btn bg-slate-50 border border-slate-200 px-4 py-2 rounded-lg text-xs font-bold uppercase">Time ↕</button>
                <button onclick="handleSort('total')" class="sort-btn bg-slate-50 border border-slate-200 px-4 py-2 rounded-lg text-xs font-bold uppercase">Total ↕</button>
                <button onclick="handleSort('spread')" class="sort-btn bg-slate-50 border border-slate-200 px-4 py-2 rounded-lg text-xs font-bold uppercase">Handicap ↕</button>
            </div>
        </header>

        <div id="scanner-feed"></div>
    </div>

    <script>
        const API_KEY = "fd36bdc679msh21fa7b256e2dda5p13662cjsnbdbf4c2ed8c6";
        const API_HOST = "odds-feed.p.rapidapi.com";
        
        let db = JSON.parse(localStorage.getItem('pin_rapid_db')) || {};
        let favorites = JSON.parse(localStorage.getItem('pin_favs')) || [];
        let currentSport = 'all';
        let favMode = false;
        let sortField = 'time';
        let sortOrder = 'asc';

        async function fetchRapid(endpoint) {
            const res = await fetch(`https://${API_HOST}${endpoint}`, {
                headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": API_HOST }
            });
            return await res.json();
        }

        async function fullSync() {
            const btn = document.getElementById('scan-btn');
            const status = document.getElementById('api-status');
            btn.disabled = true;
            status.innerText = "Fetching Events...";

            try {
                // Получаем события на ближайшие 24 часа
                const now = new Date();
                const tomorrow = new Date(now.getTime() + 24 * 60 * 60 * 1000);
                const dateMin = now.toISOString().replace('T', ' ').split('.')[0];
                const dateMax = tomorrow.toISOString().replace('T', ' ').split('.')[0];

                const eventsRes = await fetchRapid(`/api/v1/events?status=SCHEDULED&start_at_min=${dateMin}&start_at_max=${dateMax}`);
                
                if (eventsRes && eventsRes.data) {
                    for (let event of eventsRes.data) {
                        status.innerText = `Loading Odds: ${event.team_home.name}`;
                        
                        // Получаем маркеты для события (только Pinnacle)
                        const marketsRes = await fetchRapid(`/api/v1/events/markets?event_id=${event.id}&placing=PREMATCH`);
                        
                        if (marketsRes && marketsRes.data) {
                            const pinMarkets = marketsRes.data.filter(m => m.market_books.some(b => b.book === 'PINNACLE'));
                            
                            if (pinMarkets.length > 0) {
                                processEventData(event, pinMarkets);
                            }
                        }
                        // Небольшая задержка, чтобы не превысить лимиты RapidAPI
                        await new Promise(r => setTimeout(r, 100));
                    }
                    localStorage.setItem('pin_rapid_db', JSON.stringify(db));
                    render();
                    status.innerText = "Sync Complete";
                }
            } catch (e) {
                status.innerText = "Error: " + e.message;
            } finally {
                btn.disabled = false;
            }
        }

        function processEventData(event, markets) {
            const now = Date.now();
            if (!db[event.id]) {
                db[event.id] = {
                    id: event.id,
                    home: event.team_home.name,
                    away: event.team_away.name,
                    sport_id: event.sport.id,
                    sport_name: event.sport.name,
                    start: event.start_at,
                    history: { h2h: [], spread: [], total: [] },
                    lastFullSync: now
                };
            }

            markets.forEach(m => {
                const book = m.market_books.find(b => b.book === 'PINNACLE');
                const dataPoint = { t: now, v: book.outcome_0, n: m.value };

                if (m.market_name === '1X2') db[event.id].history.h2h.push(dataPoint);
                if (m.market_name === 'ASIAN_HANDICAP') db[event.id].history.spread.push(dataPoint);
                if (m.market_name === 'OVER_UNDER') db[event.id].history.total.push(dataPoint);
            });
        }

        function getNominalUI(history) {
            if (!history || history.length < 2) return history.length > 0 ? history[history.length-1].n : '—';
            const curr = history[history.length - 1];
            const prev = history[history.length - 2];
            
            if (curr.n > prev.n) return `<span class="nominal-up">↑ ${curr.n}</span>`;
            if (curr.n < prev.n) return `<span class="nominal-down">↓ ${curr.n}</span>`;
            return curr.n;
        }

        function handleSort(field) {
            if (sortField === field) sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            else { sortField = field; sortOrder = 'desc'; }
            render();
        }

        function setSport(id) {
            currentSport = id;
            document.querySelectorAll('.sport-btn').forEach(b => b.classList.remove('btn-active'));
            document.querySelector(`[data-sport="${id}"]`).classList.add('btn-active');
            render();
        }

        function toggleFavMode() {
            favMode = !favMode;
            document.getElementById('fav-toggle').classList.toggle('btn-active', favMode);
            render();
        }

        function render() {
            const feed = document.getElementById('scanner-feed');
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const now = Date.now();

            let list = Object.values(db).filter(m => {
                if (new Date(m.start).getTime() < now - 7200000) return false; // Убираем старые
                if (currentSport !== 'all' && m.sport_id.toString() !== currentSport) return false;
                if (favMode && !favorites.includes(m.id)) return false;
                if (searchTerm && !(m.home + m.away).toLowerCase().includes(searchTerm)) return false;
                return true;
            });

            // Сортировка
            list.sort((a, b) => {
                let res = 0;
                if (sortField === 'time') res = new Date(a.start) - new Date(b.start);
                else {
                    const valA = a.history[sortField === 'total' ? 'total' : 'spread'].slice(-1)[0]?.n || 0;
                    const valB = b.history[sortField === 'total' ? 'total' : 'spread'].slice(-1)[0]?.n || 0;
                    res = valA - valB;
                }
                return sortOrder === 'asc' ? res : -res;
            });

            feed.innerHTML = list.map(m => `
                <div class="match-card ${favorites.includes(m.id) ? 'is-fav' : ''}">
                    <div class="p-5 grid grid-cols-12 gap-4 items-center">
                        <div class="col-span-3">
                            <div class="flex items-center gap-2 mb-1">
                                <button onclick="toggleFav('${m.id}')" class="text-lg">${favorites.includes(m.id) ? '⭐' : '☆'}</button>
                                <span class="text-[9px] font-black text-blue-600 uppercase">${m.sport_name}</span>
                            </div>
                            <div class="font-extrabold text-sm uppercase">${m.home}</div>
                            <div class="font-extrabold text-sm uppercase text-slate-400">${m.away}</div>
                            <div class="mt-2 text-[10px] font-bold text-slate-500">${new Date(m.start).toLocaleString()}</div>
                        </div>
                        <div class="col-span-3 market-box text-center">
                            <span class="label-u">1X2 (Home)</span>
                            <div class="text-xl font-black mono">${m.history.h2h.slice(-1)[0]?.v || '—'}</div>
                        </div>
                        <div class="col-span-3 market-box text-center">
                            <span class="label-u">Handicap</span>
                            <div class="text-xs font-bold mb-1">${getNominalUI(m.history.spread)}</div>
                            <div class="text-xl font-black mono">${m.history.spread.slice(-1)[0]?.v || '—'}</div>
                        </div>
                        <div class="col-span-3 market-box text-center">
                            <span class="label-u">Total</span>
                            <div class="text-xs font-bold mb-1">${getNominalUI(m.history.total)}</div>
                            <div class="text-xl font-black mono">${m.history.total.slice(-1)[0]?.v || '—'}</div>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-4 p-4 bg-slate-50 border-t">
                        <div class="chart-container"><canvas id="c-h2h-${m.id}"></canvas></div>
                        <div class="chart-container"><canvas id="c-spr-${m.id}"></canvas></div>
                        <div class="chart-container"><canvas id="c-tot-${m.id}"></canvas></div>
                    </div>
                </div>
            `).join('');

            list.forEach(m => {
                renderChart(`c-h2h-${m.id}`, m.history.h2h);
                renderChart(`c-spr-${m.id}`, m.history.spread);
                renderChart(`c-tot-${m.id}`, m.history.total);
            });
        }

        function renderChart(id, history) {
            const ctx = document.getElementById(id);
            if (!ctx || history.length === 0) return;
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: history.map(h => ''),
                    datasets: [{
                        data: history.map(h => h.v),
                        borderColor: '#2563EB',
                        borderWidth: 2,
                        pointRadius: 0,
                        tension: 0.2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { ticks: { font: { size: 8 } } } } }
            });
        }

        function toggleFav(id) {
            if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
            else favorites.push(id);
            localStorage.setItem('pin_favs', JSON.stringify(favorites));
            render();
        }

        // Авто-обновление каждые 9 минут для активных матчей
        setInterval(() => {
            const now = Date.now();
            Object.values(db).forEach(m => {
                const startTime = new Date(m.start).getTime();
                if (startTime - now < 3600000 && startTime - now > 0) {
                    // Здесь можно добавить логику дозагрузки конкретного матча
                }
            });
            render();
        }, 1000);

        render();
    </script>
</body>
</html>
